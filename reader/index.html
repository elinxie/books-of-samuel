t the city, and it stood against the rampart; and all the people who were with Joab battered the wall, to throw it down."],[16,"Then a wise woman cried out of the city, “Hear, hear! Please say to Joab, ‘Come near here, that I may speak with you.’ ”"],[17,"He came near to her; and the woman said, “Are you Joab?” He answered, “I am.” Then she said to him, “Hear the words of your servant.” He answered, “I’m listening.”",true],[18,"Then she spoke, saying, “They used to say in old times, ‘They shall surely ask counsel at Abel;’ and so they settled a matter."],[19,"I am among those who are peaceable and faithful in Israel. You seek to destroy a city and a mother in Israel. Why will you swallow up Yahweh’s inheritance?”",true],[20,"Joab answered, “Far be it, far be it from me, that I should swallow up or destroy."],[21,"The matter is not so. But a man of the hill country of Ephraim, Sheba the son of Bichri by name, has lifted up his hand against the king, even against David. Just deliver him, and I will depart from the city.” The woman said to Joab, “Behold, his head will be thrown to you over the wall.”",true],[22,"Then the woman went to all the people in her wisdom. They cut off the head of Sheba the son of Bichri, and threw it out to Joab. He blew the trumpet, and they were dispersed from the city, every man to his tent. Then Joab returned to Jerusalem to the king."],[23,"Now Joab was over all the army of Israel, Benaiah the son of Jehoiada was over the Cherethites and over the Pelethites,"],[24,"Adoram was over the men subject to forced labor, Jehoshaphat the son of Ahilud was the recorder,"],[25,"Sheva was scribe, and Zadok and Abiathar were priests,"],[26,"and Ira the Jairite was chief minister to David.",true]],[[1,"There was a famine in the days of David for three years, year after year; and David sought the face of Yahweh. Yahweh said, “It is for Saul, and for his bloody house, because he put the Gibeonites to death.”",true],[2,"The king called the Gibeonites, and said to them (now the Gibeonites were not of the children of Israel, but of the remnant of the Amorites, and the children of Israel had sworn to them; and Saul sought to kill them in his zeal for the children of Israel and Judah);"],[3,"and David said to the Gibeonites, “What should I do for you? And with what should I make atonement, that you may bless Yahweh’s inheritance?”",true],[4,"The Gibeonites said to him, “It is no matter of silver or gold between us and Saul, or his house; neither is it for us to put any man to death in Israel.” He said, “I will do for you whatever you say.”",true],[5,"They said to the king, “The man who consumed us, and who devised against us, that we should be destroyed from remaining in any of the borders of Israel,"],[6,"let seven men of his sons be delivered to us, and we will hang them up to Yahweh in Gibeah of Saul, the chosen of Yahweh.” The king said, “I will give them.”",true],[7,"But the king spared Mephibosheth, the son of Jonathan the son of Saul, because of Yahweh’s oath that was between them, between David and Jonathan the son of Saul."],[8,"But the king took the two sons of Rizpah the daughter of Aiah, whom she bore to Saul, Armoni and Mephibosheth; and the five sons of Michal the daughter of Saul, whom she bore to Adriel the son of Barzillai the Meholathite."],[9,"He delivered them into the hands of the Gibeonites, and they hanged them on the mountain before Yahweh, and all seven of them fell together. They were put to death in the days of harvest, in the first days, at the beginning of barley harvest."],[10,"Rizpah the daughter of Aiah took sackcloth, and spread it for herself on the rock, from the beginning of harvest until water poured on them from the sky. She allowed neither the birds of the sky to rest on them by day, nor the animals of the field by night."],[11,"David was told what Rizpah the daughter of Aiah, the concubine of Saul, had done."],[12,"So David went and took the bones of Saul and the bones of Jonathan his son from the men of Jabesh Gilead, who had stolen them from the street of Beth Shan, where the Philistines had hanged them, in the day that the Philistines killed Saul in Gilboa;"],[13,"and he brought up from there the bones of Saul and the bones of Jonathan his son. They also gathered the bones of those who were hanged."],[14,"They buried the bones of Saul and Jonathan his son in the country of Benjamin in Zela, in the tomb of Kish his father: and they performed all that the king commanded. After that, God answered prayer for the land.",true],[15,"The Philistines had war again with Israel; and David went down, and his servants with him, and fought against the Philistines. David grew faint;"],[16,"and Ishbibenob, who was of the sons of the giant, the weight of whose spear was three hundred shekels of bronze in weight, he being armed with a new sword, thought he would kill David."],[17,"But Abishai the son of Zeruiah helped him, and struck the Philistine, and killed him. Then the men of David swore to him, saying, “Don’t go out with us to battle any more, so that you don’t quench the lamp of Israel.”",true],[18,"After this, there was again war with the Philistines at Gob. Then Sibbecai the Hushathite killed Saph, who was of the sons of the giant."],[19,"There was again war with the Philistines at Gob; and Elhanan the son of Jaare-Oregim the Bethlehemite killed Goliath the Gittite’s brother, the staff of whose spear was like a weaver’s beam."],[20,"There was again war at Gath, where there was a man of great stature, who had six fingers on every hand, and six toes on every foot, twenty four in count; and he also was born to the giant."],[21,"When he defied Israel, Jonathan the son of Shimei, David’s brother, killed him."],[22,"These four were born to the giant in Gath; and they fell by the hand of David, and by the hand of his servants.",true]],[[1,"David spoke to Yahweh the words of this song in the day that Yahweh delivered him out of the hand of all his enemies, and out of the hand of Saul,"],[2,"and he said: “Yahweh is my rock, my fortress, and my deliverer, even mine;"],[3,"God is my rock in whom I take refuge; my shield, and the horn of my salvation, my high tower, and my refuge. My savior, you save me from violence."],[4,"I call on Yahweh, who is worthy to be praised; So shall I be saved from my enemies."],[5,"For the waves of death surrounded me. The floods of ungodliness made me afraid."],[6,"The cords of Sheol were around me. The snares of death caught me."],[7,"In my distress, I called on Yahweh. Yes, I called to my God. He heard my voice out of his temple. My cry came into his ears."],[8,"Then the earth shook and trembled. The foundations of heaven quaked and were shaken, because he was angry."],[9,"Smoke went up out of his nostrils. Consuming fire came out of his mouth. Coals were kindled by it."],[10,"He bowed the heavens also, and came down. Thick darkness was under his feet."],[11,"He rode on a cherub, and flew. Yes, he was seen on the wings of the wind."],[12,"He made darkness a shelter around himself: gathering of waters, and thick clouds of the skies."],[13,"At the brightness before him, coals of fire were kindled."],[14,"Yahweh thundered from heaven. The Most High uttered his voice."],[15,"He sent out arrows, and scattered them; lightning, and confused them."],[16,"Then the channels of the sea appeared. The foundations of the world were laid bare by Yahweh’s rebuke, at the blast of the breath of his nostrils."],[17,"He sent from on high and he took me. He drew me out of many waters."],[18,"He delivered me from my strong enemy, from those who hated me, for they were too mighty for me."],[19,"They came on me in the day of my calamity, but Yahweh was my support."],[20,"He also brought me out into a large place. He delivered me, because he delighted in me."],[21,"Yahweh rewarded me according to my righteousness. He rewarded me according to the cleanness of my hands."],[22,"For I have kept Yahweh’s ways, and have not wickedly departed from my God."],[23,"For all his ordinances were before me. As for his statutes, I didn’t depart from them."],[24,"I was also perfect toward him. I kept myself from my iniquity."],[25,"Therefore Yahweh has rewarded me according to my righteousness, According to my cleanness in his eyesight."],[26,"With the merciful you will show yourself merciful. With the perfect man you will show yourself perfect."],[27,"With the pure you will show yourself pure. With the crooked you will show yourself shrewd."],[28,"You will save the afflicted people, But your eyes are on the arrogant, that you may bring them down."],[29,"For you are my lamp, Yahweh. Yahweh will light up my darkness."],[30,"For by you, I run against a troop. By my God, I leap over a wall."],[31,"As for God, his way is perfect. Yahweh’s word is tested. He is a shield to all those who take refuge in him."],[32,"For who is God, besides Yahweh? Who is a rock, besides our God?"],[33,"God is my strong fortress. He makes my way perfect."],[34,"He makes his feet like hinds’ feet, and sets me on my high places."],[35,"He teaches my hands to war, so that my arms bend a bow of bronze."],[36,"You have also given me the shield of your salvation. Your gentleness has made me great."],[37,"You have enlarged my steps under me. My feet have not slipped."],[38,"I have pursued my enemies and destroyed them. I didn’t turn again until they were consumed."],[39,"I have consumed them, and struck them through, so that they can’t arise. Yes, they have fallen under my feet."],[40,"For you have armed me with strength for the battle. You have subdued under me those who rose up against me."],[41,"You have also made my enemies turn their backs to me, that I might cut off those who hate me."],[42,"They looked, but there was no one to save; even to Yahweh, but he didn’t answer them."],[43,"Then I beat them as small as the dust of the earth. I crushed them as the mire of the streets, and spread them abroad."],[44,"You also have delivered me from the strivings of my people. You have kept me to be the head of the nations. A people whom I have not known will serve me."],[45,"The foreigners will submit themselves to me. As soon as they hear of me, they will obey me."],[46,"The foreigners will fade away, and will come trembling out of their close places."],[47,"Yahweh lives! Blessed be my rock! Exalted be God, the rock of my salvation,"],[48,"even the God who executes vengeance for me, who brings down peoples under me,"],[49,"who brings me away from my enemies. Yes, you lift me up above those who rise up against me. You deliver me from the violent man."],[50,"Therefore I will give thanks to you, Yahweh, among the nations, and will sing praises to your name."],[51,"He gives great deliverance to his king, and shows loving kindness to his anointed, to David and to his offspring, forever more.”",true]],[[1,"Now these are the last words of David. David the son of Jesse says, the man who was raised on high says, the anointed of the God of Jacob, the sweet psalmist of Israel:"],[2,"“Yahweh’s Spirit spoke by me. His word was on my tongue."],[3,"The God of Israel said, the Rock of Israel spoke to me, ‘One who rules over men righteously, who rules in the fear of God,"],[4,"shall be as the light of the morning, when the sun rises, a morning without clouds, when the tender grass springs out of the earth, through clear shining after rain.’"],[5,"Isn’t my house so with God? Yet he has made with me an everlasting covenant, ordered in all things, and sure, for it is all my salvation, and all my desire, although he doesn’t make it grow."],[6,"But all the ungodly will be as thorns to be thrust away, because they can’t be taken with the hand,"],[7,"But the man who touches them must be armed with iron and the staff of a spear. They will be utterly burned with fire in their place.”",true],[8,"These are the names of the mighty men whom David had: Josheb Basshebeth a Tahchemonite, chief of the captains; he was called Adino the Eznite, who killed eight hundred at one time."],[9,"After him was Eleazar the son of Dodai the son of an Ahohite, one of the three mighty men with David, when they defied the Philistines who were there gathered together to battle, and the men of Israel had gone away."],[10,"He arose and struck the Philistines until his hand was weary, and his hand froze to the sword; and Yahweh worked a great victory that day; and the people returned after him only to take plunder."],[11,"After him was Shammah the son of Agee a Hararite. The Philistines had gathered together into a troop, where there was a plot of ground full of lentils; and the people fled from the Philistines."],[12,"But he stood in the middle of the plot and defended it, and killed the Philistines; and Yahweh worked a great victory."],[13,"Three of the thirty chief men went down, and came to David in the harvest time to the cave of Adullam; and the troop of the Philistines was encamped in the valley of Rephaim."],[14,"David was then in the stronghold; and the garrison of the Philistines was then in Bethlehem."],[15,"David longed, and said, “Oh that someone would give me water to drink from the well of Bethlehem, which is by the gate!”",true],[16,"The three mighty men broke through the army of the Philistines, and drew water out of the well of Bethlehem that was by the gate, and took it and brought it to David; but he would not drink of it, but poured it out to Yahweh."],[17,"He said, “Be it far from me, Yahweh, that I should do this! Isn’t this the blood of the men who risked their lives to go?” Therefore he would not drink it. The three mighty men did these things.",true],[18,"Abishai, the brother of Joab, the son of Zeruiah, was chief of the three. He lifted up his spear against three hundred and killed them, and had a name among the three."],[19,"Wasn’t he most honorable of the three? Therefore he was made their captain. However he wasn’t included as one of the three."],[20,"Benaiah the son of Jehoiada, the son of a valiant man of Kabzeel, who had done mighty deeds, killed the two sons of Ariel of Moab. He also went down and killed a lion in the middle of a pit in a time of snow."],[21,"He killed a huge Egyptian, and the Egyptian had a spear in his hand; but he went down to him with a staff, and plucked the spear out of the Egyptian’s hand, and killed him with his own spear."],[22,"Benaiah the son of Jehoiada did these things, and had a name among the three mighty men."],[23,"He was more honorable than the thirty, but he didn’t attain to the three. David set him over his guard."],[24,"Asahel the brother of Joab was one of the thirty: Elhanan the son of Dodo of Bethlehem,"],[25,"Shammah the Harodite, Elika the Harodite,"],[26,"Helez the Paltite, Ira the son of Ikkesh the Tekoite,"],[27,"Abiezer the Anathothite, Mebunnai the Hushathite,"],[28,"Zalmon the Ahohite, Maharai the Netophathite,"],[29,"Heleb the son of Baanah the Netophathite, Ittai the son of Ribai of Gibeah of the children of Benjamin,"],[30,"Benaiah a Pirathonite, Hiddai of the brooks of Gaash."],[31,"Abialbon the Arbathite, Azmaveth the Barhumite,"],[32,"Eliahba the Shaalbonite, the sons of Jashen, Jonathan,"],[33,"Shammah the Hararite, Ahiam the son of Sharar the Ararite,"],[34,"Eliphelet the son of Ahasbai, the son of the Maacathite, Eliam the son of Ahithophel the Gilonite,"],[35,"Hezro the Carmelite, Paarai the Arbite,"],[36,"Igal the son of Nathan of Zobah, Bani the Gadite,"],[37,"Zelek the Ammonite, Naharai the Beerothite, armor bearers to Joab the son of Zeruiah,"],[38,"Ira the Ithrite, Gareb the Ithrite,"],[39,"and Uriah the Hittite: thirty-seven in all.",true]],[[1,"Again Yahweh’s anger burned against Israel, and he moved David against them, saying, “Go, count Israel and Judah.”"],[2,"The king said to Joab the captain of the army, who was with him, “Now go back and forth through all the tribes of Israel, from Dan even to Beersheba, and count the people, that I may know the sum of the people.”",true],[3,"Joab said to the king, “Now may Yahweh your God add to the people, however many they may be, one hundred times; and may the eyes of my lord the king see it. But why does my lord the king delight in this thing?”",true],[4,"Notwithstanding, the king’s word prevailed against Joab, and against the captains of the army. Joab and the captains of the army went out from the presence of the king to count the people of Israel."],[5,"They passed over the Jordan, and encamped in Aroer, on the right side of the city that is in the middle of the valley of Gad, and to Jazer;"],[6,"then they came to Gilead, and to the land of Tahtim Hodshi; and they came to Dan Jaan, and around to Sidon,"],[7,"and came to the stronghold of Tyre, and to all the cities of the Hivites, and of the Canaanites; and they went out to the south of Judah, at Beersheba."],[8,"So when they had gone back and forth through all the land, they came to Jerusalem at the end of nine months and twenty days."],[9,"Joab gave up the sum of the counting of the people to the king: and there were in Israel eight hundred thousand valiant men who drew the sword; and the men of Judah were five hundred thousand men."],[10,"David’s heart struck him after he had counted the people. David said to Yahweh, “I have sinned greatly in that which I have done. But now, Yahweh, put away, I beg you, the iniquity of your servant; for I have done very foolishly.”",true],[11,"When David rose up in the morning, Yahweh’s word came to the prophet Gad, David’s seer, saying,"],[12,"“Go and speak to David, ‘Yahweh says, “I offer you three things. Choose one of them, that I may do it to you.” ’ ”",true],[13,"So Gad came to David, and told him, and said to him, “Shall seven years of famine come to you in your land? Or will you flee three months before your foes while they pursue you? Or shall there be three days’ pestilence in your land? Now answer, and consider what answer I shall return to him who sent me.”",true],[14,"David s  to Yahweh there, and offered burnt offerings and peace offerings. So Yahweh was entreated for the land, and the plague was removed from Israel.",true]]]}}]};

(function () {
  'use strict';

  var BOOK_BY_SLUG = {};
  DATA.books.forEach(function (b) { BOOK_BY_SLUG[b.slug] = b; });
  var DEFAULT_SLUG = DATA.books[0].slug;
  var TRANSLATIONS = DATA.translations.map(function (t) { return t.abbrev; });
  var TRANSLATION_META = {};
  DATA.translations.forEach(function (t) { TRANSLATION_META[t.abbrev] = t; });

  var els = {
    root: document.documentElement,
    themeToggle: document.getElementById('theme-toggle'),
    translationToggle: document.getElementById('translation-toggle'),
    translationButtons: Array.prototype.slice.call(document.querySelectorAll('#translation-toggle button')),
    translationName: document.getElementById('translation-name'),
    bookSelect: document.getElementById('book-select'),
    chapterSelect: document.getElementById('chapter-select'),
    prevBtn: document.getElementById('prev-chapter'),
    nextBtn: document.getElementById('next-chapter'),
    searchInput: document.getElementById('search-input'),
    searchResults: document.getElementById('search-results'),
    formalTitle: document.getElementById('formal-title'),
    chapterHeading: document.getElementById('chapter-heading'),
    verses: document.getElementById('verses'),
    notesSection: document.getElementById('notes'),
    notesList: document.getElementById('notes-list')
  };

  var pendingHighlight = null;

  // ---------------------------------------------------------------- theme --

  function applyTheme(theme) {
    if (theme === 'light' || theme === 'dark') {
      els.root.setAttribute('data-theme', theme);
    } else {
      els.root.removeAttribute('data-theme');
    }
  }

  function currentEffectiveTheme() {
    var explicit = els.root.getAttribute('data-theme');
    if (explicit) return explicit;
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    return prefersDark ? 'dark' : 'light';
  }

  (function initTheme() {
    var stored = null;
    try { stored = localStorage.getItem('samuel-theme'); } catch (e) { /* ignore */ }
    if (stored === 'light' || stored === 'dark') applyTheme(stored);
  })();

  els.themeToggle.addEventListener('click', function () {
    var next = currentEffectiveTheme() === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    try { localStorage.setItem('samuel-theme', next); } catch (e) { /* ignore */ }
  });

  // ------------------------------------------------------------- routing --

  function parseHash() {
    var raw = (location.hash || '').replace(/^#\/?/, '');
    var parts = raw.split('/').filter(Boolean);
    var translation = (parts[0] || '').toUpperCase();
    var slug = parts[1] || '';
    var chapter = parseInt(parts[2], 10);

    if (TRANSLATIONS.indexOf(translation) === -1) translation = 'KJV';
    if (!BOOK_BY_SLUG[slug]) slug = DEFAULT_SLUG;
    var book = BOOK_BY_SLUG[slug];
    if (!chapter || chapter < 1 || chapter > book.chapterCount) chapter = 1;

    return { translation: translation, slug: slug, chapter: chapter };
  }

  function hashFor(translation, slug, chapter) {
    return '#/' + translation.toLowerCase() + '/' + slug + '/' + chapter;
  }

  function navigate(translation, slug, chapter) {
    var target = hashFor(translation, slug, chapter);
    if (location.hash === target) {
      render();
      return;
    }
    location.hash = target;
  }

  // ------------------------------------------------------------ helpers --

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function renderBrackets(escaped) {
    return escaped.replace(/\[([^\]]+)\]/g, '<em>$1</em>');
  }

  function plainOf(display) {
    return display.replace(/[[\]]/g, '');
  }

  function decodeVerse(tuple) {
    var v = tuple[0];
    var display = tuple[1];
    var notes = null;
    var para = false;
    for (var i = 2; i < tuple.length; i++) {
      var el = tuple[i];
      if (Array.isArray(el)) notes = el;
      else if (el === true) para = true;
    }
    return { v: v, display: display, notes: notes, para: para };
  }

  function flashHighlight(el) {
    if (!el) return;
    el.classList.add('highlight');
    setTimeout(function () { el.classList.remove('highlight'); }, 2200);
  }

  // ------------------------------------------------------------ render --

  function populateBookSelect() {
    DATA.books.forEach(function (b) {
      var opt = document.createElement('option');
      opt.value = b.slug;
      opt.textContent = b.name;
      els.bookSelect.appendChild(opt);
    });
  }

  function renderControls(state) {
    var meta = TRANSLATION_META[state.translation];
    els.translationName.textContent = meta.name + (meta.year ? ' (' + meta.year + ')' : '');

    els.translationButtons.forEach(function (btn) {
      var pressed = btn.getAttribute('data-translation').toUpperCase() === state.translation;
      btn.setAttribute('aria-pressed', String(pressed));
    });

    if (els.bookSelect.value !== state.slug) els.bookSelect.value = state.slug;

    var book = BOOK_BY_SLUG[state.slug];
    if (els.chapterSelect.childElementCount !== book.chapterCount) {
      els.chapterSelect.innerHTML = '';
      for (var i = 1; i <= book.chapterCount; i++) {
        var opt = document.createElement('option');
        opt.value = String(i);
        opt.textContent = 'Chapter ' + i;
        els.chapterSelect.appendChild(opt);
      }
    }
    els.chapterSelect.value = String(state.chapter);

    els.prevBtn.disabled = state.chapter <= 1;
    els.nextBtn.disabled = state.chapter >= book.chapterCount;
  }

  function verseHtml(tuple) {
    var d = decodeVerse(tuple);
    var escaped = renderBrackets(escapeHtml(d.display));
    var noteMark = '';
    if (d.notes && d.notes.length) {
      noteMark = ' <sup><button type="button" class="note-mark" data-note-target="note-' +
        d.v + '" aria-label="Note on verse ' + d.v + '">&dagger;</button></sup>';
    }
    return '<span class="verse" id="v' + d.v + '" data-v="' + d.v + '"><sup class="vnum">' +
      d.v + '</sup>' + escaped + noteMark + '</span>';
  }

  function noteHtml(d) {
    var body = d.notes.map(escapeHtml).join(' &mdash; ');
    return '<li id="note-' + d.v + '"><button type="button" class="note-back" data-verse-target="' +
      d.v + '">' + d.v + '</button>. ' + body + '</li>';
  }

  function renderChapter(state) {
    var book = BOOK_BY_SLUG[state.slug];
    var tuples = book.chapters[state.translation][state.chapter - 1];

    document.title = book.name + ' ' + state.chapter + ' (' + state.translation + ') – The Books of Samuel';
    els.formalTitle.textContent = book.titles[state.translation];
    els.chapterHeading.textContent = book.name + ' ' + state.chapter;

    var versesHtml = '';
    var notesHtml = '';
    var hasNotes = false;
    var buf = [];

    function flushPara() {
      if (buf.length) {
        versesHtml += '<p>' + buf.join(' ') + '</p>';
        buf = [];
      }
    }

    tuples.forEach(function (t) {
      var d = decodeVerse(t);
      buf.push(verseHtml(t));
      if (d.notes && d.notes.length) {
        hasNotes = true;
        notesHtml += noteHtml(d);
      }
      if (d.para) flushPara();
    });
    flushPara();

    els.verses.innerHTML = versesHtml;
    els.notesList.innerHTML = notesHtml;
    els.notesSection.hidden = !hasNotes;

    if (pendingHighlight != null) {
      var target = document.getElementById('v' + pendingHighlight);
      if (target) {
        target.scrollIntoView({ block: 'center', behavior: 'smooth' });
        flashHighlight(target);
      }
      pendingHighlight = null;
    } else {
      window.scrollTo({ top: 0, behavior: 'auto' });
    }
  }

  function normalizeUrl(state) {
    var canonical = hashFor(state.translation, state.slug, state.chapter);
    if (location.hash !== canonical) {
      history.replaceState(null, '', canonical);
    }
  }

  function render() {
    var state = parseHash();
    normalizeUrl(state);
    renderControls(state);
    renderChapter(state);
  }

  // ------------------------------------------------------------- search --

  function runSearch(query) {
    query = query.trim();
    if (query.length < 2) {
      els.searchResults.hidden = true;
      els.searchResults.innerHTML = '';
      return;
    }
    var state = parseHash();
    var needle = query.toLowerCase();
    var results = [];
    var MAX = 60;

    for (var bi = 0; bi < DATA.books.length && results.length < MAX; bi++) {
      var book = DATA.books[bi];
      var chapters = book.chapters[state.translation];
      for (var ci = 0; ci < chapters.length && results.length < MAX; ci++) {
        var tuples = chapters[ci];
        for (var vi = 0; vi < tuples.length && results.length < MAX; vi++) {
          var d = decodeVerse(tuples[vi]);
          var plain = plainOf(d.display);
          var idx = plain.toLowerCase().indexOf(needle);
          if (idx !== -1) {
            results.push({
              slug: book.slug,
              name: book.name,
              chapter: ci + 1,
              verse: d.v,
              plain: plain,
              idx: idx,
              len: needle.length
            });
          }
        }
      }
    }

    renderSearchResults(results, query, state.translation);
  }

  function renderSearchResults(results, query, translation) {
    if (!results.length) {
      els.searchResults.innerHTML = '<p class="search-empty">No matches for &ldquo;' +
        escapeHtml(query) + '&rdquo; in ' + translation + '.</p>';
      els.searchResults.hidden = false;
      return;
    }
    var html = '<p class="search-meta">' + results.length + (results.length >= 60 ? '+' : '') +
      ' match' + (results.length === 1 ? '' : 'es') + ' in ' + translation + '</p><ol>';
    results.forEach(function (r) {
      var start = Math.max(0, r.idx - 40);
      var end = Math.min(r.plain.length, r.idx + r.len + 40);
      var snippet = (start > 0 ? '…' : '') +
        escapeHtml(r.plain.slice(start, r.idx)) +
        '<mark>' + escapeHtml(r.plain.slice(r.idx, r.idx + r.len)) + '</mark>' +
        escapeHtml(r.plain.slice(r.idx + r.len, end)) +
        (end < r.plain.length ? '…' : '');
      html += '<li><button type="button" class="result" data-slug="' + r.slug +
        '" data-chapter="' + r.chapter + '" data-verse="' + r.verse + '">' +
        '<span class="ref">' + r.name + ' ' + r.chapter + ':' + r.verse + '</span>' +
        '<span class="snippet">' + snippet + '</span>' +
        '</button></li>';
    });
    html += '</ol>';
    els.searchResults.innerHTML = html;
    els.searchResults.hidden = false;
  }

  function refreshSearchIfOpen() {
    if (!els.searchResults.hidden && els.searchInput.value.trim().length >= 2) {
      runSearch(els.searchInput.value);
    }
  }

  var searchDebounce = null;
  els.searchInput.addEventListener('input', function () {
    clearTimeout(searchDebounce);
    var q = els.searchInput.value;
    searchDebounce = setTimeout(function () { runSearch(q); }, 120);
  });
  els.searchInput.addEventListener('focus', function () {
    if (els.searchInput.value.trim().length >= 2) runSearch(els.searchInput.value);
  });
  els.searchInput.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      els.searchResults.hidden = true;
      els.searchInput.blur();
    }
  });
  els.searchResults.addEventListener('click', function (e) {
    var btn = e.target.closest ? e.target.closest('button.result') : null;
    if (!btn) return;
    var state = parseHash();
    pendingHighlight = parseInt(btn.getAttribute('data-verse'), 10);
    els.searchResults.hidden = true;
    navigate(state.translation, btn.getAttribute('data-slug'), parseInt(btn.getAttribute('data-chapter'), 10));
  });
  document.addEventListener('click', function (e) {
    if (e.target !== els.searchInput && !els.searchResults.contains(e.target)) {
      els.searchResults.hidden = true;
    }
  });

  // -------------------------------------------------------------- events --

  els.translationButtons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      var state = parseHash();
      navigate(btn.getAttribute('data-translation'), state.slug, state.chapter);
      refreshSearchIfOpen();
    });
  });

  els.bookSelect.addEventListener('change', function () {
    var state = parseHash();
    navigate(state.translation, els.bookSelect.value, 1);
  });

  els.chapterSelect.addEventListener('change', function () {
    var state = parseHash();
    navigate(state.translation, state.slug, parseInt(els.chapterSelect.value, 10));
  });

  els.prevBtn.addEventListener('click', function () {
    var state = parseHash();
    if (state.chapter > 1) navigate(state.translation, state.slug, state.chapter - 1);
  });
  els.nextBtn.addEventListener('click', function () {
    var state = parseHash();
    var book = BOOK_BY_SLUG[state.slug];
    if (state.chapter < book.chapterCount) navigate(state.translation, state.slug, state.chapter + 1);
  });

  document.addEventListener('keydown', function (e) {
    var tag = ((document.activeElement && document.activeElement.tagName) || '').toLowerCase();
    if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
    if (e.key === 'ArrowLeft') els.prevBtn.click();
    else if (e.key === 'ArrowRight') els.nextBtn.click();
  });

  els.verses.addEventListener('click', function (e) {
    var btn = e.target.closest ? e.target.closest('.note-mark') : null;
    if (!btn) return;
    var target = document.getElementById(btn.getAttribute('data-note-target'));
    if (target) {
      els.notesSection.hidden = false;
      target.scrollIntoView({ block: 'center', behavior: 'smooth' });
      flashHighlight(target);
    }
  });

  els.notesList.addEventListener('click', function (e) {
    var btn = e.target.closest ? e.target.closest('.note-back') : null;
    if (!btn) return;
    var target = document.getElementById('v' + btn.getAttribute('data-verse-target'));
    if (target) {
      target.scrollIntoView({ block: 'center', behavior: 'smooth' });
      flashHighlight(target);
    }
  });

  window.addEventListener('hashchange', render);

  // --------------------------------------------------------------- init --

  populateBookSelect();
  render();
})();
  </script>
</body>
