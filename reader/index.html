Abner with the back end of the spear struck him in the body, so that the spear came out behind him; and he fell down there, and died in the same place. As many as came to the place where Asahel fell down and died stood still."],[24,"But Joab and Abishai pursued Abner. The sun went down when they had come to the hill of Ammah, that lies before Giah by the way of the wilderness of Gibeon."],[25,"The children of Benjamin gathered themselves together after Abner, and became one band, and stood on the top of a hill."],[26,"Then Abner called to Joab, and said, “Shall the sword devour forever? Don’t you know that it will be bitterness in the latter end? How long will it be then, before you ask the people to return from following their brothers?”",true],[27,"Joab said, “As God lives, if you had not spoken, surely then in the morning the people would have gone away, and not each followed his brother.”"],[28,"So Joab blew the trumpet; and all the people stood still, and pursued Israel no more, and they fought no more."],[29,"Abner and his men went all that night through the Arabah; and they passed over the Jordan, and went through all Bithron, and came to Mahanaim."],[30,"Joab returned from following Abner; and when he had gathered all the people together, nineteen men of David’s and Asahel were missing."],[31,"But David’s servants had struck Benjamin and of Abner’s men so that three hundred sixty men died."],[32,"They took up Asahel, and buried him in the tomb of his father, which was in Bethlehem. Joab and his men went all night, and the day broke on them at Hebron.",true]],[[1,"Now there was long war between Saul’s house and David’s house. David grew stronger and stronger, but Saul’s house grew weaker and weaker."],[2,"Sons were born to David in Hebron. His firstborn was Amnon, of Ahinoam the Jezreelitess;"],[3,"and his second, Chileab, of Abigail the wife of Nabal the Carmelite; and the third, Absalom the son of Maacah the daughter of Talmai king of Geshur;"],[4,"and the fourth, Adonijah the son of Haggith; and the fifth, Shephatiah the son of Abital;"],[5,"and the sixth, Ithream, of Eglah, David’s wife. These were born to David in Hebron.",true],[6,"While there was war between Saul’s house and David’s house, Abner made himself strong in Saul’s house."],[7,"Now Saul had a concubine, whose name was Rizpah, the daughter of Aiah; and Ishbosheth said to Abner, “Why have you gone in to my father’s concubine?”",true],[8,"Then Abner was very angry about Ishbosheth’s words, and said, “Am I a dog’s head that belongs to Judah? Today I show kindness to Saul’s house your father, to his brothers, and to his friends, and have not delivered you into the hand of David; and yet you charge me today with a fault concerning this woman!"],[9,"God do so to Abner, and more also, if, as Yahweh has sworn to David, I don’t do even so to him;"],[10,"to transfer the kingdom from Saul’s house, and to set up David’s throne over Israel and over Judah, from Dan even to Beersheba.”",true],[11,"He could not answer Abner another word, because he was afraid of him.",true],[12,"Abner sent messengers to David on his behalf, saying, “Whose is the land?” and saying, “Make your alliance with me, and behold, my hand will be with you, to bring all Israel around to you.”",true],[13,"He said, “Good. I will make a treaty with you, but one thing I require of you. That is, you will not see my face unless you first bring Michal, Saul’s daughter, when you come to see my face.”",true],[14,"David sent messengers to Ishbosheth, Saul’s son, saying, “Deliver me my wife Michal, whom I was given to marry for one hundred foreskins of the Philistines.”",true],[15,"Ishbosheth sent and took her from her husband, even from Paltiel the son of Laish."],[16,"Her husband went with her, weeping as he went, and followed her to Bahurim. Then Abner said to him, “Go! Return!” and he returned."],[17,"Abner had communication with the elders of Israel, saying, “In times past, you sought for David to be king over you."],[18,"Now then do it; for Yahweh has spoken of David, saying, ‘By the hand of my servant David, I will save my people Israel out of the hand of the Philistines, and out of the hand of all their enemies.’ ”",true],[19,"Abner also spoke in the ears of Benjamin: and Abner went also to speak in the ears of David in Hebron all that seemed good to Israel, and to the whole house of Benjamin."],[20,"So Abner came to David to Hebron, and twenty men with him. David made Abner and the men who were with him a feast."],[21,"Abner said to David, “I will arise and go, and will gather all Israel to my lord the king, that they may make a covenant with you, and that you may reign over all that your soul desires.” David sent Abner away; and he went in peace.",true],[22,"Behold, David’s servants and Joab came from a raid, and brought in a great plunder with them; but Abner was not with David in Hebron; for he had sent him away, and he had gone in peace."],[23,"When Joab and all the army who was with him had come, they told Joab, “Abner the son of Ner came to the king, and he has sent him away, and he has gone in peace.”",true],[24,"Then Joab came to the king, and said, “What have you done? Behold, Abner came to you. Why is it that you have sent him away, and he is already gone?"],[25,"You know Abner the son of Ner. He came to deceive you, and to know your going out and your coming in, and to know all that you do.”",true],[26,"When Joab had come out from David, he sent messengers after Abner, and they brought him back from the well of Sirah; but David didn’t know it."],[27,"When Abner was returned to Hebron, Joab took him aside into the middle of the gate to speak with him quietly, and struck him there in the body, so that he died, for the blood of Asahel his brother."],[28,"Afterward, when David heard it, he said, “I and my kingdom are guiltless before Yahweh forever of the blood of Abner the son of Ner."],[29,"Let it fall on the head of Joab, and on all his father’s house. Let there not fail from the house of Joab one who has a discharge, or who is a leper, or who leans on a staff, or who falls by the sword, or who lacks bread.”"],[30,"So Joab and Abishai his brother killed Abner, because he had killed their brother Asahel at Gibeon in the battle."],[31,"David said to Joab, and to all the people who were with him, “Tear your clothes, and clothe yourselves with sackcloth, and mourn in front of Abner.” King David followed the bier."],[32,"They buried Abner in Hebron; and the king lifted up his voice, and wept at Abner’s grave; and all the people wept."],[33,"The king lamented for Abner, and said, “Should Abner die as a fool dies?"],[34,"Your hands weren’t bound, and your feet weren’t put into fetters. As a man falls before the children of iniquity, so you fell.” All the people wept again over him."],[35,"All the people came to urge David to eat bread while it was yet day; but David swore, saying, “God do so to me, and more also, if I taste bread, or anything else, until the sun goes down.”",true],[36,"All the people took notice of it, and it pleased them; as whatever the king did pleased all the people."],[37,"So all the people and all Israel understood that day that it was not of the king to kill Abner the son of Ner."],[38,"The king said to his servants, “Don’t you know that a prince and a great man has fallen today in Israel?"],[39,"I am weak today, though anointed king. These men, the sons of Zeruiah are too hard for me. May Yahweh reward the evildoer according to his wickedness.”",true]],[[1,"When Saul’s son heard that Abner was dead in Hebron, his hands became feeble, and all the Israelites were troubled."],[2,"Saul’s son had two men who were captains of raiding bands. The name of one was Baanah, and the name of the other Rechab, the sons of Rimmon the Beerothite, of the children of Benjamin (for Beeroth also is considered a part of Benjamin:"],[3,"and the Beerothites fled to Gittaim, and have lived as foreigners there until today)."],[4,"Now Jonathan, Saul’s son, had a son who was lame in his feet. He was five years old when the news came about Saul and Jonathan out of Jezreel; and his nurse picked him up and fled. As she hurried to flee, he fell and became lame. His name was Mephibosheth."],[5,"The sons of Rimmon the Beerothite, Rechab and Baanah, went and came at about the heat of the day to the house of Ishbosheth, as he took his rest at noon."],[6,"They came there into the middle of the house, as though they would have fetched wheat; and they struck him in the body: and Rechab and Baanah his brother escaped."],[7,"Now when they came into the house, as he lay on his bed in his bedroom, they struck him, killed him, beheaded him, and took his head, and went by the way of the Arabah all night."],[8,"They brought the head of Ishbosheth to David to Hebron, and said to the king, “Behold, the head of Ishbosheth, the son of Saul, your enemy, who sought your life! Yahweh has avenged my lord the king today of Saul, and of his offspring.”",true],[9,"David answered Rechab and Baanah his brother, the sons of Rimmon the Beerothite, and said to them, “As Yahweh lives, who has redeemed my soul out of all adversity,"],[10,"when someone told me, ‘Behold, Saul is dead,’ thinking that he brought good news, I seized him and killed him in Ziklag, which was the reward I gave him for his news."],[11,"How much more, when wicked men have slain a righteous person in his own house on his bed, should I not now require his blood from your hand, and rid the earth of you?”"],[12,"David commanded his young men, and they killed them, cut off their hands and their feet, and hanged them up beside the pool in Hebron. But they took the head of Ishbosheth, and buried it in Abner’s grave in Hebron.",true]],[[1,"Then all the tribes of Israel came to David at Hebron, and spoke, saying, “Behold, we are your bone and your flesh."],[2,"In times past, when Saul was king over us, it was you who led Israel out and in. Yahweh said to you, ‘You will be shepherd of my people Israel, and you will be prince over Israel.’ ”"],[3,"So all the elders of Israel came to the king to Hebron, and king David made a covenant with them in Hebron before Yahweh; and they anointed David king over Israel.",true],[4,"David was thirty years old when he began to reign, and he reigned forty years."],[5,"In Hebron he reigned over Judah seven years and six months; and in Jerusalem he reigned thirty-three years over all Israel and Judah."],[6,"The king and his men went to Jerusalem against the Jebusites, the inhabitants of the land, who spoke to David, saying, “The blind and the lame will keep you out of here;” thinking, “David can’t come in here.”"],[7,"Nevertheless David took the stronghold of Zion. This is David’s city."],[8,"David said on that day, “Whoever strikes the Jebusites, let him go up to the watercourse and strike those lame and blind, who are hated by David’s soul.” Therefore they say, “The blind and the lame can’t come into the house.”",true],[9,"David lived in the stronghold, and called it David’s city. David built around from Millo and inward."],[10,"David grew greater and greater; for Yahweh, the God of Armies, was with him."],[11,"Hiram king of Tyre sent messengers to David, with cedar trees, carpenters, and masons; and they built David a house."],[12,"David perceived that Yahweh had established him king over Israel, and that he had exalted his kingdom for his people Israel’s sake."],[13,"David took more concubines and wives for himself out of Jerusalem, after he had come from Hebron; and more sons and daughters were born to David."],[14,"These are the names of those who were born to him in Jerusalem: Shammua, Shobab, Nathan, Solomon,"],[15,"Ibhar, Elishua, Nepheg, Japhia,"],[16,"Elishama, Eliada, and Eliphelet.",true],[17,"When the Philistines heard that they had anointed David king over Israel, all the Philistines went up to seek David, but David heard about it and went down to the stronghold."],[18,"Now the Philistines had come and spread themselves in the valley of Rephaim."],[19,"David inquired of Yahweh, saying, “Shall I go up against the Philistines? Will you deliver them into my hand?” Yahweh said to David, “Go up; for I will certainly deliver the Philistines into your hand.”",true],[20,"David came to Baal Perazim, and David struck them there. Then he said, “Yahweh has broken my enemies before me, like the breach of waters.” Therefore he called the name of that place Baal Perazim."],[21,"They left their images there; and David and his men took them away.",true],[22,"The Philistines came up yet again, and spread themselves in the valley of Rephaim."],[23,"When David inquired of Yahweh, he said, “You shall not go up. Circle around behind them, and attack them in front of the mulberry trees."],[24,"When you hear the sound of marching in the tops of the mulberry trees, then stir yourself up; for then Yahweh has gone out before you to strike the army of the Philistines.”",true],[25,"David did so, as Yahweh commanded him, and struck the Philistines all the way from Geba to Gezer.",true]],[[1,"David again gathered together all the chosen men of Israel, thirty thousand."],[2,"David arose, and went with all the people who were with him, from Baale Judah, to bring up from there God’s ark, which is called by the Name, even the name of Yahweh of Armies who sits above the cherubim."],[3,"They set God’s ark on a new cart, and brought it out of Abinadab’s house that was on the hill; and Uzzah and Ahio, the sons of Abinadab, drove the new cart."],[4,"They brought it out of Abinadab’s house, which was in the hill, with God’s ark; and Ahio went before the ark."],[5,"David and all the house of Israel played before Yahweh with all kinds of instruments made of cypress wood, with harps, with stringed instruments, with tambourines, with castanets, and with cymbals."],[6,"When they came to the threshing floor of Nacon, Uzzah reached for God’s ark, and took hold of it; for the cattle stumbled."],[7,"Yahweh’s anger burned against Uzzah; and God struck him there for his error; and he died there by God’s ark."],[8,"David was displeased, because Yahweh had broken out against Uzzah; and he called that place Perez Uzzah, to this day."],[9,"David was afraid of Yahweh that day; and he said, “How could Yahweh’s ark come to me?”"],[10,"So David would not move Yahweh’s ark to be with him in David’s city; but David carried it aside into Obed-Edom the Gittite’s house."],[11,"Yahweh’s ark remained in Obed-Edom the Gittite’s house three months; and Yahweh blessed Obed-Edom and all his house."],[12,"King David was told, “Yahweh has blessed the house of Obed-Edom, and all that belongs to him, because of God’s ark.” So David went and brought up God’s ark from the house of Obed-Edom into David’s city with joy."],[13,"When those who bore Yahweh’s ark had gone six paces, he sacrificed an ox and a fattened calf."],[14,"David danced before Yahweh with all his might; and David was clothed in a linen ephod."],[15,"So David and all the house of Israel brought up Yahweh’s ark with shouting, and with the sound of the trumpet.",true],[16,"As Yahweh’s ark came into David’s city, Michal the daughter of Saul looked out through the window, and saw king David leaping and dancing before Yahweh; and she despised him in her heart."],[17,"They brought in Yahweh’s ark, and set it in its place, in the middle of the tent that David had pitched for it; and David offered burnt offerings and peace offerings before Yahweh."],[18,"When David had finished offering the burnt offering and the peace offerings, he blessed the people in the name of Yahweh of Armies."],[19,"He gave to all the people, even among the whole multitude of Israel, both to men and women, to everyone a portion of bread, dates, and raisins. So all the people departed, each to his own house."],[20,"Then David returned to bless his household. Michal the daughter of Saul came out to meet David, and said, “How glorious the king of Israel was today, who uncovered himself today in the eyes of his servants’ maids, as one of the vain fellows shamelessly uncovers himself!”",true],[21,"David said to Michal, “It was before Yahweh, who chose me above your father, and above all his house, to appoint me prince over the people of Yahweh, over Israel. Therefore I will celebrate before Yahweh."],[22,"I will be yet more vile than this, and will be worthless in my own sight. But the maids of whom you have spoken will honor me.”",true],[23,"Michal the daughter of Saul had no child to the day of her death.",true]],[[1,"When the king lived in his house, and Yahweh had given him rest from all his enemies all around,"],[2,"the king said to Nathan the prophet, “See now, I dwell in a house of cedar, but God’s ark dwells within curtains.”",true],[3,"Nathan said to the king, “Go, do all that is in your heart; for Yahweh is with you.”",true],[4,"That same night, Yahweh’s word came to Nathan, saying,"],[5,"“Go and tell my servant David, ‘Yahweh says, “Should you build me a house for me to dwell in?"],[6,"For I have not lived in a house since the day that I brought the children of Israel up out of Egypt, even to this day, but have moved around in a tent and in a tabernacle."],[7,"In all places in which I have walked with all the children of Israel, did I say a word to any of the tribes of Israel, whom I commanded to be shepherd of my people Israel, saying, ‘Why have you not built me a house of cedar?’ ” ’"],[8,"Now therefore tell my servant David this, ‘Yahweh of Armies says, “I took you from the sheep pen, from following the sheep, to be prince over my people, over Israel."],[9,"I have been with you wherever you went, and have cut off all your enemies from before you. I will make you a great name, like the name of the great ones who are in the earth."],[10,"I will appoint a place for my people Israel, and will plant them, that they may dwell in their own place, and be moved no more. The children of wickedness will not afflict them any more, as at the first,"],[11,"and as from the day that I commanded judges to be over my people Israel. I will cause you to rest from all your enemies. Moreover Yahweh tells you that Yahweh will make you a house."],[12,"When your days are fulfilled, and you sleep with your fathers, I will set up your offspring after you, who will proceed out of your body, and I will establish his kingdom."],[13,"He will build a house for my name, and I will establish the throne of his kingdom forever."],[14,"I will be his father, and he will be my son. If he commits iniquity, I will chasten him with the rod of men, and with the stripes of the children of men;"],[15,"but my loving kindness will not depart from him, as I took it from Saul, whom I put away before you."],[16,"Your house and your kingdom will be made sure forever before you. Your throne will be established forever.” ’ ”"],[17,"Nathan spoke to David all these words, and according to all this vision.",true],[18,"Then David the king went in, and sat before Yahweh; and he said, “Who am I, Lord Yahweh, and what is my house, that you have brought me this far?"],[19,"This was yet a small thing in your eyes, Lord Yahweh; but you have spoken also of your servant’s house for a great while to come; and this among men, Lord Yahweh!"],[20,"What more can David say to you? For you know your servant, Lord Yahweh."],[21,"For your word’s sake, and according to your own heart, you have worked all this greatness, to make your servant know it."],[22,"Therefore you are great, Yahweh God. For there is no one like you, neither is there any God besides you, according to all that we have heard with our ears."],[23,"What one nation in the earth is like your people, even like Israel, whom God went to redeem to himself for a people, and to make himself a name, and to do great things for you, and awesome things for your land, before your people, whom you redeemed to yourself out of Egypt, from the nations and their gods?"],[24,"You established for yourself your people Israel to be your people forever; and you, Yahweh, became their God."],[25,"Now, Yahweh God, the word that you have spoken concerning your servant, and concerning his house, confirm it forever, and do as you have spoken."],[26,"Let your name be magnified forever, saying, ‘Yahweh of Armies is God over Israel; and the house of your servant David will be established before you.’"],[27,"For you, Yahweh of Armies, the God of Israel, have revealed to your servant, saying, ‘I will build you a house.’ Therefore your servant has found in his heart to pray this prayer to you.",true],[28,"“Now, O Lord Yahweh, you are God, and your words are truth, and you have promised this good thing to your servant."],[29,"Now therefore let it please you to bless the house of your servant, that it may continue forever before you; for you, Lord Yahweh, have spoken it. Let the house of your servant be blessed forever with your blessing.”",true]],[[1,"After this, David struck the Philistines and subdued them; and David took the bridle of the mother city out of the hand of the Philistines."],[2,"He struck Moab, and measured them with the line, making them to lie down on the ground; and he measured two lines to put to death, and one full line to keep alive. The Moabites became servants to David, and brought tribute."],[3,"David struck also Hadadezer the son of Rehob, king of Zobah, as he went to recover his dominion at the River."],[4,"David took from him one thousand seven hundred horsemen and twenty thousand footmen. David hamstrung all the chariot horses, but reserved of them for one hundred chariots."],[5,"When the Syrians of Damascus came to help Hadadezer king of Zobah, David struck twenty two thousand men of the Syrians."],[6,"Then David put garrisons in Syria of Damascus; and the Syrians became servants to David, and brought tribute. Yahweh gave victory to David wherever he went."],[7,"David took the shields of gold that were on the servants of Hadadezer, and brought them to Jerusalem."],[8,"From Betah and from Berothai, cities of Hadadezer, king David took a great quantity of bronze."],[9,"When Toi king of Hamath heard that David had struck all the army of Hadadezer,"],[10,"then Toi sent Joram his son to king David, to greet him, and to bless him, because he had fought against Hadadezer and struck him; for Hadadezer had wars with Toi. Joram brought with him vessels of silver, vessels of gold, and vessels of bronze."],[11,"King David also dedicated these to Yahweh, with the silver and gold that he dedicated of all the nations which he subdued;"],[12,"of Syria, of Moab, of the children of Ammon, of the Philistines, of Amalek, and of the plunder of Hadadezer, son of Rehob, king of Zobah.",true],[13,"David earned a reputation when he returned from striking down eighteen thousand men of the Syrians in the Valley of Salt."],[14,"He put garrisons in Edom. Throughout all Edom, he put garrisons, and all the Edomites became servants to David. Yahweh gave victory to David wherever he went."],[15,"David reigned over all Israel; and David executed justice and righteousness for all his people."],[16,"Joab the son of Zeruiah was over the army, Jehoshaphat the son of Ahilud was recorder,"],[17,"Zadok the son of Ahitub and Ahimelech the son of Abiathar were priests, Seraiah was scribe,"],[18,"Benaiah the son of Jehoiada was over the Cherethites and the Pelethites, and David’s sons were chief ministers.",true]],[[1,"David said, “Is there yet any who is left of Saul’s house, that I may show him kindness for Jonathan’s sake?”"],[2,"There was of Saul’s house a servant whose name was Ziba, and they called him to David; and the king said to him, “Are you Ziba?” He said, “I am your servant.”",true],[3,"The king said, “Is there not yet any of Saul’s house, that I may show the kindness of God to him?” Ziba said to the king, “Jonathan still has a son, who is lame in his feet.”",true],[4,"The king said to him, “Where is he?” Ziba said to the king, “Behold, he is in the house of Machir the son of Ammiel, in Lo Debar.”",true],[5,"Then king David sent, and brought him out of the house of Machir the son of Ammiel, from Lo Debar."],[6,"Mephibosheth, the son of Jonathan, the son of Saul, came to David, and fell on his face, and showed respect. David said, “Mephibosheth.” He answered, “Behold, your servant!”",true],[7,"David said to him, “Don’t be afraid; for I will surely show you kindness for Jonathan your father’s sake, and will restore to you all the land of Saul your father. You will eat bread at my table continually.”",true],[8,"He bowed down, and said, “What is your servant, that you should look at such a dead dog as I am?”"],[9,"Then the king called to Ziba, Saul’s servant, and said to him, “All that belonged to Saul and to all his house I have given to your master’s son."],[10,"Till the land for him, you, your sons, and your servants. Bring in the harvest, that your master’s son may have bread to eat; but Mephibosheth your master’s son will always eat bread at my table.” Now Ziba had fifteen sons and twenty servants."],[11,"Then Ziba said to the king, “According to all that my lord the king commands his servant, so your servant will do.” So Mephibosheth ate at the king’s table, like one of the king’s sons."],[12,"Mephibosheth had a young son, whose name was Mica. All that lived in Ziba’s house were servants to Mephibosheth."],[13,"So Mephibosheth lived in Jerusalem; for he ate continually at the king’s table. He was lame in both his feet.",true]],[[1,"After this, the king of the children of Ammon died, and Hanun his son reigned in his place."],[2,"David said, “I will show kindness to Hanun the son of Nahash, as his father showed kindness to me.” So David sent by his servants to comfort him concerning his father. David’s servants came into the land of the children of Ammon.",true],[3,"But the princes of the children of Ammon said to Hanun their lord, “Do you think that David honors your father, in that he has sent comforters to you? Hasn’t David sent his servants to you to search the city, to spy it out, and to overthrow it?”",true],[4,"So Hanun took David’s servants, shaved off one half of their beards, and cut off their garments in the middle, even to their buttocks, and sent them away."],[5,"When they told David this, he sent to meet them, for the men were greatly ashamed. The king said, “Wait at Jericho until your beards have grown, and then return.”",true],[6,"When the children of Ammon saw that they had become odious to David, the children of Ammon sent and hired the Syrians of Beth Rehob, and the Syrians of Zobah, twenty thousand footmen, and the king of Maacah with one thousand men, and the men of Tob twelve thousand men."],[7,"When David heard of it, he sent Joab, and all the army of the mighty men."],[8,"The children of Ammon came out, and put the battle in array at the entrance of the gate. The Syrians of Zobah and of Rehob, and the men of Tob and Maacah, were by themselves in the field."],[9,"Now when Joab saw that the battle was set against him before and behind, he chose of all the choice men of Israel, and put them in array against the Syrians."],[10,"The rest of the people he committed into the hand of Abishai his brother; and he put them in array against the children of Ammon."],[11,"He said, “If the Syrians are too strong for me, then you shall help me; but if the children of Ammon are too strong for you, then I will come and help you."],[12,"Be courageous, and let’s be strong for our people, and for the cities of our God; and may Yahweh do what seems good to him.”"],[13,"So Joab and the people who were with him came near to the battle against the Syrians, and they fled before him."],[14,"When the children of Ammon saw that the Syrians had fled, they likewise fled before Abishai, and entered into the city. Then Joab returned from the children of Ammon, and came to Jerusalem."],[15,"When the Syrians saw that they were defeated by Israel, they gathered themselves together."],[16,"Hadadezer sent, and brought out the Syrians who were beyond the River: and they came to Helam, with Shobach the captain of the army of Hadadezer at their head."],[17,"David was told that; and he gathered all Israel together, passed over the Jordan, and came to Helam. The Syrians set themselves in array against David, and fought with him."],[18,"The Syrians fled before Israel; and David killed seven hundred charioteers of the Syrians, and forty thousand horsemen, and struck Shobach the captain of their army, so that he died there."],[19,"When all the kings who were servants to Hadadezer saw that they were defeated before Israel, they made peace with Israel, and served them. So the Syrians were afraid to help the children of Ammon any more.",true]],[[1,"At the return of the year, at the time when kings go out, David sent Joab, and his servants with him, and all Israel; and they destroyed the children of Ammon, and besieged Rabbah. But David stayed at Jerusalem."],[2,"At evening, David arose from his bed and walked on the roof of the king’s house. From the roof, he saw a woman bathing, and the woman was very beautiful to look at."],[3,"David sent and inquired after the woman. One said, “Isn’t this Bathsheba, the daughter of Eliam, Uriah the Hittite’s wife?”",true],[4,"David sent messengers, and took her; and she came in to him, and he lay with her (for she was purified from her uncleanness); and she returned to her house."],[5,"The woman conceived; and she sent and told David, and said, “I am with child.”",true],[6,"David sent to Joab, “Send me Uriah the Hittite.” Joab sent Uriah to David."],[7,"When Uriah had come to him, David asked him how Joab did, and how the people fared, and how the war prospered."],[8,"David said to Uriah, “Go down to your house and wash your feet.” Uriah departed out of the king’s house, and a gift from the king was sent after him."],[9,"But Uriah slept at the door of the king’s house with all the servants of his lord, and didn’t go down to his house."],[10,"When they had told David, saying, “Uriah didn’t go down to his house,” David said to Uriah, “Haven’t you come from a journey? Why didn’t you go down to your house?”",true],[11,"Uriah said to David, “The ark, Israel, and Judah, are staying in tents; and my lord Joab and the servants of my lord, are encamped in the open field. Shall I then go into my house to eat and to drink, and to lie with my wife? As you live, and as your soul lives, I will not do this thing!”",true],[12,"David said to Uriah, “Stay here today also, and tomorrow I will let you depart.” So Uriah stayed in Jerusalem that day, and the next day."],[13,"When David had called him, he ate and drank before him; and he made him drunk. At evening, he went out to lie on his bed with the servants of his lord, but didn’t go down to his house."],[14,"In the morning, David wrote a letter to Joab, and sent it by the hand of Uriah."],[15,"He wrote in the letter, saying, “Send Uriah to the forefront of the hottest battle, and retreat from him, that he may be struck, and die.”",true],[16,"When Joab kept watch on the city, he assigned Uriah to the place where he knew that valiant men were."],[17,"The men of the city went out, and fought with Joab. Some of the people fell, even of David’s servants; and Uriah the Hittite died also."],[18,"Then Joab sent and told David all the things concerning the war;"],[19,"and he commanded the messenger, saying, “When you have finished telling all the things concerning the war to the king,"],[20,"it shall be that, if the king’s wrath arise, and he asks you, ‘Why did you go so near to the city to fight? Didn’t you know that they would shoot from the wall?"],[21,"Who struck Abimelech the son of Jerubbesheth? Didn’t a woman cast an upper millstone on him from the wall, so that he died at Thebez? Why did you go so near the wall?’ then you shall say, ‘Your servant Uriah the Hittite is also dead.’ ”",true],[22,"So the messenger went, and came and showed David all that Joab had sent him for."],[23,"The messenger said to David, “The men prevailed against us, and came out to us into the field, and we were on them even to the entrance of the gate."],[24,"The shooters shot at your servants from off the wall; and some of the king’s servants are dead, and your servant Uriah the Hittite is also dead.”",true],[25,"Then David said to the messenger, “Tell Joab, ‘Don’t let this thing displease you, for the sword devours one as well as another. Make your battle stronger against the city, and overthrow it.’ Encourage him.”",true],[26,"When Uriah’s wife heard that Uriah her husband was dead, she mourned for her husband."],[27,"When the mourning was past, David sent and took her home to his house, and she became his wife, and bore him a son. But the thing that David had done displeased Yahweh.",true]],[[1,"Yahweh sent Nathan to David. He came to him, and said to him, “There were two men in one city; the one rich, and the other poor."],[2,"The rich man had very many flocks and herds,"],[3,"but the poor man had nothing, except one little ewe lamb, which he had bought and raised. It grew up together with him, and with his children. It ate of his own food, drank of his own cup, and lay in his bosom, and was like a daughter to him."],[4,"A traveler came to the rich man, and he spared to take of his own flock and of his own herd, to prepare for the wayfaring man who had come to him, but took the poor man’s lamb, and prepared it for the man who had come to him.”",true],[5,"David’s anger burned hot against the man, and he said to Nathan, “As Yahweh lives, the man who has done this deserves to die!"],[6,"He must restore the lamb fourfold, because he did this thing, and because he had no pity!”",true],[7,"Nathan said to David, “You are the man. This is what Yahweh, the God of Israel, says: ‘I anointed you king over Israel, and I delivered you out of the hand of Saul."],[8,"I gave you your master’s house, and your master’s wives into your bosom, and gave you the house of Israel and of Judah; and if that would have been too little, I would have added to you many more such things."],[9,"Why have you despised Yahweh’s word, to do that which is evil in his sight? You have struck Uriah the Hittite with the sword, and have taken his wife to be your wife, and have slain him with the sword of the children of Ammon."],[10,"Now therefore the sword will never depart from your house, because you have despised me, and have taken Uriah the Hittite’s wife to be your wife.’",true],[11,"“This is what Yahweh says: ‘Behold, I will raise up evil against you out of your own house; and I will take your wives before your eyes, and give them to your neighbor, and he will lie with your wives in the sight of this sun."],[12,"For you did this secretly, but I will do this thing before all Israel, and before the sun.’ ”",true],[13,"David said to Nathan, “I have sinned against Yahweh.” Nathan said to David, “Yahweh also has put away your sin. You will not die."],[14,"However, because by this deed you have given great occasion to Yahweh’s enemies to blaspheme, the child also who is born to you will surely die.”"],[15,"Nathan departed to his house. Yahweh struck the child that Uriah’s wife bore to David, and it was very sick."],[16,"David therefore begged God for the child; and David fasted, and went in, and lay all night on the ground."],[17,"The elders of his house arose beside him, to raise him up from the earth: but he would not, and he didn’t eat bread with them."],[18,"On the seventh day, the child died. David’s servants were afraid to tell him that the child was dead, for they said, “Behold, while the child was yet alive, we spoke to him, and he didn’t listen to our voice. How will he then harm himself, if we tell him that the child is dead?”",true],[19,"But when David saw that his servants were whispering together, David perceived that the child was dead; and David said to his servants, “Is the child dead?” They said, “He is dead.”",true],[20,"Then David arose from the earth, and washed, and anointed himself, and changed his clothing; and he came into Yahweh’s house, and worshiped. Then he came to his own house; and when he requested, they set bread before him, and he ate."],[21,"Then his servants said to him, “What is this that you have done? You fasted and wept for the child while he was alive, but when the child was dead, you rose up and ate bread.”",true],[22,"He said, “While the child was yet alive, I fasted and wept; for I said, ‘Who knows whether Yahweh will not be gracious to me, that the child may live?’"],[23,"But now he is dead, why should I fast? Can I bring him back again? I will go to him, but he will not return to me.”",true],[24,"David comforted Bathsheba his wife, and went in to her, and lay with her. She bore a son, and he called his name Solomon. Yahweh loved him;"],[25,"and he sent by the hand of Nathan the prophet, and he named him Jedidiah, for Yahweh’s sake.",true],[26,"Now Joab fought against Rabbah of the children of Ammon, and took the royal city."],[27,"Joab sent messengers to David, and said, “I have fought against Rabbah. Yes, I have taken the city of waters."],[28,"Now therefore gather the rest of the people together, and encamp against the city, and take it; lest I take the city, and it be called by my name.”",true],[29,"David gathered all the people together, and went to Rabbah, and fought against it, and took it."],[30,"He took the crown of their king from off his head; and its weight was a talent of gold, and in it were precious stones; and it was set on David’s head. He brought a great quantity of plunder out of the city."],[31,"He brought out the people who were in it, and put them under saws, under iron picks, under axes of iron, and made them pass through the brick kiln; and he did so to all the cities of the children of Ammon. Then David and all the people returned to Jerusalem.",true]],[[1,"After this, Absalom the son of David had a beautiful sister, whose name was Tamar; and Amnon the son of David loved her."],[2,"Amnon was so troubled that he became sick because of his sister Tamar; for she was a virgin; and it seemed hard to Amnon to do anything to her."],[3,"But Amnon had a friend, whose name was Jonadab, the son of Shimeah, David’s brother; and Jonadab was a very subtle man."],[4,"He said to him, “Why, son of the king, are you so sad from day to day? Won’t you tell me?” Amnon said to him, “I love Tamar, my brother Absalom’s sister.”",true],[5,"Jonadab said to him, “Lay down on your bed, and pretend to be sick. When your father comes to see you, tell him, ‘Please let my sister Tamar come and give me bread to eat, and prepare the food in my sight, that I may see it, and eat it from her hand.’ ”",true],[6,"So Amnon lay down and faked being sick. When the king came to see him, Amnon said to the king, “Please let my sister Tamar come, and make me a couple of cakes in my sight, that I may eat from her hand.”",true],[7,"Then David sent home to Tamar, saying, “Go now to your brother Amnon’s house, and prepare food for him.”"],[8,"So Tamar went to her brother Amnon’s house; and he was lying down. She took dough, and kneaded it, made cakes in his sight, and baked the cakes."],[9,"She took the pan, and poured them out before him; but he refused to eat. Amnon said, “Have all men leave me.” Then every man went out from him."],[10,"Amnon said to Tamar, “Bring the food into the room, that I may eat from your hand.” Tamar took the cakes which she had made, and brought them into the room to Amnon her brother."],[11,"When she had brought them near to him to eat, he took hold of her, and said to her, “Come, lie with me, my sister!”",true],[12,"She answered him, “No, my brother, do not force me! For no such thing ought to be done in Israel. Don’t you do this folly."],[13,"As for me, where would I carry my shame? And as for you, you will be as one of the fools in Israel. Now therefore, please speak to the king; for he will not withhold me from you.”",true],[14,"However he would not listen to her voice; but being stronger than she, he forced her, and lay with her."],[15,"Then Amnon hated her with exceedingly great hatred; for the hatred with which he hated her was greater than the love with which he had loved her. Amnon said to her, “Arise, be gone!”",true],[16,"She said to him, “Not so, because this great wrong in sending me away is worse than the other that you did to me!” But he would not listen to her."],[17,"Then he called his servant who ministered to him, and said, “Now put this woman out from me, and bolt the door after her.”",true],[18,"She had a garment of various colors on her; for the king’s daughters who were virgins dressed in such robes. Then his servant brought her out and bolted the door after her."],[19,"Tamar put ashes on her head, and tore her garment of various colors that was on her; and she laid her hand on her head, and went her way, crying aloud as she went."],[20,"Absalom her brother said to her, “Has Amnon your brother been with you? But now hold your peace, my sister. He is your brother. Don’t take this thing to heart.” So Tamar remained desolate in her brother Absalom’s house."],[21,"But when king David heard of all these things, he was very angry."],[22,"Absalom spoke to Amnon neither good nor bad; for Absalom hated Amnon, because he had forced his sister Tamar."],[23,"After two full years, Absalom had sheep shearers in Baal Hazor, which is beside Ephraim: and Absalom invited all the king’s sons."],[24,"Absalom came to the king, and said, “See now, your servant has sheep shearers. Please let the king and his servants go with your servant.”",true],[25,"The king said to Absalom, “No, my son, let’s not all go, lest we be burdensome to you.” He pressed him; however he would not go, but blessed him.",true],[26,"Then Absalom said, “If not, please let my brother Amnon go with us.” The king said to him, “Why should he go with you?”",true],[27,"But Absalom pressed him, and he let Amnon and all the king’s sons go with him."],[28,"Absalom commanded his servants, saying, “Mark now, when Amnon’s heart is merry with wine; and when I tell you, ‘Strike Amnon,’ then kill him. Don’t be afraid. Haven’t I commanded you? Be courageous, and be valiant!”",true],[29,"The servants of Absalom did to Amnon as Absalom had commanded. Then all the king’s sons arose, and every man got up on his mule, and fled."],[30,"While they were on the way, the news came to David, saying, “Absalom has slain all the king’s sons, and there is not one of them left!”",true],[31,"Then the king arose, and tore his garments, and lay on the earth; and all his servants stood by with their clothes torn."],[32,"Jonadab, the son of Shimeah, David’s brother, answered, “Don’t let my lord suppose that they have killed all the young men the king’s sons; for Amnon only is dead; for by the appointment of Absalom this has been determined from the day that he forced his sister Tamar."],[33,"Now therefore don’t let my lord the king take the thing to his heart, to think that all the king’s sons are dead; for only Amnon is dead.”"],[34,"But Absalom fled. The young man who kept the watch lifted up his eyes, and looked, and behold, many people were coming by way of the hillside behind him."],[35,"Jonadab said to the king, “Behold, the king’s sons are coming! It is as your servant said.”"],[36,"As soon as he had finished speaking, behold, the king’s sons came, and lifted up their voice, and wept. The king also and all his servants wept bitterly."],[37,"But Absalom fled, and went to Talmai the son of Ammihur, king of Geshur. David mourned for his son every day."],[38,"So Absalom fled, and went to Geshur, and was there three years."],[39,"King David longed to go out to Absalom; for he was comforted concerning Amnon, since he was dead.",true]],[[1,"Now Joab the son of Zeruiah perceived that the king’s heart was toward Absalom."],[2,"Joab sent to Tekoa, and brought a wise woman from there, and said to her, “Please act like a mourner, and put on mourning clothing, please, and don’t anoint yourself with oil, but be as a woman who has mourned a long time for the dead."],[3,"Go in to the king, and speak like this to him.” So Joab put the words in her mouth.",true],[4,"When the woman of Tekoa spoke to the king, she fell on her face to the ground, showed respect, and said, “Help, O king!”",true],[5,"The king said to her, “What ails you?” She answered, “Truly I am a widow, and my husband is dead."],[6,"Your servant had two sons, and they both fought together in the field, and there was no one to part them, but the one struck the other, and killed him."],[7,"Behold, the whole family has risen against your servant, and they say, ‘Deliver him who struck his brother, that we may kill him for the life of his brother whom he killed, and so destroy the heir also.’ Thus they would quench my coal which is left, and would leave to my husband neither name nor remainder on the surface of the earth.”",true],[8,"The king said to the woman, “Go to your house, and I will give a command concerning you.”",true],[9,"The woman of Tekoa said to the king, “My lord, O king, may the iniquity be on me, and on my father’s house; and may the king and his throne be guiltless.”",true],[10,"The king said, “Whoever says anything to you, bring him to me, and he will not bother you any more.”",true],[11,"Then she said, “Please let the king remember Yahweh your God, that the avenger of blood destroy not any more, lest they destroy my son.” He said, “As Yahweh lives, not one hair of your son shall fall to the earth.”",true],[12,"Then the woman said, “Please let your servant speak a word to my lord the king.” He said, “Say on.”",true],[13,"The woman said, “Why then have you devised such a thing against the people of God? For in speaking this word the king is as one who is guilty, in that the king does not bring home again his banished one."],[14,"For we must die, and are like water spilled on the ground, which can’t be gathered up again; neither does God take away life, but devises means, that he who is banished not be an outcast from him."],[15,"Now therefore seeing that I have come to speak this word to my lord the king, it is because the people have made me afraid. Your servant said, ‘I will now speak to the king; it may be that the king will perform the request of his servant.’"],[16,"For the king will hear, to deliver his servant out of the hand of the man who would destroy me and my son together out of the inheritance of God."],[17,"Then your servant said, ‘Please let the word of my lord the king bring rest; for as an angel of God, so is my lord the king to discern good and bad. May Yahweh, your God, be with you.’ ”",true],[18,"Then the king answered the woman, “Please don’t hide anything from me that I ask you.” The woman said, “Let my lord the king now speak.”",true],[19,"The king said, “Is the hand of Joab with you in all this?” The woman answered, “As your soul lives, my lord the king, no one can turn to the right hand or to the left from anything that my lord the king has spoken; for your servant Joab urged me, and he put all these words in the mouth of your servant."],[20,"Your servant Joab has done this thing to change the face of the matter. My lord is wise, according to the wisdom of an angel of God, to know all things that are in the earth.”",true],[21,"The king said to Joab, “Behold now, I have done this thing. Go therefore, and bring the young man Absalom back.”",true],[22,"Joab fell to the ground on his face, showed respect, and blessed the king. Joab said, “Today your servant knows that I have found favor in your sight, my lord, king, in that the king has performed the request of his servant.”",true],[23,"So Joab arose and went to Geshur, and brought Absalom to Jerusalem."],[24,"The king said, “Let him return to his own house, but let him not see my face.” So Absalom returned to his own house, and didn’t see the king’s face."],[25,"Now in all Israel there was no one to be so much praised as Absalom for his beauty. From the sole of his foot even to the crown of his head there was no defect in him."],[26,"When he cut the hair of his head (now it was at every year’s end that he cut it; because it was heavy on him, therefore he cut it); he weighed the hair of his head at two hundred shekels, after the king’s weight."],[27,"Three sons were born to Absalom, and one daughter, whose name was Tamar. She was a woman with a beautiful face."],[28,"Absalom lived two full years in Jerusalem, and he didn’t see the king’s face."],[29,"Then Absalom sent for Joab, to send him to the king, but he would not come to him. Then he sent again a second time, but he would not come."],[30,"Therefore he said to his servants, “Behold, Joab’s field is near mine, and he has barley there. Go and set it on fire.” So Absalom’s servants set the field on fire.",true],[31,"Then Joab arose, and came to Absalom to his house, and said to him, “Why have your servants set my field on fire?”",true],[32,"Absalom answered Joab, “Behold, I sent to you, saying, ‘Come here, that I may send you to the king, to say, “Why have I come from Geshur? It would be better for me to be there still. Now therefore let me see the king’s face, and if there is iniquity in me, let him kill me.” ’ ”",true],[33,"So Joab came to the king, and told him; and when he had called for Absalom, he came to the king, and bowed himself on his face to the ground before the king; and the king kissed Absalom.",true]],[[1,"After this, Absalom prepared a chariot and horses for himself, and fifty men to run before him."],[2,"Absalom rose up early, and stood beside the way of the gate. When any man had a suit which should come to the king for judgment, then Absalom called to him, and said, “What city are you from?” He said, “Your servant is of one of the tribes of Israel.”",true],[3,"Absalom said to him, “Behold, your matters are good and right; but there is no man deputized by the king to hear you.”"],[4,"Absalom said moreover, “Oh that I were made judge in the land, that every man who has any suit or cause might come to me, and I would do him justice!”"],[5,"It was so, that when any man came near to bow down to him, he stretched out his hand, and took hold of him, and kissed him."],[6,"Absalom did this sort of thing to all Israel who came to the king for judgment. So Absalom stole the hearts of the men of Israel."],[7,"At the end of forty years, Absalom said to the king, “Please let me go and pay my vow, which I have vowed to Yahweh, in Hebron."],[8,"For your servant vowed a vow while I stayed at Geshur in Syria, saying, ‘If Yahweh shall indeed bring me again to Jerusalem, then I will serve Yahweh.’ ”",true],[9,"The king said to him, “Go in peace.” So he arose, and went to Hebron."],[10,"But Absalom sent spies throughout all the tribes of Israel, saying, “As soon as you hear the sound of the trumpet, then you shall say, ‘Absalom is king in Hebron!’ ”",true],[11,"Two hundred men went with Absalom out of Jerusalem, who were invited, and went in their simplicity; and they didn’t know anything."],[12,"Absalom sent for Ahithophel the Gilonite, David’s counselor, from his city, even from Giloh, while he was offering the sacrifices. The conspiracy was strong; for the people increased continually with Absalom."],[13,"A messenger came to David, saying, “The hearts of the men of Israel are after Absalom.”",true],[14,"David said to all his servants who were with him at Jerusalem, “Arise! Let’s flee; or else none of us will escape from Absalom. Hurry to depart, lest he overtake us quickly, and bring down evil on us, and strike the city with the edge of the sword.”",true],[15,"The king’s servants said to the king, “Behold, your servants are ready to do whatever my lord the king chooses.”",true],[16,"The king went out, and all his household after him. The king left ten women, who were concubines, to keep the house."],[17,"The king went out, and all the people after him; and they stayed in Beth Merhak."],[18,"All his servants passed on beside him; and all the Cherethites, and all the Pelethites, and all the Gittites, six hundred men who came after him from Gath, passed on before the king."],[19,"Then the king said to Ittai the Gittite, “Why do you also go with us? Return, and stay with the king; for you are a foreigner, and also an exile. Return to your own place."],[20,"Whereas you came but yesterday, should I today make you go up and down with us, since I go where I may? Return, and take back your brothers. Mercy and truth be with you.”",true],[21,"Ittai answered the king, and said, “As Yahweh lives, and as my lord the king lives, surely in what place my lord the king is, whether for death or for life, your servant will be there also.”",true],[22,"David said to Ittai, “Go and pass over.” Ittai the Gittite passed over, and all his men, and all the little ones who were with him."],[23,"All the country wept with a loud voice, and all the people passed over. The king also himself passed over the brook Kidron, and all the people passed over, toward the way of the wilderness."],[24,"Behold, Zadok also came, and all the Levites with him, bearing the ark of the covenant of God; and they set down God’s ark; and Abiathar went up, until all the people finished passing out of the city."],[25,"The king said to Zadok, “Carry God’s ark back into the city. If I find favor in Yahweh’s eyes, he will bring me again, and show me both it, and his habitation;"],[26,"but if he says, ‘I have no delight in you;’ behold, here I am. Let him do to me as seems good to him.”"],[27,"The king said also to Zadok the priest, “Aren’t you a seer? Return into the city in peace, and your two sons with you, Ahimaaz your son, and Jonathan the son of Abiathar."],[28,"Behold, I will stay at the fords of the wilderness, until word comes from you to inform me.”"],[29,"Zadok therefore and Abiathar carried God’s ark to Jerusalem again; and they stayed there."],[30,"David went up by the ascent of the Mount of Olives, and wept as he went up; and he had his head covered, and went barefoot. All the people who were with him each covered his head, and they went up, weeping as they went up.",true],[31,"Someone told David, saying, “Ahithophel is among the conspirators with Absalom.” David said, “Yahweh, please turn the counsel of Ahithophel into foolishness.”",true],[32,"When David had come to the top, where God was worshiped, behold, Hushai the Archite came to meet him with his tunic torn, and earth on his head."],[33,"David said to him, “If you pass on with me, then you will be a burden to me;"],[34,"but if you return to the city, and tell Absalom, ‘I will be your servant, O king. As I have been your father’s servant in time past, so I will now be your servant; then will you defeat for me the counsel of Ahithophel.’"],[35,"Don’t you have Zadok and Abiathar the priests there with you? Therefore whatever you hear out of the king’s house, tell it to Zadok and Abiathar the priests."],[36,"Behold, they have there with them their two sons, Ahimaaz, Zadok’s son, and Jonathan, Abiathar’s son. Send to me everything that you shall hear by them.”",true],[37,"So Hushai, David’s friend, came into the city; and Absalom came into Jerusalem.",true]],[[1,"When David was a little past the top, behold, Ziba the servant of Mephibosheth met him with a couple of donkeys saddled, and on them two hundred loaves of bread, and one hundred clusters of raisins, and one hundred summer fruits, and a container of wine."],[2,"The king said to Ziba, “What do you mean by these?” Ziba said, “The donkeys are for the king’s household to ride on; and the bread and summer fruit for the young men to eat; and the wine, that those who are faint in the wilderness may drink.”",true],[3,"The king said, “Where is your master’s son?” Ziba said to the king, “Behold, he is staying in Jerusalem; for he said, ‘Today the house of Israel will restore me the kingdom of my father.’ ”",true],[4,"Then the king said to Ziba, “Behold, all that belongs to Mephibosheth is yours.” Ziba said, “I bow down. Let me find favor in your sight, my lord, O king.”",true],[5,"When king David came to Bahurim, behold, a man of the family of Saul’s house came out, whose name was Shimei, the son of Gera. He came out and cursed as he came."],[6,"He cast stones at David, and at all the servants of king David, and all the people and all the mighty men were on his right hand and on his left."],[7,"Shimei said when he cursed, “Be gone, be gone, you man of blood, and wicked fellow!"],[8,"Yahweh has returned on you all the blood of Saul’s house, in whose place you have reigned! Yahweh has delivered the kingdom into the hand of Absalom your son! Behold, you are caught by your own mischief, because you are a man of blood!”",true],[9,"Then Abishai the son of Zeruiah said to the king, “Why should this dead dog curse my lord the king? Please let me go over and take off his head.”"],[10,"The king said, “What have I to do with you, you sons of Zeruiah? Because he curses, and because Yahweh has said to him, ‘Curse David;’ who then shall say, ‘Why have you done so?’ ”",true],[11,"David said to Abishai, and to all his servants, “Behold, my son, who came out of my bowels, seeks my life. How much more this Benjamite, now? Leave him alone, and let him curse; for Yahweh has invited him."],[12,"It may be that Yahweh will look on the wrong done to me, and that Yahweh will repay me good for the cursing of me today.”"],[13,"So David and his men went by the way; and Shimei went along on the hillside opposite him, and cursed as he went, threw stones at him, and threw dust."],[14,"The king, and all the people who were with him, came weary; and he refreshed himself there.",true],[15,"Absalom and all the people, the men of Israel, came to Jerusalem, and Ahithophel with him."],[16,"When Hushai the Archite, David’s friend, had come to Absalom, Hushai said to Absalom, “Long live the king! Long live the king!”",true],[17,"Absalom said to Hushai, “Is this your kindness to your friend? Why didn’t you go with your friend?”",true],[18,"Hushai said to Absalom, “No; but whomever Yahweh, and this people, and all the men of Israel have chosen, I will be his, and I will stay with him."],[19,"Again, whom should I serve? Shouldn’t I serve in the presence of his son? As I have served in your father’s presence, so I will be in your presence.”",true],[20,"Then Absalom said to Ahithophel, “Give your counsel what we shall do.”",true],[21,"Ahithophel said to Absalom, “Go in to your father’s concubines that he has left to keep the house. Then all Israel will hear that you are abhorred by your father. Then the hands of all who are with you will be strong.”",true],[22,"So they spread a tent for Absalom on the top of the house, and Absalom went in to his father’s concubines in the sight of all Israel."],[23,"The counsel of Ahithophel, which he gave in those days, was as if a man inquired at the inner sanctuary of God. All the counsel of Ahithophel both was like this with David and with Absalom.",true]],[[1,"Moreover Ahithophel said to Absalom, “Let me now choose twelve thousand men, and I will arise and pursue after David tonight."],[2,"I will come on him while he is weary and exhausted, and will make him afraid. All the people who are with him will flee. I will strike the king only,"],[3,"and I will bring back all the people to you. The man whom you seek is as if all returned. All the people shall be in peace.”",true],[4,"The saying pleased Absalom well, and all the elders of Israel."],[5,"Then Absalom said, “Now call Hushai the Archite also, and let’s hear likewise what he says.”",true],[6,"When Hushai had come to Absalom, Absalom spoke to him, saying, “Ahithophel has spoken like this. Shall we do what he says? If not, speak up.”",true],[7,"Hushai said to Absalom, “The counsel that Ahithophel has given this time is not good.”"],[8,"Hushai said moreover, “You know your father and his men, that they are mighty men, and they are fierce in their minds, like a bear robbed of her cubs in the field. Your father is a man of war, and will not lodge with the people."],[9,"Behold, he is now hidden in some pit, or in some other place. It will happen, when some of them have fallen at the first, that whoever hears it will say, ‘There is a slaughter among the people who follow Absalom!’"],[10,"Even he who is valiant, whose heart is as the heart of a lion, will utterly melt; for all Israel knows that your father is a mighty man, and those who are with him are valiant men."],[11,"But I counsel that all Israel be gathered together to you, from Dan even to Beersheba, as the sand that is by the sea for multitude; and that you go to battle in your own person."],[12,"So we will come on him in some place where he will be found, and we will light on him as the dew falls on the ground, then we will not leave so much as one of him and of all the men who are with him."],[13,"Moreover, if he has gone into a city, then all Israel will bring ropes to that city, and we will draw it into the river, until there isn’t one small stone found there.”",true],[14,"Absalom and all the men of Israel said, “The counsel of Hushai the Archite is better than the counsel of Ahithophel.” For Yahweh had ordained to defeat the good counsel of Ahithophel, to the intent that Yahweh might bring evil on Absalom."],[15,"Then Hushai said to Zadok and to Abiathar the priests, “Ahithophel counseled Absalom and the elders of Israel that way; and I have counseled this way."],[16,"Now therefore send quickly, and tell David, saying, ‘Don’t lodge tonight at the fords of the wilderness, but by all means pass over; lest the king be swallowed up, and all the people who are with him.’ ”",true],[17,"Now Jonathan and Ahimaaz were staying by En Rogel; and a female servant used to go and tell them; and they went and told king David. For they might not be seen to come into the city."],[18,"But a boy saw them, and told Absalom. Then they both went away quickly, and came to the house of a man in Bahurim, who had a well in his court; and they went down there."],[19,"The woman took and spread the covering over the well’s mouth, and spread out crushed grain on it; and nothing was known."],[20,"Absalom’s servants came to the woman to the house; and they said, “Where are Ahimaaz and Jonathan?” The woman said to them, “They have gone over the brook of water.” When they had sought and could not find them, they returned to Jerusalem."],[21,"After they had departed, they came up out of the well, and went and told king David; and they said to David, “Arise and pass quickly over the water; for thus has Ahithophel counseled against you.”",true],[22,"Then David arose, and all the people who were with him, and they passed over the Jordan. By the morning light there lacked not one of them who had not gone over the Jordan."],[23,"When Ahithophel saw that his counsel was not followed, he saddled his donkey, arose, and went home, to his city, and set his house in order, and hanged himself; and he died, and was buried in the tomb of his father."],[24,"Then David came to Mahanaim. Absalom passed over the Jordan, he and all the men of Israel with him."],[25,"Absalom set Amasa over the army instead of Joab. Now Amasa was the son of a man whose name was Ithra the Israelite, who went in to Abigail the daughter of Nahash, sister to Zeruiah, Joab’s mother."],[26,"Israel and Absalom encamped in the land of Gilead."],[27,"When David had come to Mahanaim, Shobi the son of Nahash of Rabbah of the children of Ammon, and Machir the son of Ammiel of Lodebar, and Barzillai the Gileadite of Rogelim,"],[28,"brought beds, basins, earthen vessels, wheat, barley, meal, parched grain, beans, lentils, roasted grain,"],[29,"honey, butter, sheep, and cheese of the herd, for David, and for the people who were with him, to eat; for they said, “The people are hungry, weary, and thirsty in the wilderness.”",true]],[[1,"David counted the people who were with him, and set captains of thousands and captains of hundreds over them."],[2,"David sent the people out, a third part under the hand of Joab, and a third part under the hand of Abishai the son of Zeruiah, Joab’s brother, and a third part under the hand of Ittai the Gittite. The king said to the people, “I will also surely go out with you myself.”",true],[3,"But the people said, “You shall not go out; for if we flee away, they will not care for us; neither if half of us die, will they care for us. But you are worth ten thousand of us. Therefore now it is better that you are ready to help us out of the city.”",true],[4,"The king said to them, “I will do what seems best to you.” The king stood beside the gate, and all the people went out by hundreds and by thousands."],[5,"The king commanded Joab and Abishai and Ittai, saying, “Deal gently for my sake with the young man, even with Absalom.” All the people heard when the king commanded all the captains concerning Absalom.",true],[6,"So the people went out into the field against Israel; and the battle was in the forest of Ephraim."],[7,"The people of Israel were struck there before David’s servants, and there was a great slaughter there that day of twenty thousand men."],[8,"For the battle was there spread over the surface of all the country, and the forest devoured more people that day than the sword devoured."],[9,"Absalom happened to meet David’s servants. Absalom was riding on his mule, and the mule went under the thick boughs of a great oak, and his head caught hold of the oak, and he was taken up between the sky and earth; and the mule that was under him went on."],[10,"A certain man saw it, and told Joab, and said, “Behold, I saw Absalom hanging in an oak.”",true],[11,"Joab said to the man who told him, “Behold, you saw it, and why didn’t you strike him there to the ground? I would have given you ten pieces of silver, and a sash.”",true],[12,"The man said to Joab, “Though I should receive a thousand pieces of silver in my hand, I still wouldn’t stretch out my hand against the king’s son; for in our hearing the king commanded you and Abishai and Ittai, saying, ‘Beware that no one touch the young man Absalom.’"],[13,"Otherwise if I had dealt falsely against his life (and there is no matter hidden from the king), then you yourself would have set yourself against me.”",true],[14,"Then Joab said, “I’m not going to wait like this with you.” He took three darts in his hand, and thrust them through the heart of Absalom, while he was yet alive in the middle of the oak."],[15,"Ten young men who bore Joab’s armor surrounded and struck Absalom, and killed him."],[16,"Joab blew the trumpet, and the people returned from pursuing after Israel; for Joab held the people back."],[17,"They took Absalom and cast him into a great pit in the forest, and raised over him a very great heap of stones. Then all Israel fled, each to his own tent."],[18,"Now Absalom in his lifetime had taken and reared up for himself the pillar which is in the king’s valley, for he said, “I have no son to keep my name in memory.” He called the pillar after his own name. It is called Absalom’s monument, to this day.",true],[19,"Then Ahimaaz the son of Zadok said, “Let me now run and carry the king news, how Yahweh has avenged him of his enemies.”",true],[20,"Joab said to him, “You must not be the bearer of news today, but you must carry news another day. But today you must carry no news, because the king’s son is dead.”",true],[21,"Then Joab said to the Cushite, “Go, tell the king what you have seen!” The Cushite bowed himself to Joab, and ran.",true],[22,"Then Ahimaaz the son of Zadok said yet again to Joab, “But come what may, please let me also run after the Cushite.” Joab said, “Why do you want to run, my son, since you will have no reward for the news?”",true],[23,"“But come what may,” he said, “I will run.” He said to him, “Run!” Then Ahimaaz ran by the way of the Plain, and outran the Cushite.",true],[24,"Now David was sitting between the two gates; and the watchman went up to the roof of the gate to the wall, and lifted up his eyes, and looked, and, behold, a man running alone."],[25,"The watchman cried, and told the king. The king said, “If he is alone, there is news in his mouth.” He came closer and closer.",true],[26,"The watchman saw another man running; and the watchman called to the gatekeeper, and said, “Behold, a man running alone!” The king said, “He also brings news.”",true],[27,"The watchman said, “I think the running of the first one is like the running of Ahimaaz the son of Zadok.” The king said, “He is a good man, and comes with good news.”",true],[28,"Ahimaaz called, and said to the king, “All is well.” He bowed himself before the king with his face to the earth, and said, “Blessed is Yahweh your God, who has delivered up the men who lifted up their hand against my lord the king!”",true],[29,"The king said, “Is it well with the young man Absalom?” Ahimaaz answered, “When Joab sent the king’s servant, even me your servant, I saw a great tumult, but I don’t know what it was.”",true],[30,"The king said, “Come and stand here.” He came, and stood still.",true],[31,"Behold, the Cushite came. The Cushite said, “News for my lord the king, for Yahweh has avenged you today of all those who rose up against you.”",true],[32,"The king said to the Cushite, “Is it well with the young man Absalom?” The Cushite answered, “May the enemies of my lord the king, and all who rise up against you to do you harm, be as that young man is.”",true],[33,"The king was much moved, and went up to the room over the gate, and wept. As he went, he said, “My son Absalom! My son, my son Absalom! I wish I had died for you, Absalom, my son, my son!”",true]],[[1,"Joab was told, “Behold, the king weeps and mourns for Absalom.”"],[2,"The victory that day was turned into mourning among all the people; for the people heard it said that day, “The king grieves for his son.”",true],[3,"The people sneaked into the city that day, as people who are ashamed steal away when they flee in battle."],[4,"The king covered his face, and the king cried with a loud voice, “My son Absalom, Absalom, my son, my son!”",true],[5,"Joab came into the house to the king, and said, “Today you have shamed the faces of all your servants, who today have saved your life, and the lives of your sons and of your daughters, and the lives of your wives, and the lives of your concubines;"],[6,"in that you love those who hate you, and hate those who love you. For you have declared today that princes and servants are nothing to you. For today I perceive that if Absalom had lived, and all we had died today, then it would have pleased you well."],[7,"Now therefore arise, go out, and speak to comfort your servants; for I swear by Yahweh, if you don’t go out, not a man will stay with you this night. That would be worse to you than all the evil that has happened to you from your youth until now.”",true],[8,"Then the king arose, and sat in the gate. They told to all the people, saying, “Behold, the king is sitting in the gate.” All the people came before the king. Now Israel had fled every man to his tent."],[9,"All the people were at strife throughout all the tribes of Israel, saying, “The king delivered us out of the hand of our enemies, and he saved us out of the hand of the Philistines; and now he has fled out of the land from Absalom."],[10,"Absalom, whom we anointed over us, is dead in battle. Now therefore why don’t you speak a word of bringing the king back?”",true],[11,"King David sent to Zadok and to Abiathar the priests, saying, “Speak to the elders of Judah, saying, ‘Why are you the last to bring the king back to his house? Since the speech of all Israel has come to the king, to return him to his house."],[12,"You are my brothers. You are my bone and my flesh. Why then are you the last to bring back the king?’"],[13,"Say to Amasa, ‘Aren’t you my bone and my flesh? God do so to me, and more also, if you aren’t captain of the army before me continually instead of Joab.’ ”"],[14,"He bowed the heart of all the men of Judah, even as one man; so that they sent to the king, saying, “Return, you and all your servants.”",true],[15,"So the king returned, and came to the Jordan. Judah came to Gilgal, to go to meet the king, to bring the king over the Jordan."],[16,"Shimei the son of Gera, the Benjamite, who was of Bahurim, hurried and came down with the men of Judah to meet king David."],[17,"There were a thousand men of Benjamin with him, and Ziba the servant of Saul’s house, and his fifteen sons and his twenty servants with him; and they went through the Jordan in the presence of the king."],[18,"A ferry boat went to bring over the king’s household, and to do what he thought good. Shimei the son of Gera fell down before the king, when he had come over the Jordan."],[19,"He said to the king, “Don’t let my lord impute iniquity to me, or remember that which your servant did perversely the day that my lord the king went out of Jerusalem, that the king should take it to his heart."],[20,"For your servant knows that I have sinned. Therefore behold, I have come today as the first of all the house of Joseph to go down to meet my lord the king.”",true],[21,"But Abishai the son of Zeruiah answered, “Shouldn’t Shimei be put to death for this, because he cursed Yahweh’s anointed?”",true],[22,"David said, “What have I to do with you, you sons of Zeruiah, that you should be adversaries to me today? Shall any man be put to death today in Israel? For don’t I know that I am king over Israel today?”"],[23,"The king said to Shimei, “You will not die.” The king swore to him.",true],[24,"Mephibosheth the son of Saul came down to meet the king; and he had neither groomed his feet, nor trimmed his beard, nor washed his clothes, from the day the king departed until the day he came home in peace."],[25,"When he had come to Jerusalem to meet the king, the king said to him, “Why didn’t you go with me, Mephibosheth?”",true],[26,"He answered, “My lord, O king, my servant deceived me. For your servant said, ‘I will saddle a donkey for myself, that I may ride on it and go with the king,’ because your servant is lame."],[27,"He has slandered your servant to my lord the king, but my lord the king is as an angel of God. Therefore do what is good in your eyes."],[28,"For all my father’s house were but dead men before my lord the king; yet you set your servant among those who ate at your own table. What right therefore have I yet that I should cry any more to the king?”",true],[29,"The king said to him, “Why do you speak any more of your matters? I say, you and Ziba divide the land.”",true],[30,"Mephibosheth said to the king, “Yes, let him take all, because my lord the king has come in peace to his own house.”"],[31,"Barzillai the Gileadite came down from Rogelim; and he went over the Jordan with the king, to conduct him over the Jordan."],[32,"Now Barzillai was a very aged man, even eighty years old. He had provided the king with sustenance while he stayed at Mahanaim; for he was a very great man."],[33,"The king said to Barzillai, “Come over with me, and I will sustain you with me in Jerusalem.”"],[34,"Barzillai said to the king, “How many are the days of the years of my life, that I should go up with the king to Jerusalem?"],[35,"I am eighty years old, today. Can I discern between good and bad? Can your servant taste what I eat or what I drink? Can I hear the voice of singing men and singing women any more? Why then should your servant be a burden to my lord the king?"],[36,"Your servant would but just go over the Jordan with the king. Why should the king repay me with such a reward?"],[37,"Please let your servant turn back again, that I may die in my own city, by the grave of my father and my mother. But behold, your servant Chimham; let him go over with my lord the king; and do to him what shall seem good to you.”",true],[38,"The king answered, “Chimham shall go over with me, and I will do to him that which shall seem good to you. Whatever you request of me, that I will do for you.”",true],[39,"All the people went over the Jordan, and the king went over. Then the king kissed Barzillai, and blessed him; and he returned to his own place."],[40,"So the king went over to Gilgal, and Chimham went over with him. All the people of Judah brought the king over, and also half the people of Israel."],[41,"Behold, all the men of Israel came to the king, and said to the king, “Why have our brothers the men of Judah stolen you away, and brought the king, and his household, over the Jordan, and all David’s men with him?”",true],[42,"All the men of Judah answered the men of Israel, “Because the king is a close relative to us. Why then are you angry about this matter? Have we eaten at all at the king’s cost? Or has he given us any gift?”",true],[43,"The men of Israel answered the men of Judah, and said, “We have ten parts in the king, and we have also more claim to David than you. Why then did you despise us, that our advice should not be first had in bringing back our king?” The words of the men of Judah were fiercer than the words of the men of Israel.",true]],[[1,"There happened to be there a wicked fellow, whose name was Sheba, the son of Bichri, a Benjamite; and he blew the trumpet, and said, “We have no portion in David, neither have we inheritance in the son of Jesse. Every man to his tents, Israel!”",true],[2,"So all the men of Israel went up from following David, and followed Sheba the son of Bichri; but the men of Judah joined with their king, from the Jordan even to Jerusalem."],[3,"David came to his house at Jerusalem; and the king took the ten women his concubines, whom he had left to keep the house, and put them in custody, and provided them with sustenance, but didn’t go in to them. So they were shut up to the day of their death, living in widowhood.",true],[4,"Then the king said to Amasa, “Call me the men of Judah together within three days, and be here present.”",true],[5,"So Amasa went to call the men of Judah together; but he stayed longer than the set time which he had appointed him."],[6,"David said to Abishai, “Now Sheba the son of Bichri will do us more harm than Absalom did. Take your lord’s servants, and pursue after him, lest he get himself fortified cities, and escape out of our sight.”",true],[7,"Joab’s men went out after him, and the Cherethites and the Pelethites, and all the mighty men; and they went out of Jerusalem, to pursue Sheba the son of Bichri."],[8,"When they were at the great stone which is in Gibeon, Amasa came to meet them. Joab was clothed in his apparel of war that he had put on, and on it was a sash with a sword fastened on his waist in its sheath; and as he went along it fell out."],[9,"Joab said to Amasa, “Is it well with you, my brother?” Joab took Amasa by the beard with his right hand to kiss him."],[10,"But Amasa took no heed to the sword that was in Joab’s hand. So he struck him with it in the body, and shed out his bowels to the ground, and didn’t strike him again; and he died. Joab and Abishai his brother pursued Sheba the son of Bichri."],[11,"One of Joab’s young men stood by him, and said, “He who favors Joab, and he who is for David, let him follow Joab!”",true],[12,"Amasa lay wallowing in his blood in the middle of the highway. When the man saw that all the people stood still, he carried Amasa out of the highway into the field, and cast a garment over him, when he saw that everyone who came by him stood still."],[13,"When he was removed out of the highway, all the people went on after Joab, to pursue Sheba the son of Bichri."],[14,"He went through all the tribes of Israel to Abel, and to Beth Maacah, and all the Berites. They were gathered together, and went also after him."],[15,"They came and besieged him in Abel of Beth Maacah, and they cast up a mound agains
