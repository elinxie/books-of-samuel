 up into his hand? Will Saul come down, as your servant has heard? Yahweh, the God of Israel, I beg you, tell your servant.” Yahweh said, “He will come down.”",true],[12,"Then David said, “Will the men of Keilah deliver me and my men into the hand of Saul?” Yahweh said, “They will deliver you up.”",true],[13,"Then David and his men, who were about six hundred, arose and departed out of Keilah, and went wherever they could go. Saul was told that David was escaped from Keilah; and he gave up going there."],[14,"David stayed in the wilderness in the strongholds, and remained in the hill country in the wilderness of Ziph. Saul sought him every day, but God didn’t deliver him into his hand."],[15,"David saw that Saul had come out to seek his life. David was in the wilderness of Ziph in the wood.",true],[16,"Jonathan, Saul’s son, arose, and went to David into the woods, and strengthened his hand in God."],[17,"He said to him, “Don’t be afraid; for the hand of Saul my father won’t find you; and you will be king over Israel, and I will be next to you; and Saul my father knows that also.”"],[18,"They both made a covenant before Yahweh. Then David stayed in the woods, and Jonathan went to his house.",true],[19,"Then the Ziphites came up to Saul to Gibeah, saying, “Doesn’t David hide himself with us in the strongholds in the woods, in the hill of Hachilah, which is on the south of the desert?"],[20,"Now therefore, O king, come down. According to all the desire of your soul to come down; and our part will be to deliver him up into the king’s hand.”",true],[21,"Saul said, “You are blessed by Yahweh; for you have had compassion on me."],[22,"Please go make yet more sure, and know and see his place where his haunt is, and who has seen him there; for I have been told that he is very cunning."],[23,"See therefore, and take knowledge of all the lurking places where he hides himself, and come again to me with certainty, and I will go with you. It shall happen, if he is in the land, that I will search him out among all the thousands of Judah.”",true],[24,"They arose, and went to Ziph before Saul: but David and his men were in the wilderness of Maon, in the Arabah on the south of the desert."],[25,"Saul and his men went to seek him. When David was told, he went down to the rock, and stayed in the wilderness of Maon. When Saul heard that, he pursued David in the wilderness of Maon."],[26,"Saul went on this side of the mountain, and David and his men on that side of the mountain; and David hurried to get away for fear of Saul; for Saul and his men surrounded David and his men to take them."],[27,"But a messenger came to Saul, saying, “Hurry and come; for the Philistines have made a raid on the land!”"],[28,"So Saul returned from pursuing David, and went against the Philistines. Therefore they called that place Sela Hammahlekoth.",true],[29,"David went up from there, and lived in the strongholds of En Gedi.",true]],[[1,"When Saul had returned from following the Philistines, he was told, “Behold, David is in the wilderness of En Gedi.”"],[2,"Then Saul took three thousand chosen men out of all Israel, and went to seek David and his men on the rocks of the wild goats."],[3,"He came to the sheep pens by the way, where there was a cave; and Saul went in to relieve himself. Now David and his men were staying in the innermost parts of the cave."],[4,"David’s men said to him, “Behold, the day of which Yahweh said to you, ‘Behold, I will deliver your enemy into your hand, and you shall do to him as it shall seem good to you.’ ” Then David arose, and cut off the skirt of Saul’s robe secretly."],[5,"Afterward, David’s heart struck him, because he had cut off Saul’s skirt."],[6,"He said to his men, “Yahweh forbid that I should do this thing to my lord, Yahweh’s anointed, to stretch out my hand against him, since he is Yahweh’s anointed.”"],[7,"So David checked his men with these words, and didn’t allow them to rise against Saul. Saul rose up out of the cave, and went on his way."],[8,"David also arose afterward, and went out of the cave, and cried after Saul, saying, “My lord the king!” When Saul looked behind him, David bowed with his face to the earth, and showed respect."],[9,"David said to Saul, “Why do you listen to men’s words, saying, ‘Behold, David seeks to harm you?’"],[10,"Behold, today your eyes have seen how Yahweh had delivered you today into my hand in the cave. Some urged me to kill you; but I spared you; and I said, I will not stretch out my hand against my lord; for he is Yahweh’s anointed."],[11,"Moreover, my father, behold, yes, see the skirt of your robe in my hand; for in that I cut off the skirt of your robe, and didn’t kill you, know and see that there is neither evil nor disobedience in my hand, and I have not sinned against you, though you hunt for my life to take it."],[12,"May Yahweh judge between me and you, and may Yahweh avenge me of you; but my hand will not be on you."],[13,"As the proverb of the ancients says, ‘Out of the wicked comes wickedness;’ but my hand will not be on you."],[14,"Against whom has the king of Israel come out? Whom do you pursue? A dead dog? A flea?"],[15,"May Yahweh therefore be judge, and give sentence between me and you, and see, and plead my cause, and deliver me out of your hand.”",true],[16,"It came to pass, when David had finished speaking these words to Saul, that Saul said, “Is that your voice, my son David?” Saul lifted up his voice, and wept."],[17,"He said to David, “You are more righteous than I; for you have done good to me, whereas I have done evil to you."],[18,"You have declared today how you have dealt well with me, because when Yahweh had delivered me up into your hand, you didn’t kill me."],[19,"For if a man finds his enemy, will he let him go away unharmed? Therefore may Yahweh reward you good for that which you have done to me today."],[20,"Now, behold, I know that you will surely be king, and that the kingdom of Israel will be established in your hand."],[21,"Swear now therefore to me by Yahweh, that you will not cut off my offspring after me, and that you will not destroy my name out of my father’s house.”",true],[22,"David swore to Saul. Saul went home, but David and his men went up to the stronghold.",true]],[[1,"Samuel died; and all Israel gathered themselves together, and mourned for him, and buried him at his house at Ramah. Then David arose, and went down to the wilderness of Paran."],[2,"There was a man in Maon, whose possessions were in Carmel; and the man was very great. He had three thousand sheep and a thousand goats; and he was shearing his sheep in Carmel."],[3,"Now the name of the man was Nabal; and the name of his wife Abigail. This woman was intelligent and had a beautiful face; but the man was surly and evil in his doings. He was of the house of Caleb."],[4,"David heard in the wilderness that Nabal was shearing his sheep."],[5,"David sent ten young men, and David said to the young men, “Go up to Carmel, and go to Nabal, and greet him in my name."],[6,"Tell him, ‘Long life to you! Peace be to you! Peace be to your house! Peace be to all that you have!"],[7,"Now I have heard that you have shearers. Your shepherds have now been with us, and we didn’t harm them. Nothing was missing from them all the time they were in Carmel."],[8,"Ask your young men, and they will tell you. Therefore let the young men find favor in your eyes; for we come on a good day. Please give whatever comes to your hand, to your servants, and to your son David.’ ”",true],[9,"When David’s young men came, they spoke to Nabal all those words in the name of David, and waited.",true],[10,"Nabal answered David’s servants, and said, “Who is David? Who is the son of Jesse? There are many servants who break away from their masters these days."],[11,"Shall I then take my bread, my water, and my meat that I have killed for my shearers, and give it to men who I don’t know where they come from?”",true],[12,"So David’s young men turned on their way, and went back, and came and told him all these words.",true],[13,"David said to his men, “Every man put on his sword!” Every man put on his sword. David also put on his sword. About four hundred men followed David, and two hundred stayed by the baggage."],[14,"But one of the young men told Abigail, Nabal’s wife, saying, “Behold, David sent messengers out of the wilderness to Greet our master; and he insulted them."],[15,"But the men were very good to us, and we were not harmed, and we didn’t miss anything, as long as we went with them, when we were in the fields."],[16,"They were a wall to us both by night and by day, all the while we were with them keeping the sheep."],[17,"Now therefore know and consider what you will do; for evil is determined against our master, and against all his house; for he is such a worthless fellow that one can’t speak to him.”",true],[18,"Then Abigail hurried and took two hundred loaves of bread, two containers of wine, five sheep ready dressed, five seahs of parched grain, one hundred clusters of raisins, and two hundred cakes of figs, and laid them on donkeys."],[19,"She said to her young men, “Go on before me. Behold, I am coming after you.” But she didn’t tell her husband, Nabal."],[20,"As she rode on her donkey, and came down by the covert of the mountain, that behold, David and his men came down toward her, and she met them.",true],[21,"Now David had said, “Surely in vain I have kept all that this fellow has in the wilderness, so that nothing was missed of all that pertained to him. He has returned me evil for good."],[22,"God do so to the enemies of David, and more also, if I leave of all that belongs to him by the morning light so much as one who urinates on a wall.”",true],[23,"When Abigail saw David, she hurried and got off her donkey, and fell before David on her face, and bowed herself to the ground."],[24,"She fell at his feet, and said, “On me, my lord, on me be the blame! Please let your servant speak in your ears. Hear the words of your servant."],[25,"Please don’t let my lord pay attention to this worthless fellow, Nabal; for as his name is, so is he. Nabal is his name, and folly is with him; but I, your servant, didn’t see my lord’s young men, whom you sent."],[26,"Now therefore, my lord, as Yahweh lives, and as your soul lives, since Yahweh has withheld you from blood guiltiness, and from avenging yourself with your own hand, now therefore let your enemies, and those who seek evil to my lord, be as Nabal."],[27,"Now this present which your servant has brought to my lord, let it be given to the young men who follow my lord."],[28,"Please forgive the trespass of your servant. For Yahweh will certainly make my lord a sure house, because my lord fights Yahweh’s battles. Evil will not be found in you all your days."],[29,"Though men may rise up to pursue you, and to seek your soul, yet the soul of my lord will be bound in the bundle of life with Yahweh your God. He will sling out the souls of your enemies, as from the hollow of a sling."],[30,"It will come to pass, when Yahweh has done to my lord according to all the good that he has spoken concerning you, and has appointed you prince over Israel,"],[31,"that this shall be no grief to you, nor offense of heart to my lord, either that you have shed blood without cause, or that my lord has avenged himself. When Yahweh has dealt well with my lord, then remember your servant.”",true],[32,"David said to Abigail, “Blessed is Yahweh, the God of Israel, who sent you today to meet me!"],[33,"Blessed is your discretion, and blessed are you, who have kept me today from blood guiltiness, and from avenging myself with my own hand."],[34,"For indeed, as Yahweh, the God of Israel, lives, who has withheld me from harming you, unless you had hurried and come to meet me, surely there wouldn’t have been left to Nabal by the morning light so much as one who urinates on a wall.”",true],[35,"So David received from her hand that which she had brought him. Then he said to her, “Go up in peace to your house. Behold, I have listened to your voice, and have granted your request.”",true],[36,"Abigail came to Nabal; and behold, he held a feast in his house, like the feast of a king. Nabal’s heart was merry within him, for he was very drunk. Therefore she told him nothing until the morning light."],[37,"In the morning, when the wine had gone out of Nabal, his wife told him these things, and his heart died within him, and he became as a stone."],[38,"About ten days later, Yahweh struck Nabal, so that he died."],[39,"When David heard that Nabal was dead, he said, “Blessed is Yahweh, who has pleaded the cause of my reproach from the hand of Nabal, and has kept back his servant from evil. Yahweh has returned the evildoing of Nabal on his own head.” David sent and spoke concerning Abigail, to take her to himself as wife."],[40,"When David’s servants had come to Abigail to Carmel, they spoke to her, saying, “David has sent us to you, to take you to him as wife.”",true],[41,"She arose, and bowed herself with her face to the earth, and said, “Behold, your servant is a servant to wash the feet of the servants of my lord.”"],[42,"Abigail hurried, and arose, and rode on a donkey, with five ladies of hers who followed her; and she went after the messengers of David, and became his wife."],[43,"David also took Ahinoam of Jezreel; and they both became his wives."],[44,"Now Saul had given Michal his daughter, David’s wife, to Palti the son of Laish, who was of Gallim.",true]],[[1,"The Ziphites came to Saul to Gibeah, saying, “Doesn’t David hide himself in the hill of Hachilah, which is before the desert?”"],[2,"Then Saul arose, and went down to the wilderness of Ziph, having three thousand chosen men of Israel with him, to seek David in the wilderness of Ziph."],[3,"Saul encamped in the hill of Hachilah, which is before the desert, by the way. But David stayed in the wilderness, and he saw that Saul came after him into the wilderness."],[4,"David therefore sent out spies, and understood that Saul had certainly come."],[5,"Then David arose, and came to the place where Saul had encamped; and David saw the place where Saul lay, with Abner the son of Ner, the captain of his army. Saul lay within the place of the wagons, and the people were encamped around him.",true],[6,"Then David answered and said to Ahimelech the Hittite, and to Abishai the son of Zeruiah, brother of Joab, saying, “Who will go down with me to Saul to the camp?” Abishai said, “I will go down with you.”"],[7,"So David and Abishai came to the people by night: and, behold, Saul lay sleeping within the place of the wagons, with his spear stuck in the ground at his head; and Abner and the people lay around him."],[8,"Then Abishai said to David, “God has delivered up your enemy into your hand today. Now therefore please let me strike him with the spear to the earth at one stroke, and I will not strike him the second time.”",true],[9,"David said to Abishai, “Don’t destroy him; for who can stretch out his hand against Yahweh’s anointed, and be guiltless?”"],[10,"David said, “As Yahweh lives, Yahweh will strike him; or his day shall come to die; or he shall go down into battle and perish."],[11,"Yahweh forbid that I should stretch out my hand against Yahweh’s anointed; but now please take the spear that is at his head, and the jar of water, and let’s go.”",true],[12,"So David took the spear and the jar of water from Saul’s head; and they went away: and no man saw it, or knew it, nor did any awake; for they were all asleep, because a deep sleep from Yahweh had fallen on them."],[13,"Then David went over to the other side, and stood on the top of the mountain afar off; a great space being between them;"],[14,"and David cried to the people, and to Abner the son of Ner, saying, “Don’t you answer, Abner?” Then Abner answered, “Who are you who cries to the king?”",true],[15,"David said to Abner, “Aren’t you a man? Who is like you in Israel? Why then have you not kept watch over your lord, the king? For one of the people came in to destroy the king your lord."],[16,"This thing isn’t good that you have done. As Yahweh lives, you are worthy to die, because you have not kept watch over your lord, Yahweh’s anointed. Now see where the king’s spear is, and the jar of water that was at his head.”",true],[17,"Saul knew David’s voice, and said, “Is this your voice, my son David?” David said, “It is my voice, my lord, O king.”"],[18,"He said, “Why does my lord pursue his servant? For what have I done? What evil is in my hand?"],[19,"Now therefore, please let my lord the king hear the words of his servant. If it is so that Yahweh has stirred you up against me, let him accept an offering. But if it is the children of men, they are cursed before Yahweh; for they have driven me out today that I shouldn’t cling to Yahweh’s inheritance, saying, ‘Go, serve other gods!’"],[20,"Now therefore, don’t let my blood fall to the earth away from the presence of Yahweh; for the king of Israel has come out to seek a flea, as when one hunts a partridge in the mountains.”",true],[21,"Then Saul said, “I have sinned. Return, my son David; for I will no more do you harm, because my life was precious in your eyes today. Behold, I have played the fool, and have erred exceedingly.”",true],[22,"David answered, “Behold the spear, O king! Then let one of the young men come over and get it."],[23,"Yahweh will render to every man his righteousness and his faithfulness; because Yahweh delivered you into my hand today, and I wouldn’t stretch out my hand against Yahweh’s anointed."],[24,"Behold, as your life was respected today in my eyes, so let my life be respected in Yahweh’s eyes, and let him deliver me out of all oppression.”",true],[25,"Then Saul said to David, “You are blessed, my son David. You will both do mightily, and will surely prevail.” So David went his way, and Saul returned to his place.",true]],[[1,"David said in his heart, “I will now perish one day by the hand of Saul. There is nothing better for me than that I should escape into the land of the Philistines; and Saul will despair of me, to seek me any more in all the borders of Israel. So shall I escape out of his hand.”"],[2,"David arose, and passed over, he and the six hundred men who were with him, to Achish the son of Maoch, king of Gath."],[3,"David lived with Achish at Gath, he and his men, every man with his household, even David with his two wives, Ahinoam the Jezreelitess, and Abigail the Carmelitess, Nabal’s wife."],[4,"Saul was told that David had fled to Gath: and he sought no more again for him."],[5,"David said to Achish, “If now I have found favor in your eyes, let them give me a place in one of the cities in the country, that I may dwell there. For why should your servant dwell in the royal city with you?”"],[6,"Then Achish gave him Ziklag that day: therefore Ziklag belongs to the kings of Judah to this day."],[7,"The number of the days that David lived in the country of the Philistines was a full year and four months."],[8,"David and his men went up and raided the Geshurites, the Girzites, and the Amalekites; for those were the inhabitants of the land, who were of old, on the way to Shur, even to the land of Egypt."],[9,"David struck the land, and saved no man or woman alive, and took away the sheep, the cattle, the donkeys, the camels, and the clothing. Then he returned, and came to Achish.",true],[10,"Achish said, “Against whom have you made a raid today?” David said, “Against the South of Judah, against the South of the Jerahmeelites, and against the South of the Kenites.”"],[11,"David saved neither man nor woman alive, to bring them to Gath, saying, “Lest they should tell about us, saying, ‘David did this, and this has been his way all the time he has lived in the country of the Philistines.’ ”",true],[12,"Achish believed David, saying, “He has made his people Israel utterly to abhor him. Therefore he will be my servant forever.”",true]],[[1,"In those days, the Philistines gathered their armies together for warfare, to fight with Israel. Achish said to David, “Know assuredly that you will go out with me in the army, you and your men.”",true],[2,"David said to Achish, “Therefore you will know what your servant can do.” Achish said to David, “Therefore I will make you my bodyguard forever.”",true],[3,"Now Samuel was dead, and all Israel had mourned for him, and buried him in Ramah, even in his own city. Saul had sent away those who had familiar spirits and the wizards out of the land."],[4,"The Philistines gathered themselves together, and came and encamped in Shunem; and Saul gathered all Israel together, and they encamped in Gilboa."],[5,"When Saul saw the army of the Philistines, he was afraid, and his heart trembled greatly."],[6,"When Saul inquired of Yahweh, Yahweh didn’t answer him by dreams, by Urim, or by prophets."],[7,"Then Saul said to his servants, “Seek for me a woman who has a familiar spirit, that I may go to her, and inquire of her.” His servants said to him, “Behold, there is a woman who has a familiar spirit at Endor.”",true],[8,"Saul disguised himself and put on other clothing, and went, he and two men with him, and they came to the woman by night. Then he said, “Please consult for me by the familiar spirit, and bring me up whomever I shall name to you.”",true],[9,"The woman said to him, “Behold, you know what Saul has done, how he has cut off those who have familiar spirits, and the wizards, out of the land. Why then do you lay a snare for my life, to cause me to die?”",true],[10,"Saul swore to her by Yahweh, saying, “As Yahweh lives, no punishment will happen to you for this thing.”",true],[11,"Then the woman said, “Whom shall I bring up to you?” He said, “Bring Samuel up for me.”",true],[12,"When the woman saw Samuel, she cried with a loud voice; and the woman spoke to Saul, saying, “Why have you deceived me? For you are Saul!”",true],[13,"The king said to her, “Don’t be afraid! What do you see?” The woman said to Saul, “I see a god coming up out of the earth.”",true],[14,"He said to her, “What does he look like?” She said, “An old man comes up. He is covered with a robe.” Saul perceived that it was Samuel, and he bowed with his face to the ground, and showed respect.",true],[15,"Samuel said to Saul, “Why have you disturbed me, to bring me up?” Saul answered, “I am very distressed; for the Philistines make war against me, and God has departed from me, and answers me no more, by prophets, or by dreams. Therefore I have called you, that you may make known to me what I shall do.”",true],[16,"Samuel said, “Why then do you ask me, since Yahweh has departed from you and has become your adversary?"],[17,"Yahweh has done to you as he spoke by me. Yahweh has torn the kingdom out of your hand, and given it to your neighbor, even to David."],[18,"Because you didn’t obey Yahweh’s voice, and didn’t execute his fierce wrath on Amalek, therefore Yahweh has done this thing to you today."],[19,"Moreover Yahweh will deliver Israel also with you into the hand of the Philistines; and tomorrow you and your sons will be with me. Yahweh will deliver the army of Israel also into the hand of the Philistines.”",true],[20,"Then Saul fell immediately his full length on the earth, and was terrified, because of Samuel’s words. There was no strength in him; for he had eaten no bread all day long or all night long.",true],[21,"The woman came to Saul, and saw that he was very troubled, and said to him, “Behold, your servant has listened to your voice, and I have put my life in my hand, and have listened to your words which you spoke to me."],[22,"Now therefore, please listen also to the voice of your servant, and let me set a morsel of bread before you. Eat, that you may have strength, when you go on your way.”",true],[23,"But he refused, and said, “I will not eat.” But his servants, together with the woman, constrained him; and he listened to their voice. So he arose from the earth and sat on the bed."],[24,"The woman had a fattened calf in the house. She hurried and killed it; and she took flour, and kneaded it, and baked unleavened bread of it."],[25,"She brought it before Saul, and before his servants; and they ate. Then they rose up, and went away that night.",true]],[[1,"Now the Philistines gathered together all their armies to Aphek; and the Israelites encamped by the spring which is in Jezreel."],[2,"The lords of the Philistines passed on by hundreds and by thousands; and David and his men passed on in the rear with Achish.",true],[3,"Then the princes of the Philistines said, “What about these Hebrews?” Achish said to the princes of the Philistines, “Isn’t this David, the servant of Saul the king of Israel, who has been with me these days, or rather these years? I have found no fault in him since he fell away until today.”",true],[4,"But the princes of the Philistines were angry with him; and the princes of the Philistines said to him, “Make the man return, that he may go back to his place where you have appointed him, and let him not go down with us to battle, lest in the battle he become an adversary to us. For with what should this fellow reconcile himself to his lord? Should it not be with the heads of these men?"],[5,"Isn’t this David, of whom people sang to one another in dances, saying, ‘Saul has slain his thousands, and David his ten thousands?’ ”",true],[6,"Then Achish called David, and said to him, “As Yahweh lives, you have been upright, and your going out and your coming in with me in the army is good in my sight; for I have not found evil in you since the day of your coming to me to this day. Nevertheless, the lords don’t favor you."],[7,"Therefore now return, and go in peace, that you not displease the lords of the Philistines.”",true],[8,"David said to Achish, “But what have I done? What have you found in your servant so long as I have been before you to this day, that I may not go and fight against the enemies of my lord the king?”",true],[9,"Achish answered David, “I know that you are good in my sight, as an angel of God. Notwithstanding the princes of the Philistines have said, ‘He shall not go up with us to the battle.’"],[10,"Therefore now rise up early in the morning with the servants of your lord who have come with you; and as soon as you are up early in the morning, and have light, depart.”",true],[11,"So David rose up early, he and his men, to depart in the morning, to return into the land of the Philistines, and the Philistines went up to Jezreel.",true]],[[1,"When David and his men had come to Ziklag on the third day, the Amalekites had made a raid on the South, and on Ziklag, and had struck Ziklag, and burned it with fire,"],[2,"and had taken captive the women and all who were in it, both small and great. They didn’t kill any, but carried them off, and went their way."],[3,"When David and his men came to the city, behold, it was burned with fire; and their wives, their sons, and their daughters were taken captive."],[4,"Then David and the people who were with him lifted up their voice and wept until they had no more power to weep."],[5,"David’s two wives were taken captive, Ahinoam the Jezreelitess, and Abigail the wife of Nabal the Carmelite."],[6,"David was greatly distressed; for the people spoke of stoning him, because the souls of all the people were grieved, every man for his sons and for his daughters; but David strengthened himself in Yahweh his God."],[7,"David said to Abiathar the priest, the son of Ahimelech, “Please bring the ephod here to me.” Abiathar brought the ephod to David."],[8,"David inquired of Yahweh, saying, “If I pursue after this troop, will I overtake them?” He answered him, “Pursue; for you will surely overtake them, and will without fail recover all.”",true],[9,"So David went, he and the six hundred men who were with him, and came to the brook Besor, where those who were left behind stayed."],[10,"But David pursued, he and four hundred men; for two hundred stayed behind, who were so faint that they couldn’t go over the brook Besor."],[11,"They found an Egyptian in the field, and brought him to David, and gave him bread, and he ate; and they gave him water to drink."],[12,"They gave him a piece of a cake of figs, and two clusters of raisins. When he had eaten, his spirit came again to him; for he had eaten no bread, and drank no water for three days and three nights."],[13,"David asked him, “To whom do you belong? Where are you from?” He said, “I am a young man of Egypt, servant to an Amalekite; and my master left me, because three days ago I got sick."],[14,"We made a raid on the South of the Cherethites, and on that which belongs to Judah, and on the South of Caleb; and we burned Ziklag with fire.”",true],[15,"David said to him, “Will you bring me down to this troop?” He said, “Swear to me by God that you will not kill me and not deliver me up into the hands of my master, and I will bring you down to this troop.”",true],[16,"When he had brought him down, behold, they were spread around over all the ground, eating, drinking, and dancing, because of all the great plunder that they had taken out of the land of the Philistines, and out of the land of Judah."],[17,"David struck them from the twilight even to the evening of the next day. Not a man of them escaped from there, except four hundred young men, who rode on camels and fled."],[18,"David recovered all that the Amalekites had taken, and David rescued his two wives."],[19,"There was nothing lacking to them, neither small nor great, neither sons nor daughters, neither plunder, nor anything that they had taken to them. David brought back all."],[20,"David took all the flocks and the herds, which they drove before those other livestock, and said, “This is David’s plunder.”",true],[21,"David came to the two hundred men, who were so faint that they could not follow David, whom also they had made to stay at the brook Besor; and they went out to meet David, and to meet the people who were with him. When David came near to the people, he greeted them."],[22,"Then all the wicked men and worthless fellows, of those who went with David, answered and said, “Because they didn’t go with us, we will not give them anything of the plunder that we have recovered, except to every man his wife and his children, that he may lead them away, and depart.”",true],[23,"Then David said, “Do not do so, my brothers, with that which Yahweh has given to us, who has preserved us, and delivered the troop that came against us into our hand."],[24,"Who will listen to you in this matter? For as his share is who goes down to the battle, so shall his share be who stays with the baggage. They shall share alike.”"],[25,"It was so from that day forward, that he made it a statute and an ordinance for Israel to this day."],[26,"When David came to Ziklag, he sent some of the plunder to the elders of Judah, even to his friends, saying, “Behold, a present for you from the plunder of Yahweh’s enemies.”"],[27,"He sent it to those who were in Bethel, to those who were in Ramoth of the South, to those who were in Jattir,"],[28,"to those who were in Aroer, to those who were in Siphmoth, to those who were in Eshtemoa,"],[29,"to those who were in Racal, to those who were in the cities of the Jerahmeelites, to those who were in the cities of the Kenites,"],[30,"to those who were in Hormah, to those who were in Borashan, to those who were in Athach,"],[31,"to those who were in Hebron, and to all the places where David himself and his men used to stay.",true]],[[1,"Now the Philistines fought against Israel; and the men of Israel fled from before the Philistines, and fell down slain on Mount Gilboa."],[2,"The Philistines overtook Saul and on his sons; and the Philistines killed Jonathan, Abinadab, and Malchishua, the sons of Saul."],[3,"The battle went hard against Saul, and the archers overtook him; and he was greatly distressed by reason of the archers."],[4,"Then Saul said to his armor bearer, “Draw your sword, and thrust me through with it, lest these uncircumcised come and thrust me through, and abuse me!” But his armor bearer would not; for he was terrified. Therefore Saul took his sword, and fell on it."],[5,"When his armor bearer saw that Saul was dead, he likewise fell on his sword, and died with him."],[6,"So Saul died, and his three sons, and his armor bearer, and all his men, that same day together.",true],[7,"When the men of Israel who were on the other side of the valley, and those who were beyond the Jordan, saw that the men of Israel fled, and that Saul and his sons were dead, they abandoned the cities and fled; and the Philistines came and lived in them."],[8,"On the next day, when the Philistines came to strip the slain, they found Saul and his three sons fallen on Mount Gilboa."],[9,"They cut off his head, stripped off his armor, and sent into the land of the Philistines all around, to carry the news to the house of their idols, and to the people."],[10,"They put his armor in the house of the Ashtaroth, and they fastened his body to the wall of Beth Shan."],[11,"When the inhabitants of Jabesh Gilead heard what the Philistines had done to Saul,"],[12,"all the valiant men arose, went all night, and took the body of Saul and the bodies of his sons from the wall of Beth Shan; and they came to Jabesh, and burned them there."],[13,"They took their bones and buried them under the tamarisk tree in Jabesh, and fasted seven days.",true]]]}},{"slug":"2-samuel","name":"2 Samuel","osisId":"2Sam","chapterCount":24,"titles":{"KJV":"The Second Book of Samuel, otherwise called The Second Book of the Kings","WEB":"The Second Book of Samuel"},"chapters":{"KJV":[[[1,"Now it came to pass after the death of Saul, when David was returned from the slaughter of the Amalekites, and David had abode two days in Ziklag;"],[2,"It came even to pass on the third day, that, behold, a man came out of the camp from Saul with his clothes rent, and earth upon his head: and [so] it was, when he came to David, that he fell to the earth, and did obeisance."],[3,"And David said unto him, From whence comest thou? And he said unto him, Out of the camp of Israel am I escaped."],[4,"And David said unto him, How went the matter? I pray thee, tell me. And he answered, That the people are fled from the battle, and many of the people also are fallen and dead; and Saul and Jonathan his son are dead also.",["How…: Heb. What was, etc"]],[5,"And David said unto the young man that told him, How knowest thou that Saul and Jonathan his son be dead?"],[6,"And the young man that told him said, As I happened by chance upon mount Gilboa, behold, Saul leaned upon his spear; and, lo, the chariots and horsemen followed hard after him."],[7,"And when he looked behind him, he saw me, and called unto me. And I answered, Here [am] I.",["Here…: Heb. Behold me"]],[8,"And he said unto me, Who [art] thou? And I answered him, I [am] an Amalekite."],[9,"He said unto me again, Stand, I pray thee, upon me, and slay me: for anguish is come upon me, because my life [is] yet whole in me.",["anguish…: or, my coat of mail (or, my embroidered coat) hindereth me, that my, etc"]],[10,"So I stood upon him, and slew him, because I was sure that he could not live after that he was fallen: and I took the crown that [was] upon his head, and the bracelet that [was] on his arm, and have brought them hither unto my lord.",true],[11,"Then David took hold on his clothes, and rent them; and likewise all the men that [were] with him:"],[12,"And they mourned, and wept, and fasted until even, for Saul, and for Jonathan his son, and for the people of the LORD, and for the house of Israel; because they were fallen by the sword."],[13,"And David said unto the young man that told him, Whence [art] thou? And he answered, I [am] the son of a stranger, an Amalekite."],[14,"And David said unto him, How wast thou not afraid to stretch forth thine hand to destroy the LORD'S anointed?"],[15,"And David called one of the young men, and said, Go near, [and] fall upon him. And he smote him that he died."],[16,"And David said unto him, Thy blood [be] upon thy head; for thy mouth hath testified against thee, saying, I have slain the LORD'S anointed.",true],[17,"And David lamented with this lamentation over Saul and over Jonathan his son:"],[18,"(Also he bade them teach the children of Judah [the use of] the bow: behold, [it is] written in the book of Jasher.)",["of Jasher: or, of the upright"]],[19,"The beauty of Israel is slain upon thy high places: how are the mighty fallen!"],[20,"Tell [it] not in Gath, publish [it] not in the streets of Askelon; lest the daughters of the Philistines rejoice, lest the daughters of the uncircumcised triumph."],[21,"Ye mountains of Gilboa, [let there be] no dew, neither [let there be] rain, upon you, nor fields of offerings: for there the shield of the mighty is vilely cast away, the shield of Saul, [as though he had] not [been] anointed with oil."],[22,"From the blood of the slain, from the fat of the mighty, the bow of Jonathan turned not back, and the sword of Saul returned not empty."],[23,"Saul and Jonathan [were] lovely and pleasant in their lives, and in their death they were not divided: they were swifter than eagles, they were stronger than lions.",["pleasant: or, sweet"]],[24,"Ye daughters of Israel, weep over Saul, who clothed you in scarlet, with [other] delights, who put on ornaments of gold upon your apparel."],[25,"How are the mighty fallen in the midst of the battle! O Jonathan, [thou wast] slain in thine high places."],[26,"I am distressed for thee, my brother Jonathan: very pleasant hast thou been unto me: thy love to me was wonderful, passing the love of women."],[27,"How are the mighty fallen, and the weapons of war perished!",true]],[[1,"And it came to pass after this, that David enquired of the LORD, saying, Shall I go up into any of the cities of Judah? And the LORD said unto him, Go up. And David said, Whither shall I go up? And he said, Unto Hebron."],[2,"So David went up thither, and his two wives also, Ahinoam the Jezreelitess, and Abigail Nabal's wife the Carmelite."],[3,"And his men that [were] with him did David bring up, every man with his household: and they dwelt in the cities of Hebron."],[4,"And the men of Judah came, and there they anointed David king over the house of Judah. And they told David, saying, [That] the men of Jabeshgilead [were they] that buried Saul."],[5,"And David sent messengers unto the men of Jabeshgilead, and said unto them, Blessed [be] ye of the LORD, that ye have shewed this kindness unto your lord, [even] unto Saul, and have buried him."],[6,"And now the LORD shew kindness and truth unto you: and I also will requite you this kindness, because ye have done this thing."],[7,"Therefore now let your hands be strengthened, and be ye valiant: for your master Saul is dead, and also the house of Judah have anointed me king over them.",["be ye…: Heb. be ye the sons of valour"],true],[8,"But Abner the son of Ner, captain of Saul's host, took Ishbosheth the son of Saul, and brought him over to Mahanaim;",["Saul's host: Heb. the host which was Saul's","Ishbosheth: or, Eshbaal"]],[9,"And made him king over Gilead, and over the Ashurites, and over Jezreel, and over Ephraim, and over Benjamin, and over all Israel."],[10,"Ishbosheth Saul's son [was] forty years old when he began to reign over Israel, and reigned two years. But the house of Judah followed David."],[11,"And the time that David was king in Hebron over the house of Judah was seven years and six months.",["time: Heb. number of days"]],[12,"And Abner the son of Ner, and the servants of Ishbosheth the son of Saul, went out from Mahanaim to Gibeon."],[13,"And Joab the son of Zeruiah, and the servants of David, went out, and met together by the pool of Gibeon: and they sat down, the one on the one side of the pool, and the other on the other side of the pool.",["together: Heb. them together"]],[14,"And Abner said to Joab, Let the young men now arise, and play before us. And Joab said, Let them arise."],[15,"Then there arose and went over by number twelve of Benjamin, which [pertained] to Ishbosheth the son of Saul, and twelve of the servants of David."],[16,"And they caught every one his fellow by the head, and [thrust] his sword in his fellow's side; so they fell down together: wherefore that place was called Helkathhazzurim, which [is] in Gibeon.",["Helkathhazzurim: that is, The field of strong men"]],[17,"And there was a very sore battle that day; and Abner was beaten, and the men of Israel, before the servants of David.",true],[18,"And there were three sons of Zeruiah there, Joab, and Abishai, and Asahel: and Asahel [was as] light of foot as a wild roe.",["of foot: Heb. of his feet","as a wild…: Heb. as one of the roes that is in the field"]],[19,"And Asahel pursued after Abner; and in going he turned not to the right hand nor to the left from following Abner.",["from…: Heb. from after Abner"]],[20,"Then Abner looked behind him, and said, [Art] thou Asahel? And he answered, I [am]."],[21,"And Abner said to him, Turn thee aside to thy right hand or to thy left, and lay thee hold on one of the young men, and take thee his armour. But Asahel would not turn aside from following of him.",["armour: or, spoil"]],[22,"And Abner said again to Asahel, Turn thee aside from following me: wherefore should I smite thee to the ground? how then should I hold up my face to Joab thy brother?"],[23,"Howbeit he refused to turn aside: wherefore Abner with the hinder end of the spear smote him under the fifth [rib], that the spear came out behind him; and he fell down there, and died in the same place: and it came to pass, [that] as many as came to the place where Asahel fell down and died stood still."],[24,"Joab also and Abishai pursued after Abner: and the sun went down when they were come to the hill of Ammah, that [lieth] before Giah by the way of the wilderness of Gibeon.",true],[25,"And the children of Benjamin gathered themselves together after Abner, and became one troop, and stood on the top of an hill."],[26,"Then Abner called to Joab, and said, Shall the sword devour for ever? knowest thou not that it will be bitterness in the latter end? how long shall it be then, ere thou bid the people return from following their brethren?"],[27,"And Joab said, [As] God liveth, unless thou hadst spoken, surely then in the morning the people had gone up every one from following his brother.",["in the…: Heb. from the morning","gone…: or, gone away"]],[28,"So Joab blew a trumpet, and all the people stood still, and pursued after Israel no more, neither fought they any more."],[29,"And Abner and his men walked all that night through the plain, and passed over Jordan, and went through all Bithron, and they came to Mahanaim."],[30,"And Joab returned from following Abner: and when he had gathered all the people together, there lacked of David's servants nineteen men and Asahel."],[31,"But the servants of David had smitten of Benjamin, and of Abner's men, [so that] three hundred and threescore men died."],[32,"And they took up Asahel, and buried him in the sepulchre of his father, which [was in] Bethlehem. And Joab and his men went all night, and they came to Hebron at break of day.",true]],[[1,"Now there was long war between the house of Saul and the house of David: but David waxed stronger and stronger, and the house of Saul waxed weaker and weaker."],[2,"And unto David were sons born in Hebron: and his firstborn was Amnon, of Ahinoam the Jezreelitess;"],[3,"And his second, Chileab, of Abigail the wife of Nabal the Carmelite; and the third, Absalom the son of Maacah the daughter of Talmai king of Geshur;",["Chileab: or, Daniel"]],[4,"And the fourth, Adonijah the son of Haggith; and the fifth, Shephatiah the son of Abital;"],[5,"And the sixth, Ithream, by Eglah David's wife. These were born to David in Hebron."],[6,"And it came to pass, while there was war between the house of Saul and the house of David, that Abner made himself strong for the house of Saul.",true],[7,"And Saul had a concubine, whose name [was] Rizpah, the daughter of Aiah: and [Ishbosheth] said to Abner, Wherefore hast thou gone in unto my father's concubine?"],[8,"Then was Abner very wroth for the words of Ishbosheth, and said, [Am] I a dog's head, which against Judah do shew kindness this day unto the house of Saul thy father, to his brethren, and to his friends, and have not delivered thee into the hand of David, that thou chargest me to day with a fault concerning this woman?"],[9,"So do God to Abner, and more also, except, as the LORD hath sworn to David, even so I do to him;"],[10,"To translate the kingdom from the house of Saul, and to set up the throne of David over Israel and over Judah, from Dan even to Beersheba."],[11,"And he could not answer Abner a word again, because he feared him."],[12,"And Abner sent messengers to David on his behalf, saying, Whose [is] the land? saying [also], Make thy league with me, and, behold, my hand [shall be] with thee, to bring about all Israel unto thee."],[13,"And he said, Well; I will make a league with thee: but one thing I require of thee, that is, Thou shalt not see my face, except thou first bring Michal Saul's daughter, when thou comest to see my face.",["that is: Heb. saying"]],[14,"And David sent messengers to Ishbosheth Saul's son, saying, Deliver [me] my wife Michal, which I espoused to me for an hundred foreskins of the Philistines."],[15,"And Ishbosheth sent, and took her from [her] husband, [even] from Phaltiel the son of Laish."],[16,"And her husband went with her along weeping behind her to Bahurim. Then said Abner unto him, Go, return. And he returned.",["along…: Heb. going and weeping"]],[17,"And Abner had communication with the elders of Israel, saying, Ye sought for David in times past [to be] king over you:",["in times…: Heb. both yesterday and the third day"]],[18,"Now then do [it]: for the LORD hath spoken of David, saying, By the hand of my servant David I will save my people Israel out of the hand of the Philistines, and out of the hand of all their enemies."],[19,"And Abner also spake in the ears of Benjamin: and Abner went also to speak in the ears of David in Hebron all that seemed good to Israel, and that seemed good to the whole house of Benjamin."],[20,"So Abner came to David to Hebron, and twenty men with him. And David made Abner and the men that [were] with him a feast."],[21,"And Abner said unto David, I will arise and go, and will gather all Israel unto my lord the king, that they may make a league with thee, and that thou mayest reign over all that thine heart desireth. And David sent Abner away; and he went in peace.",true],[22,"And, behold, the servants of David and Joab came from [pursuing] a troop, and brought in a great spoil with them: but Abner [was] not with David in Hebron; for he had sent him away, and he was gone in peace."],[23,"When Joab and all the host that [was] with him were come, they told Joab, saying, Abner the son of Ner came to the king, and he hath sent him away, and he is gone in peace."],[24,"Then Joab came to the king, and said, What hast thou done? behold, Abner came unto thee; why [is] it [that] thou hast sent him away, and he is quite gone?"],[25,"Thou knowest Abner the son of Ner, that he came to deceive thee, and to know thy going out and thy coming in, and to know all that thou doest."],[26,"And when Joab was come out from David, he sent messengers after Abner, which brought him again from the well of Sirah: but David knew [it] not."],[27,"And when Abner was returned to Hebron, Joab took him aside in the gate to speak with him quietly, and smote him there under the fifth [rib], that he died, for the blood of Asahel his brother.",["quietly: or, peaceably"]],[28,"And afterward when David heard [it], he said, I and my kingdom [are] guiltless before the LORD for ever from the blood of Abner the son of Ner:",["blood: Heb. bloods"]],[29,"Let it rest on the head of Joab, and on all his father's house; and let there not fail from the house of Joab one that hath an issue, or that is a leper, or that leaneth on a staff, or that falleth on the sword, or that lacketh bread.",["fail: Heb. be cut off"]],[30,"So Joab and Abishai his brother slew Abner, because he had slain their brother Asahel at Gibeon in the battle."],[31,"And David said to Joab, and to all the people that [were] with him, Rend your clothes, and gird you with sackcloth, and mourn before Abner. And king David [himself] followed the bier.",["bier: Heb. bed"]],[32,"And they buried Abner in Hebron: and the king lifted up his voice, and wept at the grave of Abner; and all the people wept."],[33,"And the king lamented over Abner, and said, Died Abner as a fool dieth?"],[34,"Thy hands [were] not bound, nor thy feet put into fetters: as a man falleth before wicked men, [so] fellest thou. And all the people wept again over him.",["wicked…: Heb. children of iniquity"]],[35,"And when all the people came to cause David to eat meat while it was yet day, David sware, saying, So do God to me, and more also, if I taste bread, or ought else, till the sun be down."],[36,"And all the people took notice [of it], and it pleased them: as whatsoever the king did pleased all the people.",["pleased them: Heb. was good in their eyes"]],[37,"For all the people and all Israel understood that day that it was not of the king to slay Abner the son of Ner."],[38,"And the king said unto his servants, Know ye not that there is a prince and a great man fallen this day in Israel?"],[39,"And I [am] this day weak, though anointed king; and these men the sons of Zeruiah [be] too hard for me: the LORD shall reward the doer of evil according to his wickedness.",["weak: Heb. tender"],true]],[[1,"And when Saul's son heard that Abner was dead in Hebron, his hands were feeble, and all the Israelites were troubled."],[2,"And Saul's son had two men [that were] captains of bands: the name of the one [was] Baanah, and the name of the other Rechab, the sons of Rimmon a Beerothite, of the children of Benjamin: (for Beeroth also was reckoned to Benjamin:",["other: Heb. second"]],[3,"And the Beerothites fled to Gittaim, and were sojourners there until this day.)"],[4,"And Jonathan, Saul's son, had a son [that was] lame of [his] feet. He was five years old when the tidings came of Saul and Jonathan out of Jezreel, and his nurse took him up, and fled: and it came to pass, as she made haste to flee, that he fell, and became lame. And his name [was] Mephibosheth.",["Mephibosheth: or, Meribbaal"]],[5,"And the sons of Rimmon the Beerothite, Rechab and Baanah, went, and came about the heat of the day to the house of Ishbosheth, who lay on a bed at noon."],[6,"And they came thither into the midst of the house, [as though] they would have fetched wheat; and they smote him under the fifth [rib]: and Rechab and Baanah his brother escaped."],[7,"For when they came into the house, he lay on his bed in his bedchamber, and they smote him, and slew him, and beheaded him, and took his head, and gat them away through the plain all night."],[8,"And they brought the head of Ishbosheth unto David to Hebron, and said to the king, Behold the head of Ishbosheth the son of Saul thine enemy, which sought thy life; and the LORD hath avenged my lord the king this day of Saul, and of his seed.",true],[9,"And David answered Rechab and Baanah his brother, the sons of Rimmon the Beerothite, and said unto them, [As] the LORD liveth, who hath redeemed my soul out of all adversity,"],[10,"When one told me, saying, Behold, Saul is dead, thinking to have brought good tidings, I took hold of him, and slew him in Ziklag, who [thought] that I would have given him a reward for his tidings:",["thinking…: Heb. he was in his own eyes as a bringer, etc","who…: or, which was the reward I gave him for his tidings"]],[11,"How much more, when wicked men have slain a righteous person in his own house upon his bed? shall I not therefore now require his blood of your hand, and take you away from the earth?"],[12,"And David commanded his young men, and they slew them, and cut off their hands and their feet, and hanged [them] up over the pool in Hebron. But they took the head of Ishbosheth, and buried [it] in the sepulchre of Abner in Hebron.",true]],[[1,"Then came all the tribes of Israel to David unto Hebron, and spake, saying, Behold, we [are] thy bone and thy flesh."],[2,"Also in time past, when Saul was king over us, thou wast he that leddest out and broughtest in Israel: and the LORD said to thee, Thou shalt feed my people Israel, and thou shalt be a captain over Israel."],[3,"So all the elders of Israel came to the king to Hebron; and king David made a league with them in Hebron before the LORD: and they anointed David king over Israel."],[4,"David [was] thirty years old when he began to reign, [and] he reigned forty years."],[5,"In Hebron he reigned over Judah seven years and six months: and in Jerusalem he reigned thirty and three years over all Israel and Judah.",true],[6,"And the king and his men went to Jerusalem unto the Jebusites, the inhabitants of the land: which spake unto David, saying, Except thou take away the blind and the lame, thou shalt not come in hither: thinking, David cannot come in hither.",["thinking…: or, saying David shall not, etc"]],[7,"Nevertheless David took the strong hold of Zion: the same [is] the city of David."],[8,"And David said on that day, Whosoever getteth up to the gutter, and smiteth the Jebusites, and the lame and the blind, [that are] hated of David's soul, [he shall be chief and captain]. Wherefore they said, The blind and the lame shall not come into the house.",["Wherefore…: or, Because they had said, even the blind and the lame, He shall not come into the house"]],[9,"So David dwelt in the fort, and called it the city of David. And David built round about from Millo and inward."],[10,"And David went on, and grew great, and the LORD God of hosts [was] with him.",["went…: Heb. went, going and growing"],true],[11,"And Hiram king of Tyre sent messengers to David, and cedar trees, and carpenters, and masons: and they built David an house.",["masons: Heb. hewers of the stone of the wall"]],[12,"And David perceived that the LORD had established him king over Israel, and that he had exalted his kingdom for his people Israel's sake."],[13,"And David took [him] more concubines and wives out of Jerusalem, after he was come from Hebron: and there were yet sons and daughters born to David."],[14,"And these [be] the names of those that were born unto him in Jerusalem; Shammua, and Shobab, and Nathan, and Solomon,"],[15,"Ibhar also, and Elishua, and Nepheg, and Japhia,"],[16,"And Elishama, and Eliada, and Eliphalet.",true],[17,"But when the Philistines heard that they had anointed David king over Israel, all the Philistines came up to seek David; and David heard [of it], and went down to the hold."],[18,"The Philistines also came and spread themselves in the valley of Rephaim."],[19,"And David enquired of the LORD, saying, Shall I go up to the Philistines? wilt thou deliver them into mine hand? And the LORD said unto David, Go up: for I will doubtless deliver the Philistines into thine hand."],[20,"And David came to Baalperazim, and David smote them there, and said, The LORD hath broken forth upon mine enemies before me, as the breach of waters. Therefore he called the name of that place Baalperazim.",["Baalperazim: that is, the plain of breaches"]],[21,"And there they left their images, and David and his men burned them.",["burned…: or, took them away"]],[22,"And the Philistines came up yet again, and spread themselves in the valley of Rephaim."],[23,"And when David enquired of the LORD, he said, Thou shalt not go up; [but] fetch a compass behind them, and come upon them over against the mulberry trees."],[24,"And let it be, when thou hearest the sound of a going in the tops of the mulberry trees, that then thou shalt bestir thyself: for then shall the LORD go out before thee, to smite the host of the Philistines."],[25,"And David did so, as the LORD had commanded him; and smote the Philistines from Geba until thou come to Gazer.",true]],[[1,"Again, David gathered together all [the] chosen [men] of Israel, thirty thousand."],[2,"And David arose, and went with all the people that [were] with him from Baale of Judah, to bring up from thence the ark of God, whose name is called by the name of the LORD of hosts that dwelleth [between] the cherubims.",["Baale: or, Baalah, that is, Kirjathjearim","whose name…: or, at which the name, even the name of the LORD of hosts, was called upon"]],[3,"And they set the ark of God upon a new cart, and brought it out of the house of Abinadab that [was] in Gibeah: and Uzzah and Ahio, the sons of Abinadab, drave the new cart.",["set: Heb. made to ride","Gibeah: or, the hill"]],[4,"And they brought it out of the house of Abinadab which [was] at Gibeah, accompanying the ark of God: and Ahio went before the ark.",["accompanying: Heb. with"]],[5,"And David and all the house of Israel played before the LORD on all manner of [instruments made of] fir wood, even on harps, and on psalteries, and on timbrels, and on cornets, and on cymbals.",true],[6,"And when they came to Nachon's threshingfloor, Uzzah put forth [his hand] to the ark of God, and took hold of it; for the oxen shook [it].",["shook it: or, stumbled"]],[7,"And the anger of the LORD was kindled against Uzzah; and God smote him there for [his] error; and there he died by the ark of God.",["error: or, rashness"]],[8,"And David was displeased, because the LORD had made a breach upon Uzzah: and he called the name of the place Perezuzzah to this day.",["made: Heb. broken","Perezuzzah: that is, the breach of Uzzah"]],[9,"And David was afraid of the LORD that day, and said, How shall the ark of the LORD come to me?"],[10,"So David would not remove the ark of the LORD unto him into the city of David: but David carried it aside into the house of Obededom the Gittite."],[11,"And the ark of the LORD continued in the house of Obededom the Gittite three months: and the LORD blessed Obededom, and all his household.",true],[12,"And it was told king David, saying, The LORD hath blessed the house of Obededom, and all that [pertaineth] unto him, because of the ark of God. So David went and brought up the ark of God from the house of Obededom into the city of David with gladness."],[13,"And it was [so], that when they that bare the ark of the LORD had gone six paces, he sacrificed oxen and fatlings."],[14,"And David danced before the LORD with all [his] might; and David [was] girded with a linen ephod."],[15,"So David and all the house of Israel brought up the ark of the LORD with shouting, and with the sound of the trumpet."],[16,"And as the ark of the LORD came into the city of David, Michal Saul's daughter looked through a window, and saw king David leaping and dancing before the LORD; and she despised him in her heart."],[17,"And they brought in the ark of the LORD, and set it in his place, in the midst of the tabernacle that David had pitched for it: and David offered burnt offerings and peace offerings before the LORD.",["pitched: Heb. stretched"]],[18,"And as soon as David had made an end of offering burnt offerings and peace offerings, he blessed the people in the name of the LORD of hosts."],[19,"And he dealt among all the people, [even] among the whole multitude of Israel, as well to the women as men, to every one a cake of bread, and a good piece [of flesh], and a flagon [of wine]. So all the people departed every one to his house.",true],[20,"Then David returned to bless his household. And Michal the daughter of Saul came out to meet David, and said, How glorious was the king of Israel to day, who uncovered himself to day in the eyes of the handmaids of his servants, as one of the vain fellows shamelessly uncovereth himself!",["shamelessly: or, openly"]],[21,"And David said unto Michal, [It was] before the LORD, which chose me before thy father, and before all his house, to appoint me ruler over the people of the LORD, over Israel: therefore will I play before the LORD."],[22,"And I will yet be more vile than thus, and will be base in mine own sight: and of the maidservants which thou hast spoken of, of them shall I be had in honour.",["of the…: or, of the handmaids of my servants"]],[23,"Therefore Michal the daughter of Saul had no child unto the day of her death.",true]],[[1,"And it came to pass, when the king sat in his house, and the LORD had given him rest round about from all his enemies;"],[2,"That the king said unto Nathan the prophet, See now, I dwell in an house of cedar, but the ark of God dwelleth within curtains."],[3,"And Nathan said to the king, Go, do all that [is] in thine heart; for the LORD [is] with thee.",true],[4,"And it came to pass that night, that the word of the LORD came unto Nathan, saying,"],[5,"Go and tell my servant David, Thus saith the LORD, Shalt thou build me an house for me to dwell in?",["my servant…: Heb. to my servant, to David"]],[6,"Whereas I have not dwelt in [any] house since the time that I brought up the children of Israel out of Egypt, even to this day, but have walked in a tent and in a tabernacle."],[7,"In all [the places] wherein I have walked with all the children of Israel spake I a word with any of the tribes of Israel, whom I commanded to feed my people Israel, saying, Why build ye not me an house of cedar?",["any of…: any of the judges"]],[8,"Now therefore so shalt thou say unto my servant David, Thus saith the LORD of hosts, I took thee from the sheepcote, from following the sheep, to be ruler over my people, over Israel:",["from following: Heb. from after"]],[9,"And I was with thee whithersoever thou wentest, and have cut off all thine enemies out of thy sight, and have made thee a great name, like unto the name of the great [men] that [are] in the earth.",["out of…: Heb. from thy face"]],[10,"Moreover I will appoint a place for my people Israel, and will plant them, that they may dwell in a place of their own, and move no more; neither shall the children of wickedness afflict them any more, as beforetime,"],[11,"And as since the time that I commanded judges [to be] over my people Israel, and have caused thee to rest from all thine enemies. Also the LORD telleth thee that he will make thee an house."],[12,"And when thy days be fulfilled, and thou shalt sleep with thy fathers, I will set up thy seed after thee, which shall proceed out of thy bowels, and I will establish his kingdom."],[13,"He shall build an house for my name, and I will stablish the throne of his kingdom for ever."],[14,"I will be his father, and he shall be my son. If he commit iniquity, I will chasten him with the rod of men, and with the stripes of the children of men:"],[15,"But my mercy shall not depart away from him, as I took [it] from Saul, whom I put away before thee."],[16,"And thine house and thy kingdom shall be established for ever before thee: thy throne shall be established for ever."],[17,"According to all these words, and according to all this vision, so did Nathan speak unto David.",true],[18,"Then went king David in, and sat before the LORD, and he said, Who [am] I, O Lord GOD? and what [is] my house, that thou hast brought me hitherto?"],[19,"And this was yet a small thing in thy sight, O Lord GOD; but thou hast spoken also of thy servant's house for a great while to come. And [is] this the manner of man, O Lord GOD?",["manner: Heb. law"]],[20,"And what can David say more unto thee? for thou, Lord GOD, knowest thy servant."],[21,"For thy word's sake, and according to thine own heart, hast thou done all these great things, to make thy servant know [them]."],[22,"Wherefore thou art great, O LORD God: for [there is] none like thee, neither [is there any] God beside thee, according to all that we have heard with our ears."],[23,"And what one nation in the earth [is] like thy people, [even] like Israel, whom God went to redeem for a people to himself, and to make him a name, and to do for you great things and terrible, for thy land, before thy people, which thou redeemedst to thee from Egypt, [from] the nations and their gods?"],[24,"For thou hast confirmed to thyself thy people Israel [to be] a people unto thee for ever: and thou, LORD, art become their God."],[25,"And now, O LORD God, the word that thou hast spoken concerning thy servant, and concerning his house, establish [it] for ever, and do as thou hast said."],[26,"And let thy name be magnified for ever, saying, The LORD of hosts [is] the God over Israel: and let the house of thy servant David be established before thee."],[27,"For thou, O LORD of hosts, God of Israel, hast revealed to thy servant, saying, I will build thee an house: therefore hath thy servant found in his heart to pray this prayer unto thee.",["revealed: Heb. opened the ear"]],[28,"And now, O Lord GOD, thou [art] that God, and thy words be true, and thou hast promised this goodness unto thy servant:"],[29,"Therefore now let it please thee to bless the house of thy servant, that it may continue for ever before thee: for thou, O Lord GOD, hast spoken [it]: and with thy blessing let the house of thy servant be blessed for ever.",["let it…: Heb. be thou pleased and bless"],true]],[[1,"And after this it came to pass, that David smote the Philistines, and subdued them: and David took Methegammah out of the hand of the Philistines.",["Methegammah: or, the bridle of Ammah"]],[2,"And he smote Moab, and measured them with a line, casting them down to the ground; even with two lines measured he to put to death, and with one full line to keep alive. And [so] the Moabites became David's servants, [and] brought gifts."],[3,"David smote also Hadadezer, the son of Rehob, king of Zobah, as he went to recover his border at the river Euphrates.",["Hadadezer: or, Hadarezer"]],[4,"And David took from him a thousand [chariots], and seven hundred horsemen, and twenty thousand footmen: and David houghed all the chariot [horses], but reserved of them [for] an hundred chariots.",["from…: or, of his. chariots…: as 1.Chr.18.4"]],[5,"And when the Syrians of Damascus came to succour Hadadezer king of Zobah, David slew of the Syrians two and twenty thousand men."],[6,"Then David put garrisons in Syria of Damascus: and the Syrians became servants to David, [and] brought gifts. And the LORD preserved David whithersoever he went."],[7,"And David took the shields of gold that were on the servants of Hadadezer, and brought them to Jerusalem."],[8,"And from Betah, and from Berothai, cities of Hadadezer, king David took exceeding much brass.",true],[9,"When Toi king of Hamath heard that David had smitten all the host of Hadadezer,"],[10,"Then Toi sent Joram his son unto king David, to salute him, and to bless him, because he had fought against Hadadezer, and smitten him: for Hadadezer had wars with Toi. And [Joram] brought with him vessels of silver, and vessels of gold, and vessels of brass:",["salute…: Heb. ask him of peace","had wars…: Heb. was a man of wars with","brought…: Heb. in his hand were"]],[11,"Which also king David did dedicate unto the LORD, with the silver and gold that he had dedicated of all nations which he subdued;"],[12,"Of Syria, and of Moab, and of the children of Ammon, and of the Philistines, and of Amalek, and of the spoil of Hadadezer, son of Rehob, king of Zobah."],[13,"And David gat [him] a name when he returned from smiting of the Syrians in the valley of salt, [being] eighteen thousand [men].",["smiting: Heb. his smiting"]],[14,"And he put garrisons in Edom; throughout all Edom put he garrisons, and all they of Edom became David's servants. And the LORD preserved David whithersoever he went.",true],[15,"And David reigned over all Israel; and David executed judgment and justice unto all his people."],[16,"And Joab the son of Zeruiah [was] over the host; and Jehoshaphat the son of Ahilud [was] recorder;",["recorder: or, remembrancer, or, writer of chronicles"]],[17,"And Zadok the son of Ahitub, and Ahimelech the son of Abiathar, [were] the priests; and Seraiah [was] the scribe;",["scribe: or, secretary"]],[18,"And Benaiah the son of Jehoiada [was over] both the Cherethites and the Pelethites; and David's sons were chief rulers.",["chief rulers: or, princes"],true]],[[1,"And David said, Is there yet any that is left of the house of Saul, that I may shew him kindness for Jonathan's sake?"],[2,"And [there was] of the house of Saul a servant whose name [was] Ziba. And when they had called him unto David, the king said unto him, [Art] thou Ziba? And he said, Thy servant [is he]."],[3,"And the king said, [Is] there not yet any of the house of Saul, that I may shew the kindness of God unto him? And Ziba said unto the king, Jonathan hath yet a son, [which is] lame on [his] feet."],[4,"And the king said unto him, Where [is] he? And Ziba said unto the king, Behold, he [is] in the house of Machir, the son of Ammiel, in Lodebar."],[5,"Then king David sent, and fetched him out of the house of Machir, the son of Ammiel, from Lodebar."],[6,"Now when Mephibosheth, the son of Jonathan, the son of Saul, was come unto David, he fell on his face, and did reverence. And David said, Mephibosheth. And he answered, Behold thy servant!"],[7,"And David said unto him, Fear not: for I will surely shew thee kindness for Jonathan thy father's sake, and will restore thee all the land of Saul thy father; and thou shalt eat bread at my table continually."],[8,"And he bowed himself, and said, What [is] thy servant, that thou shouldest look upon such a dead dog as I [am]?",true],[9,"Then the king called to Ziba, Saul's servant, and said unto him, I have given unto thy master's son all that pertained to Saul and to all his house."],[10,"Thou therefore, and thy sons, and thy servants, shall till the land for him, and thou shalt bring in [the fruits], that thy master's son may have food to eat: but Mephibosheth thy master's son shall eat bread alway at my table. Now Ziba had fifteen sons and twenty servants."],[11,"Then said Ziba unto the king, According to all that my lord the king hath commanded his servant, so shall thy servant do. As for Mephibosheth, [said the king], he shall eat at my table, as one of the king's sons."],[12,"And Mephibosheth had a young son, whose name [was] Micha. And all that dwelt in the house of Ziba [were] servants unto Mephibosheth."],[13,"So Mephibosheth dwelt in Jerusalem: for he did eat continually at the king's table; and was lame on both his feet.",true]],[[1,"And it came to pass after this, that the king of the children of Ammon died, and Hanun his son reigned in his stead."],[2,"Then said David, I will shew kindness unto Hanun the son of Nahash, as his father shewed kindness unto me. And David sent to comfort him by the hand of his servants for his father. And David's servants came into the land of the children of Ammon."],[3,"And the princes of the children of Ammon said unto Hanun their lord, Thinkest thou that David doth honour thy father, that he hath sent comforters unto thee? hath not David [rather] sent his servants unto thee, to search the city, and to spy it out, and to overthrow it?",["Thinkest…: Heb. In thine eyes doth David?"]],[4,"Wherefore Hanun took David's servants, and shaved off the one half of their beards, and cut off their garments in the middle, [even] to their buttocks, and sent them away."],[5,"When they told [it] unto David, he sent to meet them, because the men were greatly ashamed: and the king said, Tarry at Jericho until your beards be grown, and [then] return.",true],[6,"And when the children of Ammon saw that they stank before David, the children of Ammon sent and hired the Syrians of Bethrehob, and the Syrians of Zoba, twenty thousand footmen, and of king Maacah a thousand men, and of Ishtob twelve thousand men.",["Ishtob: or, the men of Tob"]],[7,"And when David heard of [it], he sent Joab, and all the host of the mighty men."],[8,"And the children of Ammon came out, and put the battle in array at the entering in of the gate: and the Syrians of Zoba, and of Rehob, and Ishtob, and Maacah, [were] by themselves in the field."],[9,"When Joab saw that the front of the battle was against him before and behind, he chose of all the choice [men] of Israel, and put [them] in array against the Syrians:"],[10,"And the rest of the people he delivered into the hand of Abishai his brother, that he might put [them] in array against the children of Ammon."],[11,"And he said, If the Syrians be too strong for me, then thou shalt help me: but if the children of Ammon be too strong for thee, then I will come and help thee."],[12,"Be of good courage, and let us play the men for our people, and for the cities of our God: and the LORD do that which seemeth him good."],[13,"And Joab drew nigh, and the people that [were] with him, unto the battle against the Syrians: and they fled before him."],[14,"And when the children of Ammon saw that the Syrians were fled, then fled they also before Abishai, and entered into the city. So Joab returned from the children of Ammon, and came to Jerusalem.",true],[15,"And when the Syrians saw that they were smitten before Israel, they gathered themselves together."],[16,"And Hadarezer sent, and brought out the Syrians that [were] beyond the river: and they came to Helam; and Shobach the captain of the host of Hadarezer [went] before them.",["the river: that is, Euphrates","Shobach: or, Shophach"]],[17,"And when it was told David, he gathered all Israel together, and passed over Jordan, and came to Helam. And the Syrians set themselves in array against David, and fought with him."],[18,"And the Syrians fled before Israel; and David slew [the men of] seven hundred chariots of the Syrians, and forty thousand horsemen, and smote Shobach the captain of their host, who died there."],[19,"And when all the kings [that were] servants to Hadarezer saw that they were smitten before Israel, they made peace with Israel, and served them. So the Syrians feared to help the children of Ammon any more.",true]],[[1,"And it came to pass, after the year was expired, at the time when kings go forth [to battle], that David sent Joab, and his servants with him, and all Israel; and they destroyed the children of Ammon, and besieged Rabbah. But David tarried still at Jerusalem.",["after…: Heb. at the return of the year"]],[2,"And it came to pass in an eveningtide, that David arose from off his bed, and walked upon the roof of the king's house: and from the roof he saw a woman washing herself; and the woman [was] very beautiful to look upon."],[3,"And David sent and enquired after the woman. And [one] said, [Is] not this Bathsheba, the daughter of Eliam, the wife of Uriah the Hittite?"],[4,"And David sent messengers, and took her; and she came in unto him, and he lay with her; for she was purified from her uncleanness: and she returned unto her house.",["for she…: or, and when she had purified herself, etc, she returned"]],[5,"And the woman conceived, and sent and told David, and said, I [am] with child.",true],[6,"And David sent to Joab, [saying], Send me Uriah the Hittite. And Joab sent Uriah to David."],[7,"And when Uriah was come unto him, David demanded [of him] how Joab did, and how the people did, and how the war prospered.",["how Joab…: Heb. of the peace of, etc"]],[8,"And David said to Uriah, Go down to thy house, and wash thy feet. And Uriah departed out of the king's house, and there followed him a mess [of meat] from the king.",["followed…: Heb. went out after him"]],[9,"But Uriah slept at the door of the king's house with all the servants of his lord, and went not down to his house."],[10,"And when they had told David, saying, Uriah went not down unto his house, David said unto Uriah, Camest thou not from [thy] journey? why [then] didst thou not go down unto thine house?"],[11,"And Uriah said unto David, The ark, and Israel, and Judah, abide in tents; and my lord Joab, and the servants of my lord, are encamped in the open fields; shall I then go into mine house, to eat and to drink, and to lie with my wife? [as] thou livest, and [as] thy soul liveth, I will not do this thing."],[12,"And David said to Uriah, Tarry here to day also, and to morrow I will let thee depart. So Uriah abode in Jerusalem that day, and the morrow."],[13,"And when David had called him, he did eat and drink before him; and he made him drunk: and at even he went out to lie on his bed with the servants of his lord, but went not down to his house.",true],[14,"And it came to pass in the morning, that David wrote a letter to Joab, and sent [it] by the hand of Uriah."],[15,"And he wrote in the letter, saying, Set ye Uriah in the forefront of the hottest battle, and retire ye from him, that he may be smitten, and die.",["hottest: Heb. strong","from him: Heb. from after him"]],[16,"And it came to pass, when Joab observed the city, that he assigned Uriah unto a place where he knew that valiant men [were]."],[17,"And the men of the city went out, and fought with Joab: and there fell [some] of the people of the servants of David; and Uriah the Hittite died also."],[18,"Then Joab sent and told David all the things concerning the war;"],[19,"And charged the messenger, saying, When thou hast made an end of telling the matters of the war unto the king,"],[20,"And if so be that the king's wrath arise, and he say unto thee, Wherefore approached ye so nigh unto the city when ye did fight? knew ye not that they would shoot from the wall?"],[21,"Who smote Abimelech the son of Jerubbesheth? did not a woman cast a piece of a millstone upon him from the wall, that he died in Thebez? why went ye nigh the wall? then say thou, Thy servant Uriah the Hittite is dead also."],[22,"So the messenger went, and came and shewed David all that Joab had sent him for."],[23,"And the messenger said unto David, Surely the men prevailed against us, and came out unto us into the field, and we were upon them even unto the entering of the gate."],[24,"And the shooters shot from off the wall upon thy servants; and [some] of the king's servants be dead, and thy servant Uriah the Hittite is dead also."],[25,"Then David said unto the messenger, Thus shalt thou say unto Joab, Let not this thing displease thee, for the sword devoureth one as well as another: make thy battle more strong against the city, and overthrow it: and encourage thou him.",["displease…: Heb. be evil in thine eyes","one…: Heb. so and such"]],[26,"And when the wife of Uriah heard that Uriah her husband was dead, she mourned for her husband."],[27,"And when the mourning was past, David sent and fetched her to his house, and she became his wife, and bare him a son. But the thing that David had done displeased the LORD.",["displeased: Heb. was evil in the eyes of"],true]],[[1,"And the LORD sent Nathan unto David. And he came unto him, and said unto him, There were two men in one city; the one rich, and the other poor."],[2,"The rich [man] had exceeding many flocks and herds:"],[3,"But the poor [man] had nothing, save one little ewe lamb, which he had bought and nourished up: and it grew up together with him, and with his children; it did eat of his own meat, and drank of his own cup, and lay in his bosom, and was unto him as a daughter.",["meat: Heb. morsel"]],[4,"And there came a traveller unto the rich man, and he spared to take of his own flock and of his own herd, to dress for the wayfaring man that was come unto him; but took the poor man's lamb, and dressed it for the man that was come to him."],[5,"And David's anger was greatly kindled against the man; and he said to Nathan, [As] the LORD liveth, the man that hath done this [thing] shall surely die:",["sha
