uth is enlarged over my enemies, because I rejoice in your salvation."],[2,"There is no one as holy as Yahweh, for there is no one besides you, nor is there any rock like our God.",true],[3,"“Don’t keep talking so exceedingly proudly. Don’t let arrogance come out of your mouth, for Yahweh is a God of knowledge. By him actions are weighed.",true],[4,"“The bows of the mighty men are broken. Those who stumbled are armed with strength."],[5,"Those who were full have hired themselves out for bread. Those who were hungry are satisfied. Yes, the barren has borne seven. She who has many children languishes.",true],[6,"“Yahweh kills and makes alive. He brings down to Sheol and brings up."],[7,"Yahweh makes poor and makes rich. He brings low, he also lifts up."],[8,"He raises up the poor out of the dust. He lifts up the needy from the dunghill to make them sit with princes and inherit the throne of glory. For the pillars of the earth are Yahweh’s. He has set the world on them."],[9,"He will keep the feet of his holy ones, but the wicked will be put to silence in darkness; for no man will prevail by strength."],[10,"Those who strive with Yahweh shall be broken to pieces. He will thunder against them in the sky. “Yahweh will judge the ends of the earth. He will give strength to his king, and exalt the horn of his anointed.”",true],[11,"Elkanah went to Ramah to his house. The child served Yahweh before Eli the priest.",true],[12,"Now the sons of Eli were wicked men. They didn’t know Yahweh."],[13,"The custom of the priests with the people was that when anyone offered a sacrifice, the priest’s servant came while the meat was boiling, with a fork of three teeth in his hand;"],[14,"and he stabbed it into the pan, or kettle, or cauldron, or pot. The priest took all that the fork brought up for himself. They did this to all the Israelites who came there to Shiloh."],[15,"Yes, before they burned the fat, the priest’s servant came, and said to the man who sacrificed, “Give meat to roast for the priest; for he will not accept boiled meat from you, but raw.”",true],[16,"If the man said to him, “Let the fat be burned first, and then take as much as your soul desires;” then he would say, “No, but you shall give it to me now; and if not, I will take it by force.”"],[17,"The sin of the young men was very great before Yahweh; for the men despised Yahweh’s offering."],[18,"But Samuel ministered before Yahweh, being a child, clothed with a linen ephod."],[19,"Moreover his mother made him a little robe, and brought it to him from year to year when she came up with her husband to offer the yearly sacrifice."],[20,"Eli blessed Elkanah and his wife, and said, “May Yahweh give you offspring from this woman for the petition which was asked of Yahweh.” Then they went to their own home."],[21,"Yahweh visited Hannah, and she conceived and bore three sons and two daughters. The child Samuel grew before Yahweh.",true],[22,"Now Eli was very old; and he heard all that his sons did to all Israel, and how that they slept with the women who served at the door of the Tent of Meeting."],[23,"He said to them, “Why do you do such things? For I hear of your evil dealings from all these people."],[24,"No, my sons; for it is not a good report that I hear! You make Yahweh’s people disobey."],[25,"If one man sins against another, God will judge him; but if a man sins against Yahweh, who will intercede for him?” Notwithstanding, they didn’t listen to the voice of their father, because Yahweh intended to kill them.",true],[26,"The child Samuel grew on, and increased in favor both with Yahweh and also with men.",true],[27,"A man of God came to Eli and said to him, “Yahweh says, ‘Did I reveal myself to the house of your father when they were in Egypt in bondage to Pharaoh’s house?"],[28,"Didn’t I choose him out of all the tribes of Israel to be my priest, to go up to my altar, to burn incense, to wear an ephod before me? Didn’t I give to the house of your father all the offerings of the children of Israel made by fire?"],[29,"Why do you kick at my sacrifice and at my offering, which I have commanded in my habitation, and honor your sons above me, to make yourselves fat with the best of all the offerings of Israel my people?’"],[30,"“Therefore Yahweh, the God of Israel, says, ‘I said indeed that your house and the house of your father should walk before me forever.’ But now Yahweh says, ‘Far be it from me; for those who honor me I will honor, and those who despise me will be cursed."],[31,"Behold, the days come that I will cut off your arm and the arm of your father’s house, that there will not be an old man in your house."],[32,"You will see the affliction of my habitation, in all the wealth which I will give Israel. There shall not be an old man in your house forever."],[33,"The man of yours whom I don’t cut off from my altar will consume your eyes and grieve your heart. All the increase of your house will die in the flower of their age."],[34,"This will be the sign to you that will come on your two sons, on Hophni and Phinehas: in one day they will both die."],[35,"I will raise up a faithful priest for myself who will do according to that which is in my heart and in my mind. I will build him a sure house. He will walk before my anointed forever."],[36,"It will happen that everyone who is left in your house will come and bow down to him for a piece of silver and a loaf of bread, and will say, “Please put me into one of the priests’ offices, that I may eat a morsel of bread.” ’ ”",true]],[[1,"The child Samuel ministered to Yahweh before Eli. Yahweh’s word was rare in those days. There were not many visions, then."],[2,"At that time, when Eli was laid down in his place (now his eyes had begun to grow dim, so that he could not see),"],[3,"and God’s lamp hadn’t yet gone out, and Samuel had laid down in Yahweh’s temple where God’s ark was,"],[4,"Yahweh called Samuel. He said, “Here I am.”",true],[5,"He ran to Eli and said, “Here I am; for you called me.” He said, “I didn’t call. Lie down again.” He went and lay down."],[6,"Yahweh called yet again, “Samuel!” Samuel arose and went to Eli and said, “Here I am; for you called me.” He answered, “I didn’t call, my son. Lie down again.”"],[7,"Now Samuel didn’t yet know Yahweh, neither was Yahweh’s word yet revealed to him."],[8,"Yahweh called Samuel again the third time. He arose and went to Eli and said, “Here I am; for you called me.” Eli perceived that Yahweh had called the child."],[9,"Therefore Eli said to Samuel, “Go, lie down. It shall be, if he calls you, that you shall say, ‘Speak, Yahweh; for your servant hears.’ ” So Samuel went and lay down in his place."],[10,"Yahweh came, and stood, and called as at other times, “Samuel! Samuel!” Then Samuel said, “Speak; for your servant hears.”",true],[11,"Yahweh said to Samuel, “Behold, I will do a thing in Israel at which both the ears of everyone who hears it will tingle."],[12,"In that day I will perform against Eli all that I have spoken concerning his house, from the beginning even to the end."],[13,"For I have told him that I will judge his house forever for the iniquity which he knew, because his sons brought a curse on themselves, and he didn’t restrain them."],[14,"Therefore I have sworn to the house of Eli that the iniquity of Eli’s house shall not be removed with sacrifice or offering forever.”",true],[15,"Samuel lay until the morning, and opened the doors of Yahweh’s house. Samuel was afraid to show Eli the vision."],[16,"Then Eli called Samuel and said, “Samuel, my son!” He said, “Here I am.”",true],[17,"He said, “What is the thing that he has spoken to you? Please don’t hide it from me. God do so to you, and more also, if you hide anything from me of all the things that he spoke to you.”",true],[18,"Samuel told him every bit, and hid nothing from him. He said, “It is Yahweh. Let him do what seems good to him.”",true],[19,"Samuel grew, and Yahweh was with him and let none of his words fall to the ground."],[20,"All Israel from Dan even to Beersheba knew that Samuel was established to be a prophet of Yahweh."],[21,"Yahweh appeared again in Shiloh; for Yahweh revealed himself to Samuel in Shiloh by Yahweh’s word."]],[[1,"The word of Samuel came to all Israel. Now Israel went out against the Philistines to battle, and encamped beside Ebenezer; and the Philistines encamped in Aphek."],[2,"The Philistines put themselves in array against Israel. When they joined battle, Israel was defeated by the Philistines, who killed about four thousand men of the army in the field."],[3,"When the people had come into the camp, the elders of Israel said, “Why has Yahweh defeated us today before the Philistines? Let’s get the ark of Yahweh’s covenant out of Shiloh and bring it to us, that it may come among us and save us out of the hand of our enemies.”",true],[4,"So the people sent to Shiloh, and they brought from there the ark of the covenant of Yahweh of Armies, who sits above the cherubim; and the two sons of Eli, Hophni and Phinehas, were there with the ark of the covenant of God."],[5,"When the ark of Yahweh’s covenant came into the camp, all Israel shouted with a great shout, so that the earth resounded."],[6,"When the Philistines heard the noise of the shout, they said, “What does the noise of this great shout in the camp of the Hebrews mean?” They understood that Yahweh’s ark had come into the camp."],[7,"The Philistines were afraid, for they said, “God has come into the camp.” They said, “Woe to us! For there has not been such a thing before."],[8,"Woe to us! Who shall deliver us out of the hand of these mighty gods? These are the gods that struck the Egyptians with all kinds of plagues in the wilderness."],[9,"Be strong and behave like men, O you Philistines, that you not be servants to the Hebrews, as they have been to you. Strengthen yourselves like men, and fight!”"],[10,"The Philistines fought, and Israel was defeated, and each man fled to his tent. There was a very great slaughter; for thirty thousand footmen of Israel fell."],[11,"God’s ark was taken; and the two sons of Eli, Hophni and Phinehas, were slain.",true],[12,"A man of Benjamin ran out of the army and came to Shiloh the same day, with his clothes torn and with dirt on his head."],[13,"When he came, behold, Eli was sitting on his seat by the road watching, for his heart trembled for God’s ark. When the man came into the city and told about it, all the city cried out."],[14,"When Eli heard the noise of the crying, he said, “What does the noise of this tumult mean?” The man hurried, and came and told Eli."],[15,"Now Eli was ninety-eight years old. His eyes were set, so that he could not see."],[16,"The man said to Eli, “I am he who came out of the army, and I fled today out of the army.” He said, “How did the matter go, my son?”",true],[17,"He who brought the news answered, “Israel has fled before the Philistines, and there has been also a great slaughter among the people. Your two sons also, Hophni and Phinehas, are dead, and God’s ark has been captured.”",true],[18,"When he made mention of God’s ark, Eli fell from off his seat backward by the side of the gate; and his neck broke, and he died, for he was an old man and heavy. He had judged Israel forty years.",true],[19,"His daughter-in-law, Phinehas’ wife, was with child, near to giving birth. When she heard the news that God’s ark was taken and that her father-in-law and her husband were dead, she bowed herself and gave birth; for her pains came on her."],[20,"About the time of her death the women who stood by her said to her, “Don’t be afraid, for you have given birth to a son.” But she didn’t answer, neither did she regard it."],[21,"She named the child Ichabod, saying, “The glory has departed from Israel!” because God’s ark was taken, and because of her father-in-law and her husband."],[22,"She said, “The glory has departed from Israel; for God’s ark has been taken.”",true]],[[1,"Now the Philistines had taken God’s ark, and they brought it from Ebenezer to Ashdod."],[2,"The Philistines took God’s ark, and brought it into the house of Dagon and set it by Dagon."],[3,"When the people of Ashdod arose early on the next day, behold, Dagon had fallen on his face to the ground before Yahweh’s ark. They took Dagon and set him in his place again."],[4,"When they arose early on the following morning, behold, Dagon had fallen on his face to the ground before Yahweh’s ark; and the head of Dagon and both the palms of his hands were cut off on the threshold. Only Dagon’s torso was intact."],[5,"Therefore neither the priests of Dagon nor any who come into Dagon’s house step on the threshold of Dagon in Ashdod to this day."],[6,"But Yahweh’s hand was heavy on the people of Ashdod, and he destroyed them and struck them with tumors, even Ashdod and its borders.",true],[7,"When the men of Ashdod saw that it was so, they said, “The ark of the God of Israel shall not stay with us, for his hand is severe on us and on Dagon our god.”"],[8,"They sent therefore and gathered together all the lords of the Philistines, and said, “What shall we do with the ark of the God of Israel?” They answered, “Let the ark of the God of Israel be carried over to Gath.” They carried the ark of the God of Israel there."],[9,"It was so, that after they had carried it there, Yahweh’s hand was against the city with a very great confusion; and he struck the men of the city, both small and great, so that tumors broke out on them."],[10,"So they sent God’s ark to Ekron. As God’s ark came to Ekron, the Ekronites cried out, saying, “They have brought the ark of the God of Israel here to us, to kill us and our people.”"],[11,"They sent therefore and gathered together all the lords of the Philistines, and they said, “Send the ark of the God of Israel away, and let it go again to its own place, that it not kill us and our people.” For there was a deadly panic throughout all the city. The hand of God was very heavy there."],[12,"The men who didn’t die were struck with the tumors; and the cry of the city went up to heaven.",true]],[[1,"Yahweh’s ark was in the country of the Philistines seven months."],[2,"The Philistines called for the priests and the diviners, saying, “What shall we do with Yahweh’s ark? Show us how we should send it to its place.”",true],[3,"They said, “If you send away the ark of the God of Israel, don’t send it empty; but by all means return a trespass offering to him. Then you will be healed, and it will be known to you why his hand is not removed from you.”",true],[4,"Then they said, “What should the trespass offering be which we shall return to him?” They said, “Five golden tumors and five golden mice, for the number of the lords of the Philistines; for one plague was on you all, and on your lords."],[5,"Therefore you shall make images of your tumors and images of your mice that mar the land; and you shall give glory to the God of Israel. Perhaps he will release his hand from you, from your gods, and from your land."],[6,"Why then do you harden your hearts as the Egyptians and Pharaoh hardened their hearts? When he had worked wonderfully among them, didn’t they let the people go, and they departed?",true],[7,"“Now therefore take and prepare yourselves a new cart and two milk cows on which there has come no yoke; and tie the cows to the cart, and bring their calves home from them;"],[8,"and take Yahweh’s ark and lay it on the cart. Put the jewels of gold, which you return him for a trespass offering, in a box by its side; and send it away, that it may go."],[9,"Behold, if it goes up by the way of its own border to Beth Shemesh, then he has done us this great evil; but if not, then we shall know that it is not his hand that struck us. It was a chance that happened to us.”",true],[10,"The men did so, and took two milk cows and tied them to the cart, and shut up their calves at home."],[11,"They put Yahweh’s ark on the cart, and the box with the golden mice and the images of their tumors."],[12,"The cows took the straight way by the way to Beth Shemesh. They went along the highway, lowing as they went, and didn’t turn away to the right hand or to the left; and the lords of the Philistines went after them to the border of Beth Shemesh."],[13,"The people of Beth Shemesh were reaping their wheat harvest in the valley; and they lifted up their eyes and saw the ark, and rejoiced to see it."],[14,"The cart came into the field of Joshua of Beth Shemesh, and stood there, where there was a great stone. Then they split the wood of the cart and offered up the cows for a burnt offering to Yahweh."],[15,"The Levites took down Yahweh’s ark and the box that was with it, in which the jewels of gold were, and put them on the great stone; and the men of Beth Shemesh offered burnt offerings and sacrificed sacrifices the same day to Yahweh."],[16,"When the five lords of the Philistines had seen it, they returned to Ekron the same day."],[17,"These are the golden tumors which the Philistines returned for a trespass offering to Yahweh: for Ashdod one, for Gaza one, for Ashkelon one, for Gath one, for Ekron one;"],[18,"and the golden mice, according to the number of all the cities of the Philistines belonging to the five lords, both of fortified cities and of country villages, even to the great stone on which they set down Yahweh’s ark. That stone remains to this day in the field of Joshua of Beth Shemesh."],[19,"He struck of the men of Beth Shemesh, because they had looked into Yahweh’s ark, he struck fifty thousand seventy of the men. Then the people mourned, because Yahweh had struck the people with a great slaughter."],[20,"The men of Beth Shemesh said, “Who is able to stand before Yahweh, this holy God? To whom shall he go up from us?”",true],[21,"They sent messengers to the inhabitants of Kiriath Jearim, saying, “The Philistines have brought back Yahweh’s ark. Come down and bring it up to yourselves.”",true]],[[1,"The men of Kiriath Jearim came and took Yahweh’s ark, and brought it into Abinadab’s house on the hill, and consecrated Eleazar his son to keep Yahweh’s ark."],[2,"From the day that the ark stayed in Kiriath Jearim, the time was long; for it was twenty years; and all the house of Israel lamented after Yahweh."],[3,"Samuel spoke to all the house of Israel, saying, “If you are returning to Yahweh with all your heart, then put away the foreign gods and the Ashtaroth from among you, and direct your hearts to Yahweh, and serve him only; and he will deliver you out of the hand of the Philistines.”"],[4,"Then the children of Israel removed the Baals and the Ashtaroth, and served Yahweh only."],[5,"Samuel said, “Gather all Israel to Mizpah, and I will pray to Yahweh for you.”"],[6,"They gathered together to Mizpah, and drew water, and poured it out before Yahweh, and fasted on that day, and said there, “We have sinned against Yahweh.” Samuel judged the children of Israel in Mizpah."],[7,"When the Philistines heard that the children of Israel were gathered together at Mizpah, the lords of the Philistines went up against Israel. When the children of Israel heard it, they were afraid of the Philistines."],[8,"The children of Israel said to Samuel, “Don’t stop crying to Yahweh our God for us, that he will save us out of the hand of the Philistines.”"],[9,"Samuel took a suckling lamb, and offered it for a whole burnt offering to Yahweh. Samuel cried to Yahweh for Israel; and Yahweh answered him."],[10,"As Samuel was offering up the burnt offering, the Philistines came near to battle against Israel; but Yahweh thundered with a great thunder on that day on the Philistines, and confused them; and they were struck down before Israel."],[11,"The men of Israel went out of Mizpah, and pursued the Philistines, and struck them, until they came under Beth Kar.",true],[12,"Then Samuel took a stone, and set it between Mizpah and Shen, and called its name Ebenezer, saying, “Yahweh helped us until now.”"],[13,"So the Philistines were subdued, and they stopped coming within the border of Israel. Yahweh’s hand was against the Philistines all the days of Samuel.",true],[14,"The cities which the Philistines had taken from Israel were restored to Israel, from Ekron even to Gath; and Israel recovered its border out of the hand of the Philistines. There was peace between Israel and the Amorites.",true],[15,"Samuel judged Israel all the days of his life."],[16,"He went from year to year in a circuit to Bethel, Gilgal, and Mizpah; and he judged Israel in all those places."],[17,"His return was to Ramah, for his house was there; and he judged Israel there; and he built an altar to Yahweh there.",true]],[[1,"When Samuel was old, he made his sons judges over Israel."],[2,"Now the name of his firstborn was Joel; and the name of his second, Abijah. They were judges in Beersheba."],[3,"His sons didn’t walk in his ways, but turned away after dishonest gain, took bribes, and perverted justice."],[4,"Then all the elders of Israel gathered themselves together and came to Samuel to Ramah."],[5,"They said to him, “Behold, you are old, and your sons don’t walk in your ways. Now make us a king to judge us like all the nations.”"],[6,"But the thing displeased Samuel, when they said, “Give us a king to judge us.” Samuel prayed to Yahweh."],[7,"Yahweh said to Samuel, “Listen to the voice of the people in all that they tell you; for they have not rejected you, but they have rejected me as the king over them."],[8,"According to all the works which they have done since the day that I brought them up out of Egypt even to this day, in that they have forsaken me, and served other gods, so they also do to you."],[9,"Now therefore listen to their voice. However you shall protest solemnly to them, and shall show them the way of the king who will reign over them.”",true],[10,"Samuel told all Yahweh’s words to the people who asked him for a king."],[11,"He said, “This will be the way of the king who shall reign over you: he will take your sons, and appoint them as his servants, for his chariots, and to be his horsemen; and they will run before his chariots."],[12,"He will appoint them to him for captains of thousands, and captains of fifties; and he will assign some to plow his ground, and to reap his harvest, and to make his instruments of war, and the instruments of his chariots."],[13,"He will take your daughters to be perfumers, to be cooks, and to be bakers."],[14,"He will take your fields, your vineyards, and your olive groves, even their best, and give them to his servants."],[15,"He will take one tenth of your seed, and of your vineyards, and give it to his officers, and to his servants."],[16,"He will take your male servants, your female servants, your best young men, and your donkeys, and assign them to his own work."],[17,"He will take one tenth of your flocks; and you will be his servants."],[18,"You will cry out in that day because of your king whom you will have chosen for yourselves; and Yahweh will not answer you in that day.”",true],[19,"But the people refused to listen to the voice of Samuel; and they said, “No; but we will have a king over us,"],[20,"that we also may be like all the nations, and that our king may judge us, and go out before us, and fight our battles.”",true],[21,"Samuel heard all the words of the people, and he rehearsed them in the ears of Yahweh."],[22,"Yahweh said to Samuel, “Listen to their voice, and make them a king.” Samuel said to the men of Israel, “Everyone go to your own city.”",true]],[[1,"Now there was a man of Benjamin, whose name was Kish, the son of Abiel, the son of Zeror, the son of Becorath, the son of Aphiah, the son of a Benjamite, a mighty man of valor."],[2,"He had a son, whose name was Saul, an impressive young man; and there was not among the children of Israel a better person than he. From his shoulders and upward he was taller than any of the people.",true],[3,"The donkeys of Kish, Saul’s father, were lost. Kish said to Saul his son, “Now take one of the servants with you, and arise, go look for the donkeys.”"],[4,"He passed through the hill country of Ephraim, and passed through the land of Shalishah, but they didn’t find them. Then they passed through the land of Shaalim, and they weren’t there. Then he passed through the land of the Benjamites, but they didn’t find them.",true],[5,"When they had come to the land of Zuph, Saul said to his servant who was with him, “Come! Let’s return, lest my father stop caring about the donkeys, and be anxious for us.”",true],[6,"The servant said to him, “Behold now, there is a man of God in this city, and he is a man who is held in honor. All that he says surely happens. Now let’s go there. Perhaps he can tell us which way to go.”",true],[7,"Then Saul said to his servant, “But, behold, if we go, what should we bring the man? For the bread is spent in our sacks, and there is not a present to bring to the man of God. What do we have?”",true],[8,"The servant answered Saul again, and said, “Behold, I have in my hand the fourth part of a shekel of silver. I will give that to the man of God, to tell us our way.”"],[9,"(In earlier times in Israel, when a man went to inquire of God, he said, “Come! Let’s go to the seer;” for he who is now called a prophet was before called a seer.)",true],[10,"Then Saul said to his servant, “Well said. Come! Let’s go.” So they went to the city where the man of God was."],[11,"As they went up the ascent to the city, they found young maidens going out to draw water, and said to them, “Is the seer here?”",true],[12,"They answered them, and said, “He is. Behold, he is before you. Hurry now, for he has come today into the city; for the people have a sacrifice today in the high place."],[13,"As soon as you have come into the city, you will immediately find him, before he goes up to the high place to eat; for the people will not eat until he comes, because he blesses the sacrifice. Afterwards those who are invited eat. Now therefore go up; for at this time you will find him.”",true],[14,"They went up to the city. As they came within the city, behold, Samuel came out toward them, to go up to the high place.",true],[15,"Now Yahweh had revealed to Samuel a day before Saul came, saying,"],[16,"“Tomorrow about this time I will send you a man out of the land of Benjamin, and you shall anoint him to be prince over my people Israel. He will save my people out of the hand of the Philistines; for I have looked upon my people, because their cry has come to me.”",true],[17,"When Samuel saw Saul, Yahweh said to him, “Behold, the man of whom I spoke to you! He will have authority over my people.”",true],[18,"Then Saul approached Samuel in the gateway, and said, “Please tell me where the seer’s house is.”",true],[19,"Samuel answered Saul, and said, “I am the seer. Go up before me to the high place, for you are to eat with me today. In the morning I will let you go, and will tell you all that is in your heart."],[20,"As for your donkeys who were lost three days ago, don’t set your mind on them; for they have been found. For whom is all that is desirable in Israel? Is it not for you, and for all your father’s house?”",true],[21,"Saul answered, “Am I not a Benjamite, of the smallest of the tribes of Israel? And my family the least of all the families of the tribe of Benjamin? Why then do you speak to me like this?”",true],[22,"Samuel took Saul and his servant, and brought them into the guest room, and made them sit in the best place among those who were invited, who were about thirty persons."],[23,"Samuel said to the cook, “Bring the portion which I gave you, of which I said to you, ‘Set it aside.’ ”"],[24,"The cook took up the thigh, and that which was on it, and set it before Saul. Samuel said, “Behold, that which has been reserved! Set it before yourself and eat; because it has been kept for you for the appointed time, for I said, ‘I have invited the people.’ ” So Saul ate with Samuel that day.",true],[25,"When they had come down from the high place into the city, he talked with Saul on the housetop."],[26,"They arose early; and about daybreak, Samuel called to Saul on the housetop, saying, “Get up, that I may send you away.” Saul arose, and they both went outside, he and Samuel, together."],[27,"As they were going down at the end of the city, Samuel said to Saul, “Tell the servant to go on ahead of us.” He went ahead, then Samuel said, “But stand still first, that I may cause you to hear God’s message.”",true]],[[1,"Then Samuel took the vial of oil, and poured it on his head, and kissed him, and said, “Hasn’t Yahweh anointed you to be prince over his inheritance?"],[2,"When you have departed from me today, then you will find two men by Rachel’s tomb, on the border of Benjamin at Zelzah. They will tell you, ‘The donkeys which you went to look for have been found; and behold, your father has stopped caring about the donkeys, and is anxious for you, saying, “What shall I do for my son?” ’",true],[3,"“Then you will go on forward from there, and you will come to the oak of Tabor. Three men will meet you there going up to God to Bethel, one carrying three young goats, and another carrying three loaves of bread, and another carrying a container of wine."],[4,"They will greet you, and give you two loaves of bread, which you shall receive from their hand.",true],[5,"“After that you will come to the hill of God, where the garrison of the Philistines is; and it will happen, when you have come there to the city, that you will meet a band of prophets coming down from the high place with a lute, a tambourine, a pipe, and a harp before them; and they will be prophesying."],[6,"Then Yahweh’s Spirit will come mightily on you, and you will prophesy with them, and will be turned into another man."],[7,"Let it be, when these signs have come to you, that you do what is appropriate for the occasion; for God is with you.",true],[8,"“Go down ahead of me to Gilgal; and behold, I will come down to you, to offer burnt offerings, and to sacrifice sacrifices of peace offerings. Wait seven days, until I come to you, and show you what you are to do.”"],[9,"It was so, that when he had turned his back to go from Samuel, God gave him another heart; and all those signs happened that day."],[10,"When they came there to the hill, behold, a band of prophets met him; and the Spirit of God came mightily on him, and he prophesied among them."],[11,"When all who knew him before saw that, behold, he prophesied with the prophets, then the people said to one another, “What is this that has come to the son of Kish? Is Saul also among the prophets?”",true],[12,"One of the same place answered, “Who is their father?” Therefore it became a proverb, “Is Saul also among the prophets?”"],[13,"When he had finished prophesying, he came to the high place.",true],[14,"Saul’s uncle said to him and to his servant, “Where did you go?” He said, “To seek the donkeys. When we saw that they were not found, we came to Samuel.”",true],[15,"Saul’s uncle said, “Please tell me what Samuel said to you.”",true],[16,"Saul said to his uncle, “He told us plainly that the donkeys were found.” But concerning the matter of the kingdom, of which Samuel spoke, he didn’t tell him.",true],[17,"Samuel called the people together to Yahweh to Mizpah;"],[18,"and he said to the children of Israel, “Yahweh, the God of Israel, says ‘I brought Israel up out of Egypt, and I delivered you out of the hand of the Egyptians, and out of the hand of all the kingdoms that oppressed you.’"],[19,"But you have today rejected your God, who himself saves you out of all your calamities and your distresses; and you have said to him, ‘No! Set a king over us.’ Now therefore present yourselves before Yahweh by your tribes, and by your thousands.”",true],[20,"So Samuel brought all the tribes of Israel near, and the tribe of Benjamin was chosen."],[21,"He brought the tribe of Benjamin near by their families; and the family of the Matrites was chosen. Then Saul the son of Kish was chosen; but when they looked for him, he could not be found."],[22,"Therefore they asked of Yahweh further, “Is there yet a man to come here?” Yahweh answered, “Behold, he has hidden himself among the baggage.”",true],[23,"They ran and got him there. When he stood among the people, he was higher than any of the people from his shoulders and upward."],[24,"Samuel said to all the people, “Do you see him whom Yahweh has chosen, that there is no one like him among all the people?” All the people shouted, and said, “Long live the king!”",true],[25,"Then Samuel told the people the regulations of the kingdom, and wrote it in a book, and laid it up before Yahweh. Samuel sent all the people away, every man to his house."],[26,"Saul also went to his house to Gibeah; and the army went with him, whose hearts God had touched."],[27,"But certain worthless fellows said, “How could this man save us?” They despised him, and brought him no present. But he held his peace.",true]],[[1,"Then Nahash the Ammonite came up, and encamped against Jabesh Gilead: and all the men of Jabesh said to Nahash, “Make a covenant with us, and we will serve you.”"],[2,"Nahash the Ammonite said to them, “On this condition I will make it with you, that all your right eyes be gouged out. I will make this dishonor all Israel.”",true],[3,"The elders of Jabesh said to him, “Give us seven days, that we may send messengers to all the borders of Israel; and then, if there is no one to save us, we will come out to you.”"],[4,"Then the messengers came to Gibeah of Saul, and spoke these words in the ears of the people, then all the people lifted up their voice, and wept.",true],[5,"Behold, Saul came following the oxen out of the field; and Saul said, “What ails the people that they weep?” They told him the words of the men of Jabesh."],[6,"God’s Spirit came mightily on Saul when he heard those words, and his anger burned hot."],[7,"He took a yoke of oxen, and cut them in pieces, and sent them throughout all the borders of Israel by the hand of messengers, saying, “Whoever doesn’t come out after Saul and after Samuel, so shall it be done to his oxen.” The dread of Yahweh fell on the people, and they came out as one man."],[8,"He counted them in Bezek; and the children of Israel were three hundred thousand, and the men of Judah thirty thousand."],[9,"They said to the messengers who came, “Tell the men of Jabesh Gilead, ‘Tomorrow, by the time the sun is hot, you will be rescued.’ ” The messengers came and told the men of Jabesh; and they were glad."],[10,"Therefore the men of Jabesh said, “Tomorrow we will come out to you, and you shall do with us all that seems good to you.”"],[11,"On the next day, Saul put the people in three companies; and they came into the middle of the camp in the morning watch, and struck the Ammonites until the heat of the day. Those who remained were scattered, so that no two of them were left together."],[12,"The people said to Samuel, “Who is he who said, ‘Shall Saul reign over us?’ Bring those men, that we may put them to death!”",true],[13,"Saul said, “No man shall be put to death today; for today Yahweh has rescued Israel.”"],[14,"Then Samuel said to the people, “Come! Let’s go to Gilgal, and renew the kingdom there.”"],[15,"All the people went to Gilgal; and there they made Saul king before Yahweh in Gilgal. There they offered sacrifices of peace offerings before Yahweh; and there Saul and all the men of Israel rejoiced greatly.",true]],[[1,"Samuel said to all Israel, “Behold, I have listened to your voice in all that you said to me, and have made a king over you."],[2,"Now, behold, the king walks before you. I am old and gray-headed. Behold, my sons are with you. I have walked before you from my youth to this day."],[3,"Here I am. Witness against me before Yahweh, and before his anointed. Whose ox have I taken? Whose donkey have I taken? Whom have I defrauded? Whom have I oppressed? Of whose hand have I taken a bribe to make me blind my eyes? I will restore it to you.”",true],[4,"They said, “You have not defrauded us, nor oppressed us, neither have you taken anything from anyone’s hand.”",true],[5,"He said to them, “Yahweh is witness against you, and his anointed is witness today, that you have not found anything in my hand.” They said, “He is witness.”"],[6,"Samuel said to the people, “It is Yahweh who appointed Moses and Aaron, and that brought your fathers up out of the land of Egypt."],[7,"Now therefore stand still, that I may plead with you before Yahweh concerning all the righteous acts of Yahweh, which he did to you and to your fathers.",true],[8,"“When Jacob had come into Egypt, and your fathers cried to Yahweh, then Yahweh sent Moses and Aaron, who brought your fathers out of Egypt, and made them to dwell in this place.",true],[9,"“But they forgot Yahweh their God; and he sold them into the hand of Sisera, captain of the army of Hazor, and into the hand of the Philistines, and into the hand of the king of Moab; and they fought against them."],[10,"They cried to Yahweh, and said, ‘We have sinned, because we have forsaken Yahweh, and have served the Baals and the Ashtaroth: but now deliver us out of the hand of our enemies, and we will serve you.’"],[11,"Yahweh sent Jerubbaal, Bedan, Jephthah, and Samuel, and delivered you out of the hand of your enemies on every side; and you lived in safety.",true],[12,"“When you saw that Nahash the king of the children of Ammon came against you, you said to me, ‘No, but a king shall reign over us;’ when Yahweh your God was your king."],[13,"Now therefore see the king whom you have chosen, and whom you have asked for. Behold, Yahweh has set a king over you."],[14,"If you will fear Yahweh, and serve him, and listen to his voice, and not rebel against the commandment of Yahweh, then both you and also the king who reigns over you are followers of Yahweh your God."],[15,"But if you will not listen to Yahweh’s voice, but rebel against the commandment of Yahweh, then Yahweh’s hand will be against you, as it was against your fathers.",true],[16,"“Now therefore stand still and see this great thing, which Yahweh will do before your eyes."],[17,"Isn’t it wheat harvest today? I will call to Yahweh, that he may send thunder and rain; and you will know and see that your wickedness is great, which you have done in Yahweh’s sight, in asking for a king.”",true],[18,"So Samuel called to Yahweh; and Yahweh sent thunder and rain that day. Then all the people greatly feared Yahweh and Samuel.",true],[19,"All the people said to Samuel, “Pray for your servants to Yahweh your God, that we not die; for we have added to all our sins this evil, to ask for a king.”",true],[20,"Samuel said to the people, “Don’t be afraid. You have indeed done all this evil; yet don’t turn away from following Yahweh, but serve Yahweh with all your heart."],[21,"Don’t turn away to go after vain things which can’t profit or deliver, for they are vain."],[22,"For Yahweh will not forsake his people for his great name’s sake, because it has pleased Yahweh to make you a people for himself."],[23,"Moreover as for me, far be it from me that I should sin against Yahweh in ceasing to pray for you: but I will instruct you in the good and the right way."],[24,"Only fear Yahweh, and serve him in truth with all your heart; for consider what great things he has done for you."],[25,"But if you keep doing evil, you will be consumed, both you and your king.”",true]],[[1,"Saul was thirty years old when he became king, and he reigned over Israel forty-two years."],[2,"Saul chose for himself three thousand men of Israel, of which two thousand were with Saul in Michmash and in the Mount of Bethel, and one thousand were with Jonathan in Gibeah of Benjamin. He sent the rest of the people to their own tents."],[3,"Jonathan struck the garrison of the Philistines that was in Geba, and the Philistines heard of it. Saul blew the trumpet throughout all the land, saying, “Let the Hebrews hear!”"],[4,"All Israel heard that Saul had struck the garrison of the Philistines, and also that Israel was considered an abomination to the Philistines. The people were gathered together after Saul to Gilgal."],[5,"The Philistines assembled themselves together to fight with Israel, thirty thousand chariots, and six thousand horsemen, and people as the sand which is on the seashore in multitude. They came up and encamped in Michmash, eastward of Beth Aven."],[6,"When the men of Israel saw that they were in trouble (for the people were distressed), then the people hid themselves in caves, in thickets, in rocks, in tombs, and in pits."],[7,"Now some of the Hebrews had gone over the Jordan to the land of Gad and Gilead; but as for Saul, he was yet in Gilgal, and all the people followed him trembling."],[8,"He stayed seven days, according to the time set by Samuel; but Samuel didn’t come to Gilgal, and the people were scattering from him."],[9,"Saul said, “Bring the burnt offering to me here, and the peace offerings.” He offered the burnt offering.",true],[10,"It came to pass that as soon as he had finished offering the burnt offering, behold, Samuel came; and Saul went out to meet him, that he might greet him."],[11,"Samuel said, “What have you done?” Saul said, “Because I saw that the people were scattered from me, and that you didn’t come within the days appointed, and that the Philistines assembled themselves together at Michmash;"],[12,"therefore I said, ‘Now the Philistines will come down on me to Gilgal, and I haven’t entreated the favor of Yahweh.’ I forced myself therefore, and offered the burnt offering.”",true],[13,"Samuel said to Saul, “You have done foolishly. You have not kept the commandment of Yahweh your God, which he commanded you; for now Yahweh would have established your kingdom on Israel forever."],[14,"But now your kingdom will not continue. Yahweh has sought for himself a man after his own heart, and Yahweh has appointed him to be prince over his people, because you have not kept that which Yahweh commanded you.”",true],[15,"Samuel arose, and went from Gilgal to Gibeah of Benjamin. Saul counted the people who were present with him, about six hundred men."],[16,"Saul, and Jonathan his son, and the people who were present with them, stayed in Geba of Benjamin; but the Philistines encamped in Michmash."],[17,"The raiders came out of the camp of the Philistines in three companies: one company turned to the way that leads to Ophrah, to the land of Shual;"],[18,"another company turned the way to Beth Horon; and another company turned the way of the border that looks down on the valley of Zeboim toward the wilderness."],[19,"Now there was no blacksmith found throughout all the land of Israel; for the Philistines said, “Lest the Hebrews make themselves swords or spears”;"],[20,"but all the Israelites went down to the Philistines, each man to sharpen his own plowshare, mattock, ax, and sickle."],[21,"The price was one payim each to sharpen mattocks, plowshares, pitchforks, axes, and goads."],[22,"So it came to pass in the day of battle, that neither sword nor spear was found in the hand of any of the people who were with Saul and Jonathan; but Saul and Jonathan his son had them."],[23,"The garrison of the Philistines went out to the pass of Michmash.",true]],[[1,"Now it fell on a day, that Jonathan the son of Saul said to the young man who bore his armor, “Come! Let’s go over to the Philistines’ garrison that is on the other side.” But he didn’t tell his father."],[2,"Saul stayed in the uttermost part of Gibeah under the pomegranate tree which is in Migron: and the people who were with him were about six hundred men;"],[3,"including Ahijah, the son of Ahitub, Ichabod’s brother, the son of Phinehas, the son of Eli, the priest of Yahweh in Shiloh, wearing an ephod. The people didn’t know that Jonathan was gone."],[4,"Between the passes, by which Jonathan sought to go over to the Philistines’ garrison, there was a rocky crag on the one side, and a rocky crag on the other side: and the name of the one was Bozez, and the name of the other Seneh."],[5,"The one crag rose up on the north in front of Michmash, and the other on the south in front of Geba."],[6,"Jonathan said to the young man who bore his armor, “Come! Let’s go over to the garrison of these uncircumcised. It may be that Yahweh will work for us; for there is no restraint on Yahweh to save by many or by few.”"],[7,"His armor bearer said to him, “Do all that is in your heart. Turn and, behold, I am with you according to your heart.”"],[8,"Then Jonathan said, “Behold, we will pass over to the men, and we will reveal ourselves to them."],[9,"If they say this to us, ‘Wait until we come to you!’ then we will stand still in our place, and will not go up to them."],[10,"But if they say this, ‘Come up to us!’ then we will go up; for Yahweh has delivered them into our hand. This shall be the sign to us.”",true],[11,"Both of them revealed themselves to the garrison of the Philistines: and the Philistines said, “Behold, the Hebrews are coming out of the holes where they had hidden themselves!”"],[12,"The men of the garrison answered Jonathan and his armor bearer, and said, “Come up to us, and we will show you something!” Jonathan said to his armor bearer, “Come up after me; for Yahweh has delivered them into the hand of Israel.”"],[13,"Jonathan climbed up on his hands and on his feet, and his armor bearer after him: and they fell before Jonathan; and his armor bearer killed them after him."],[14,"That first slaughter, which Jonathan and his armor bearer made, was about twenty men, within as it were half a furrow’s length in an acre of land."],[15,"There was a trembling in the camp, in the field, and among all the people; the garrison, and the raiders, also trembled; and the earth quaked, so there was an exceedingly great trembling."],[16,"The watchmen of Saul in Gibeah of Benjamin looked; and behold, the multitude melted away and scattered."],[17,"Then Saul said to the people who were with him, “Count now, and see who is missing from us.” When they had counted, behold, Jonathan and his armor bearer were not there.",true],[18,"Saul said to Ahijah, “Bring God’s ark here.” For God’s ark was with the children of Israel at that time."],[19,"While Saul talked to the priest, the tumult that was in the camp of the Philistines went on and increased; and Saul said to the priest, “Withdraw your hand!”",true],[20,"Saul and all the people who were with him were gathered together, and came to the battle; and behold, they were all striking each other with their swords in very great confusion."],[21,"Now the Hebrews who were with the Philistines before, and who went up with them into the camp, from all around, even they also turned to be with the Israelites who were with Saul and Jonathan."],[22,"Likewise all the men of Israel who had hidden themselves in the hill country of Ephraim, when they heard that the Philistines fled, even they also followed hard after them in the battle."],[23,"So Yahweh saved Israel that day; and the battle passed over by Beth Aven.",true],[24,"The men of Israel were distressed that day; for Saul had adjured the people, saying, “Cursed is the man who eats any food until it is evening, and I am avenged of my enemies.” So none of the people tasted food.",true],[25,"All the people came into the forest; and there was honey on the ground."],[26,"When the people had come to the forest, behold, honey was dripping, but no one put his hand to his mouth; for the people feared the oath."],[27,"But Jonathan didn’t hear when his father commanded the people with the oath. Therefore he put out the end of the rod that was in his hand, and dipped it in the honeycomb, and put his hand to his mouth; and his eyes brightened."],[28,"Then one of the people answered, and said, “Your father directly commanded the people with an oath, saying, ‘Cursed is the man who eats food today.’ ” So the people were faint.",true],[29,"Then Jonathan said, “My father has troubled the land. Please look how my eyes have brightened, because I tasted a little of this honey."],[30,"How much more, if perhaps the people had eaten freely today of the plunder of their enemies which they found? For now there has been no great slaughter among the Philistines.”"],[31,"They struck the Philistines that day from Michmash to Aijalon. The people were very faint;"],[32,"and the people pounced on the plunder, and took sheep, cattle, and calves, and killed them on the ground; and the people ate them with the blood."],[33,"Then they told Saul, saying, “Behold, the people are sinning against Yahweh, in that they eat meat with the blood.” He said, “You have dealt treacherously. Roll a large stone to me today!”"],[34,"Saul said, “Disperse yourselves among the people, and tell them, ‘Every man bring me here his ox, and every man his sheep, and kill them here, and eat; and don’t sin against Yahweh in eating meat with the blood.’ ” All the people brought every man his ox with him that night, and killed them there.",true],[35,"Saul built an altar to Yahweh. This was the first altar that he built to Yahweh."],[36,"Saul said, “Let’s go down after the Philistines by night, and take plunder among them until the morning light, and let’s not leave a man of them.” They said, “Do whatever seems good to you.” Then the priest said, “Let’s draw near here to God.”",true],[37,"Saul asked counsel of God, “Shall I go down after the Philistines? Will you deliver them into the hand of Israel?” But he didn’t answer him that day."],[38,"Saul said, “Draw near here, all you chiefs of the people; and know and see in which this sin has been today."],[39,"For, as Yahweh lives, who saves Israel, though it is in Jonathan my son, he shall surely die.” But there was not a man among all the people who answered him."],[40,"Then he said to all Israel, “You be on one side, and I and Jonathan my son will be y ears, and the lowing of the cattle which I hear mean?”",true],[15,"Saul said, “They have brought them from the Amalekites; for the people spared the best of the sheep and of the cattle, to sacrifice to Yahweh your God. We have utterly destroyed the rest.”",true],[16,"Then Samuel said to Saul, “Stay, and I will tell you what Yahweh said to me last night.” He said to him, “Say on.”",true],[17,"Samuel said, “Though you were little in your own sight, weren’t you made the head of the tribes of Israel? Yahweh anointed you king over Israel;"],[18,"and Yahweh sent you on a journey, and said, ‘Go, and utterly destroy the sinners the Amalekites, and fight against them until they are consumed.’"],[19,"Why then didn’t you obey Yahweh’s voice, but took the plunder, and did that which was evil in Yahweh’s sight?”",true],[20,"Saul said to Samuel, “But I have obeyed Yahweh’s voice, and have gone the way which Yahweh sent me, and have brought Agag the king of Amalek, and have utterly destroyed the Amalekites."],[21,"But the people took of the plunder, sheep and cattle, the chief of the devoted things, to sacrifice to Yahweh your God in Gilgal.”",true],[22,"Samuel said, “Has Yahweh as great delight in burnt offerings and sacrifices, as in obeying Yahweh’s voice? Behold, to obey is better than sacrifice, and to listen than the fat of rams."],[23,"For rebellion is as the sin of witchcraft, and stubbornness is as idolatry and teraphim. Because you have rejected Yahweh’s word, he has also rejected you from being king.”",true],[24,"Saul said to Samuel, “I have sinned; for I have transgressed the commandment of Yahweh, and your words, because I feared the people, and obeyed their voice."],[25,"Now therefore, please pardon my sin, and turn again with me, that I may worship Yahweh.”",true],[26,"Samuel said to Saul, “I will not return with you; for you have rejected Yahweh’s word, and Yahweh has rejected you from being king over Israel.”"],[27,"As Samuel turned around to go away, Saul grabbed the skirt of his robe, and it tore."],[28,"Samuel said to him, “Yahweh has torn the kingdom of Israel from you today, and has given it to a neighbor of yours who is better than you."],[29,"Also the Strength of Israel will not lie nor repent; for he is not a man, that he should repent.”",true],[30,"Then he said, “I have sinned; yet please honor me now before the elders of my people, and before Israel, and come back with me, that I may worship Yahweh your God.”",true],[31,"So Samuel went back with Saul; and Saul worshiped Yahweh."],[32,"Then Samuel said, “Bring Agag the king of the Amalekites here to me!” Agag came to him cheerfully. Agag said, “Surely the bitterness of death is past.”",true],[33,"Samuel said, “As your sword has made women childless, so your mother will be childless among women!” Then Samuel cut Agag in pieces before Yahweh in Gilgal.",true],[34,"Then Samuel went to Ramah; and Saul went up to his house to Gibeah of Saul."],[35,"Samuel came no more to see Saul until the day of his death; for Samuel mourned for Saul: and Yahweh grieved that he had made Saul king over Israel.",true]],[[1,"Yahweh said to Samuel, “How long will you mourn for Saul, since I have rejected him from being king over Israel? Fill your horn with oil, and go. I will send you to Jesse the Bethlehemite; for I have provided a king for myself among his sons.”",true],[2,"Samuel said, “How can I go? If Saul hears it, he will kill me.” Yahweh said, “Take a heifer with you, and say, I have come to sacrifice to Yahweh."],[3,"Call Jesse to the sacrifice, and I will show you what you shall do. You shall anoint to me him whom I name to you.”",true],[4,"Samuel did that which Yahweh spoke, and came to Bethlehem. The elders of the city came to meet him trembling, and said, “Do you come peaceably?”",true],[5,"He said, “Peaceably; I have come to sacrifice to Yahweh. Sanctify yourselves, and come with me to the sacrifice.” He sanctified Jesse and his sons, and called them to the sacrifice."],[6," efy the armies of Israel today! Give me a man, that we may fight together!”",true],[11,"When Saul and all Israel heard those words of the Philistine, they were dismayed, and greatly afraid."],[12,"Now David was the son of that Ephrathite of Bethlehem Judah, whose name was Jesse; and he had eight sons. The man was an elderly old man in the days of Saul."],[13,"The three oldest sons of Jesse had gone after Saul to the battle: and the names of his three sons who went to the battle were Eliab the firstborn, and next to him Abinadab, and the third Shammah."],[14,"David was the youngest; and the three oldest followed Saul."],[15,"Now David went back and forth from Saul to feed his father’s sheep at Bethlehem."],[16,"The Philistine came near morning and evening, and presented himself forty days."],[17,"Jesse said to David his son, “Now take for your brothers an ephah of this parched grain, and these ten loaves, and carry them quickly to the camp to your brothers;"],[18,"and bring these ten cheeses to the captain of their thousand, and see how your brothers are doing, and bring back news.”"],[19,"Now Saul, and they, and all the men of Israel, were in the valley of Elah, fighting with the Philistines."],[20,"David rose up early in the morning, and left the sheep with a keeper, and took and went, as Jesse had commanded him. He came to the place of the wagons, as the army which was going out to the fight shouted for the battle."],[21,"Israel and the Philistines put the battle in array, army against army."],[22,"David left his baggage in the hand of the keeper of the baggage, and ran to the army, and came and greeted his brothers."],[23,"As he talked with them, behold, the champion, the Philistine of Gath, Goliath by name, came up out of the ranks of the Philistines, and said the same words; and David heard them."],[24,"All the men of Israel, when they saw the man, fled from him, and were terrified."],[25,"The men of Israel said, “Have you seen this man who has come up? He has , and slung it, and struck the Philistine in his forehead. The stone sank into his forehead, and he fell on his face to the earth."],[50,"So David prevailed over the Philistine with a sling and with a stone, and struck the Philistine, and killed him; but there was no sword in the hand of David."],[51,"Then David ran, stood over the Philistine, took his sword, drew it out of its sheath, killed him, and cut off his head with it. When the Philistines saw that their champion was dead, they fled."],[52,"The men of Israel and of Judah arose and shouted, and pursued the Philistines as far as Gai and to the gates of Ekron. The wounded of the Philistines fell down by the way to Shaaraim, even to Gath and to Ekron."],[53,"The children of Israel returned from chasing after the Philistines and they plundered their camp."],[54,"David took the head of the Philistine, and brought it to Jerusalem; but he put his armor in his tent."],[55,"When Saul saw David go out against the Philistine, he said to Abner, the captain of the army, “Abner, whose son is this youth?” Abner said, “As your soul lives, O king, I can’t tell.”",true],[56,"The king said, “Inquire whose son the young man is!”",true],[57,"As David returned from the slaughter of the Philistine, Abner took him and brought him before Saul with the head of the Philistine in his hand."],[58,"Saul said to him, “Whose son are you, you young man?” David answered, “I am the son of your servant Jesse the Bethlehemite.”",true]],[[1,"When he had finished speaking to Saul, the soul of Jonathan was knit with the soul of David, and Jonathan loved him as his own soul."],[2,"Saul took him that day, and wouldn’t let him go home to his father’s house any more."],[3,"Then Jonathan and David made a covenant, because he loved him as his own soul."],[4,"Jonathan stripped himself of the robe that was on him, and gave it to David, and his clothing, even including his sword, his bow, and his sash."],[5,"David went out wherever Saul sent him, and behaved himself wisely; and Saul set him over the men of war. It was good in the sight of all the people, and also in the sight of Saul’s servants.",true],[6,"As they came, when David returned from the slaughter of the Philistine, the women came out of all the cities of Israel, singing and dancing, to meet king Saul, with tambourines, with joy, and with instruments of music."],[7,"The women sang to one another as they played, and said, “Saul has slain his thousands, and David his ten thousands.”",true],[8,"Saul was very angry, and this saying displeased him. He said, “They have creditd David with ten thousands, and they have only credited me with thousands. What can he have more but the kingdom?”"],[9,"Saul watched David from that day and forward."],[10,"On the next day, an evil spirit from God came mightily on Saul, and he prophesied in the middle of the house. David played with his hand, as he did day by day. Saul had his spear in his hand;"],[11,"and Saul threw the spear, for he said, “I will pin David to the wall!” David escaped from his presence twice."],[12,"Saul was afraid of David, because Yahweh was with him, and had departed from Saul."],[13,"Therefore Saul removed him from his presence, and made him his captain over a thousand; and he went out and came in before the people.",true],[14,"David behaved himself wisely in all his ways; and Yahweh was with him."],[15,"When Saul saw that he behaved himself very wisely, he stood in awe of him."],[16,"But all Israel and Judah loved David; for he went out and came in before them."],[17,"Saul said to David, “Behold, my elder daughter Merab, I will give her to you as wife. Only be valiant for me, and fight Yahweh’s battles.” For Saul said, “Don’t let my hand be on him, but let the hand of the Philistines be on him.”"],[18,"David said to Saul, “Who am I, and what is my life, or my father’s family in Israel, that I should be son-in-law to the king?”",true],[19,"But at the time when Merab, Saul’s daughter, should have been given to David, she was given to Adriel the Meholathite as wife."],[20,"Michal, Saul’s daughter, loved David; and they told Saul, and the thing pleased him."],[21,"Saul said, I will give her to him, that she may be a snare to him, and that the hand of the Philistines may be against him. Therefore Saul said to David, “You shall today be my son-in-law a second time.”"],[22,"Saul commanded his servants, “Talk with David secretly, and say, ‘Behold, the king has delight in you, and all his servants love you. Now therefore be the king’s son-in-law.’ ”",true],[23,"Saul’s servants spoke those words in the ears of David. David said, “Does it seem to you a light thing to be the king’s son-in-law, since I am a poor man, and little known?”",true],[24,"The servants of Saul told him, saying, “David spoke like this.”",true],[25,"Saul said, “Tell David, ‘The king desires no dowry except one hundred foreskins of the Philistines, to be avenged of the king’s enemies.’ ” Now Saul thought he would make David fall by the hand of the Philistines."],[26,"When his servants told David these words, it pleased David well to be the king’s son-in-law. Before the deadline,"],[27,"David arose and went, he and his men, and killed two hundred men of the Philistines. Then David brought their foreskins, and they gave them in full number to the king, that he might be the king’s son-in-law. Then Saul gave him Michal his daughter as wife."],[28,"Saul saw and knew that Yahweh was with David; and Michal, Saul’s daughter, loved him."],[29,"Saul was even more afraid of David; and Saul was David’s enemy continually."],[30,"Then the princes of the Philistines went out; and as often as they went out, David behaved himself more wisely than all the servants of Saul, so that his name was highly esteemed.",true]],[[1,"Saul spoke to Jonathan his son, and to all his servants, that they should kill David. But Jonathan, Saul’s son, greatly delighted in David."],[2,"Jonathan told David, saying, “Saul my father seeks to kill you. Now therefore, please take care of yourself in the morning, and live in a secret place, and hide yourself."],[3,"I will go out and stand beside my father in the field where you are, and I will talk with my father about you; and if I see anything, I will tell you.”",true],[4,"Jonathan spoke good of David to Saul his father, and said to him, “Don’t let the king sin against his servant, against David; because he has not sinned against you, and because his works have been very good toward you;"],[5,"for he put his life in his hand, and struck the Philistine, and Yahweh worked a great victory for all Israel. You saw it, and rejoiced. Why then will you sin against innocent blood, to kill David without a cause?”",true],[6,"Saul listened to the voice of Jonathan: and Saul swore, “As Yahweh lives, he shall not be put to death.”",true],[7,"Jonathan called David, and Jonathan showed him all those things. Then Jonathan brought David to Saul, and he was in his presence, as before."],[8,"There was war again. David went out, and fought with the Philistines, and killed them with a great slaughter; and they fled before him.",true],[9,"An evil spirit from Yahweh was on Saul, as he sat in his house with his spear in his hand; and David was playing with his hand."],[10,"Saul sought to pin David to the wall with the spear; but he slipped away out of Saul’s presence, and he stuck the spear into the wall. David fled, and escaped that night."],[11,"Saul sent messengers to David’s house, to watch him, and to kill him in the morning. Michal, David’s wife, told him, saying, “If you don’t save your life tonight, tomorrow you will be killed.”"],[12,"So Michal let David down through the window. He went away, fled, and escaped."],[13,"Michal took the teraphim, and laid it in the bed, and put a pillow of goats’ hair at its head, and covered it with clothes."],[14,"When Saul sent messengers to take David, she said, “He is sick.”",true],[15,"Saul sent the messengers to see David, saying, “Bring him up to me in the bed, that I may kill him.”"],[16,"When the messengers came in, behold, the teraphim was in the bed, with the pillow of goats’ hair at its head.",true],[17,"Saul said to Michal, “Why have you deceived me like this and let my enemy go, so that he has escaped?” Michal answered Saul, “He said to me, ‘Let me go! Why should I kill you?’ ”",true],[18,"Now David fled and escaped, and came to Samuel at Ramah, and told him all that Saul had done to him. He and Samuel went and lived in Naioth."],[19,"Saul was told, saying, “Behold, David is at Naioth in Ramah.”",true],[20,"Saul sent messengers to seize David: and when they saw the company of the prophets prophesying, and Samuel standing as head over them, God’s Spirit came on Saul’s messengers, and they also prophesied."],[21,"When Saul was told, he sent other messengers, and they also prophesied. Saul sent messengers again the third time, and they also prophesied."],[22,"Then he also went to Ramah, and came to the great well that is in Secu: and he asked, “Where are Samuel and David?” One said, “Behold, they are at Naioth in Ramah.”",true],[23,"He went there to Naioth in Ramah. Then God’s Spirit came on him also, and he went on, and prophesied, until he came to Naioth in Ramah."],[24,"He also stripped off his clothes, and he also prophesied before Samuel, and lay down naked all that day and all that night. Therefore they say, “Is Saul also among the prophets?”",true]],[[1,"David fled from Naioth in Ramah, and came and said before Jonathan, “What have I done? What is my iniquity? What is my sin before your father, that he seeks my life?”",true],[2,"He said to him, “Far from it; you will not die. Behold, my father does nothing either great or small, but that he discloses it to me. Why would my father hide this thing from me? It is not so.”",true],[3,"David swore moreover, and said, “Your father knows well that I have found favor in your eyes; and he says, ‘Don’t let Jonathan know this, lest he be grieved;’ but truly as Yahweh lives, and as your soul lives, there is but a step between me and death.”",true],[4,"Then Jonathan said to David, “Whatever your soul desires, I will even do it for you.”",true],[5,"David said to Jonathan, “Behold, tomorrow is the new moon, and I should not fail to dine with the king; but let me go, that I may hide myself in the field to the third day at evening."],[6,"If your father misses me at all, then say, ‘David earnestly asked leave of me that he might run to Bethlehem his city; for it is the yearly sacrifice there for all the family.’"],[7,"If he says, ‘It is well,’ your servant shall have peace; but if he is angry, then know that evil is determined by him."],[8,"Therefore deal kindly with your servant; for you have brought your servant into a covenant of Yahweh with you; but if there is iniquity in me, kill me yourself; for why should you bring me to your father?”",true],[9,"Jonathan said, “Far be it from you; for if I should at all know that evil were determined by my father to come on you, then wouldn’t I tell you that?”",true],[10,"Then David said to Jonathan, “Who will tell me if your father answers you roughly?”",true],[11,"Jonathan said to David, “Come! Let’s go out into the field.” They both went out into the field."],[12,"Jonathan said to David, “By Yahweh, the God of Israel, when I have sounded my father about this time tomorrow, or the third day, behold, if there is good toward David, won’t I then send to you, and disclose it to you?"],[13,"Yahweh do so to Jonathan, and more also, should it please my father to do you evil, if I don’t disclose it to you, and send you away, that you may go in peace. May Yahweh be with you, as he has been with my father."],[14,"You shall not only show me the loving kindness of Yahweh while I still live, that I not die;"],[15,"but you shall also not cut off your kindness from my house forever; no, not when Yahweh has cut off every one of the enemies of David from the surface of the earth.”"],[16,"So Jonathan made a covenant with David’s house, saying, “Yahweh will require it at the hand of David’s enemies.”"],[17,"Jonathan caused David to swear again, for the love that he had to him; for he loved him as he loved his own soul."],[18,"Then Jonathan said to him, “Tomorrow is the new moon, and you will be missed, because your seat will be empty."],[19,"When you have stayed three days, go down quickly, and come to the place where you hid yourself when this started, and remain by the stone Ezel."],[20,"I will shoot three arrows on its side, as though I shot at a mark."],[21,"Behold, I will send the boy, saying, ‘Go, find the arrows!’ If I tell the boy, ‘Behold, the arrows are on this side of you. Take them;’ then come; for there is peace to you and no danger, as Yahweh lives."],[22,"But if I say this to the boy, ‘Behold, the arrows are beyond you;’ then go your way; for Yahweh has sent you away."],[23,"Concerning the matter which you and I have spoken of, behold, Yahweh is between you and me forever.”",true],[24,"So David hid himself in the field. When the new moon had come, the king sat himself down to eat food."],[25,"The king sat on his seat, as at other times, even on the seat by the wall; and Jonathan stood up, and Abner sat by Saul’s side, but David’s place was empty."],[26,"Nevertheless Saul didn’t say anything that day, for he thought, “Something has happened to him. He is not clean. Surely he is not clean.”",true],[27,"On the next day after the new moon, the second day, David’s place was empty. Saul said to Jonathan his son, “Why doesn’t the son of Jesse come to eat, either yesterday, or today?”",true],[28,"Jonathan answered Saul, “David earnestly asked permission of me to go to Bethlehem."],[29,"He said, ‘Please let me go, for our family has a sacrifice in the city. My brother has commanded me to be there. Now, if I have found favor in your eyes, please let me go away and see my brothers.’ Therefore he has not come to the king’s table.”",true],[30,"Then Saul’s anger burned against Jonathan, and he said to him, “You son of a perverse rebellious woman, don’t I know that you have chosen the son of Jesse to your own shame, and to the shame of your mother’s nakedness?"],[31,"For as long as the son of Jesse lives on the earth, you will not be established, nor will your kingdom. Therefore now send and bring him to me, for he shall surely die!”",true],[32,"Jonathan answered Saul his father, and said to him, “Why should he be put to death? What has he done?”",true],[33,"Saul cast his spear at him to strike him. By this Jonathan knew that his father was determined to put David to death."],[34,"So Jonathan arose from the table in fierce anger, and ate no food the second day of the month; for he was grieved for David, because his father had treated him shamefully."],[35,"In the morning, Jonathan went out into the field at the time appointed with David, and a little boy with him."],[36,"He said to his boy, “Run, find now the arrows which I shoot.” As the boy ran, he shot an arrow beyond him."],[37,"When the boy had come to the place of the arrow which Jonathan had shot, Jonathan cried after the boy, and said, “Isn’t the arrow beyond you?”"],[38,"Jonathan cried after the boy, “Go fast! Hurry! Don’t delay!” Jonathan’s boy gathered up the arrows, and came to his master."],[39,"But the boy didn’t know anything. Only Jonathan and David knew the matter."],[40,"Jonathan gave his weapons to his boy, and said to him, “Go, carry them to the city.”",true],[41,"As soon as the boy was gone, David arose out of the south, and fell on his face to the ground, and bowed himself three times. They kissed one another, and wept one with another, and David wept the most."],[42,"Jonathan said to David, “Go in peace, because we have both sworn in Yahweh’s name, saying, ‘Yahweh is between me and you, and between my offspring and your offspring, forever.’ ” He arose and departed; and Jonathan went into the city.",true]],[[1,"Then David came to Nob to Ahimelech the priest. Ahimelech came to meet David trembling, and said to him, “Why are you alone, and no man with you?”"],[2,"David said to Ahimelech the priest, “The king has commanded me to do something, and has said to me, ‘Let no one know anything about the business about which I send you, and what I have commanded you. I have sent the young men to a certain place.’"],[3,"Now therefore what is under your hand? Please give me five loaves of bread in my hand, or whatever is available.”",true],[4,"The priest answered David, and said, “I have no common bread, but there is holy bread; if only the young men have kept themselves from women.”",true],[5,"David answered the priest, and said to him, “Truly, women have been kept from us as usual these three days. When I came out, the vessels of the young men were holy, though it was only a common journey. How much more then today shall their vessels be holy?”"],[6,"So the priest gave him holy bread; for there was no bread there but the show bread that was taken from before Yahweh, to put hot bread in the day when it was taken away.",true],[7,"Now a certain man of the servants of Saul was there that day, detained before Yahweh; and his name was Doeg the Edomite, the best of the herdsmen who belonged to Saul."],[8,"David said to Ahimelech, “Isn’t there here under your hand spear or sword? For I have neither brought my sword nor my weapons with me, because the king’s business required haste.”",true],[9,"The priest said, “Behold, the sword of Goliath the Philistine, whom you killed in the valley of Elah, is here wrapped in a cloth behind the ephod. If you would like to take that, take it; for there is no other except that here.” David said, “There is none like that. Give it to me.”",true],[10,"David arose, and fled that day for fear of Saul, and went to Achish the king of Gath."],[11,"The servants of Achish said to him, “Isn’t this David the king of the land? Didn’t they sing to one another about him in dances, saying, ‘Saul has slain his thousands, and David his ten thousands?’ ”",true],[12,"David laid up these words in his heart, and was very afraid of Achish the king of Gath."],[13,"He changed his behavior before them, and pretended to be insane in their hands, and scribbled on the doors of the gate, and let his spittle fall down on his beard."],[14,"Then Achish said to his servants, “Look, you see the man is insane. Why then have you brought him to me?"],[15,"Do I lack madmen, that you have brought this fellow to play the madman in my presence? Should this fellow come into my house?”",true]],[[1,"David therefore departed from there, and escaped to Adullam’s cave. When his brothers and all his father’s house heard it, they went down there to him."],[2,"Everyone who was in distress, everyone who was in debt, and everyone who was discontented, gathered themselves to him; and he became captain over them. There were with him about four hundred men."],[3,"David went from there to Mizpeh of Moab, and he said to the king of Moab, “Please let my father and my mother come out with you, until I know what God will do for me.”"],[4,"He brought them before the king of Moab; and they lived with him all the time that David was in the stronghold."],[5,"The prophet Gad said to David, “Don’t stay in the stronghold. Depart, and go into the land of Judah.” Then David departed, and came into the forest of Hereth."],[6,"Saul heard that David was discovered, with the men who were with him. Now Saul was sitting in Gibeah, under the tamarisk tree in Ramah, with his spear in his hand, and all his servants were standing around him."],[7,"Saul said to his servants who stood around him, “Hear now, you Benjamites! Will the son of Jesse give everyone of you fields and vineyards? Will he make you all captains of thousands and captains of hundreds,"],[8,"that all of you have conspired against me, and there is no one who discloses to me when my son makes a treaty with the son of Jesse, and there is none of you who is sorry for me, or discloses to me that my son has stirred up my servant against me, to lie in wait, as it is today?”",true],[9,"Then Doeg the Edomite, who stood by the servants of Saul, answered and said, “I saw the son of Jesse coming to Nob, to Ahimelech the son of Ahitub."],[10,"He inquired of Yahweh for him, gave him food, and gave him the sword of Goliath the Philistine.”",true],[11,"Then the king sent to call Ahimelech the priest, the son of Ahitub, and all his father’s house, the priests who were in Nob; and they all came to the king."],[12,"Saul said, “Hear now, you son of Ahitub.” He answered, “Here I am, my lord.”",true],[13,"Saul said to him, “Why have you conspired against me, you and the son of Jesse, in that you have given him bread, and a sword, and have inquired of God for him, that he should rise against me, to lie in wait, as it is today?”",true],[14,"Then Ahimelech answered the king, and said, “Who among all your servants is so faithful as David, who is the king’s son-in-law, captain of your body guard, and honored in your house?"],[15,"Have I today begun to inquire of God for him? Be it far from me! Don’t let the king impute anything to his servant, nor to all the house of my father; for your servant knows nothing of all this, less or more.”",true],[16,"The king said, “You shall surely die, Ahimelech, you, and all your father’s house.”"],[17,"The king said to the guard who stood about him, “Turn, and kill the priests of Yahweh; because their hand also is with David, and because they knew that he fled, and didn’t disclose it to me.” But the servants of the king wouldn’t put out their hand to fall on the priests of Yahweh.",true],[18,"The king said to Doeg, “Turn and attack the priests!” Doeg the Edomite turned, and he attacked the priests, and he killed on that day eighty-five people who wore a linen ephod."],[19,"He struck Nob, the city of the priests, with the edge of the sword, both men and women, children and nursing babies, and cattle and donkeys and sheep, with the edge of the sword."],[20,"One of the sons of Ahimelech, the son of Ahitub, named Abiathar, escaped, and fled after David."],[21,"Abiathar told David that Saul had slain Yahweh’s priests.",true],[22,"David said to Abiathar, “I knew on that day, when Doeg the Edomite was there, that he would surely tell Saul. I am responsible for the death of all the persons of your father’s house."],[23,"Stay with me. Don’t be afraid, for he who seeks my life seeks your life. For you will be safe with me.”",true]],[[1,"David was told, “Behold, the Philistines are fighting against Keilah, and are robbing the threshing floors.”",true],[2,"Therefore David inquired of Yahweh, saying, “Shall I go and strike these Philistines?” Yahweh said to David, “Go strike the Philistines, and save Keilah.”",true],[3,"David’s men said to him, “Behold, we are afraid here in Judah. How much more then if we go to Keilah against the armies of the Philistines?”",true],[4,"Then David inquired of Yahweh yet again. Yahweh answered him, and said, “Arise, go down to Keilah; for I will deliver the Philistines into your hand.”",true],[5,"David and his men went to Keilah, and fought with the Philistines, and brought away their livestock, and killed them with a great slaughter. So David saved the inhabitants of Keilah."],[6,"When Abiathar the son of Ahimelech fled to David to Keilah, he came down with an ephod in his hand.",true],[7,"Saul was told that David had come to Keilah. Saul said, “God has delivered him into my hand; for he is shut in by entering into a town that has gates and bars.”"],[8,"Saul summoned all the people to war, to go down to Keilah, to besiege David and his men."],[9,"David knew that Saul was devising mischief against him; and he said to Abiathar the priest, “Bring the ephod here.”"],[10,"Then David said, “O Yahweh, the God of Israel, your servant has surely heard that Saul seeks to come to Keilah, to destroy the city for my sake."],[11,"Will the men of Keilah deliver me
